<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boomerang Arena — Smahbros</title>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1025;
      color: #e8e8f4;
      font-family: 'Space Mono', 'Courier New', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* ── Lobby ───────────────────────────────────────────── */
    #lobby {
      width: 400px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .lobby-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 2px;
    }
    .lobby-logo {
      font-family: 'Bebas Neue', 'Arial Black', sans-serif;
      font-size: 2.5rem;
      line-height: 0.88;
      letter-spacing: 0.03em;
    }
    .lobby-logo span { color: #4fc3f7; }
    .lobby-back {
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      color: rgba(232,232,244,0.28);
      text-decoration: none;
      padding-top: 6px;
      transition: color 0.15s;
    }
    .lobby-back:hover { color: rgba(232,232,244,0.65); }

    .lobby-input {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(167,139,250,0.22);
      border-radius: 8px;
      padding: 11px 14px;
      color: #e8e8f4;
      font-family: inherit;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    .lobby-input:focus { border-color: rgba(167,139,250,0.6); }
    .lobby-input::placeholder { color: rgba(232,232,244,0.2); }

    /* ── Mode tabs ───────────────────────────────────────── */
    .mode-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border: 1px solid rgba(167,139,250,0.18);
      border-radius: 8px;
      overflow: hidden;
    }
    .mode-tab {
      background: transparent;
      border: none;
      padding: 9px 0;
      color: rgba(232,232,244,0.3);
      font-family: inherit;
      font-size: 0.66rem;
      letter-spacing: 0.14em;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .mode-tab.active {
      background: rgba(122,85,204,0.28);
      color: #e8e8f4;
    }
    .mode-tab:hover:not(.active) {
      background: rgba(167,139,250,0.08);
      color: rgba(232,232,244,0.6);
    }

    /* ── Slides ──────────────────────────────────────────── */
    .slides-outer { overflow: hidden; }
    .slides-track {
      display: flex;
      transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    .slide {
      flex: 0 0 100%;
      display: flex;
      flex-direction: column;
      gap: 11px;
    }
    .slide-hint {
      font-size: 0.66rem;
      letter-spacing: 0.04em;
      color: rgba(232,232,244,0.32);
      line-height: 1.55;
    }

    /* ── Difficulty ──────────────────────────────────────── */
    .diff-group {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .diff-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(167,139,250,0.18);
      border-radius: 7px;
      padding: 9px 0;
      color: rgba(232,232,244,0.35);
      font-family: inherit;
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: all 0.15s;
    }
    .diff-btn.active {
      background: rgba(122,85,204,0.32);
      border-color: rgba(167,139,250,0.55);
      color: #e8e8f4;
    }
    .diff-btn:hover:not(.active) {
      background: rgba(167,139,250,0.08);
      color: rgba(232,232,244,0.65);
    }

    /* ── Buttons ─────────────────────────────────────────── */
    .lobby-btn {
      width: 100%;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-family: inherit;
      font-size: 0.75rem;
      letter-spacing: 0.14em;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }
    .lobby-btn.mp  { background: #4fc3f7; color: #0d0813; }
    .lobby-btn.mp:hover  { background: #81d4fa; }
    .lobby-btn.cpu { background: #7a55cc; color: #fff; }
    .lobby-btn.cpu:hover { background: #9370e8; }

    /* ── Status ──────────────────────────────────────────── */
    #status {
      text-align: center;
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      color: rgba(232,232,244,0.4);
      min-height: 1.2em;
    }
    #status.err { color: #ef5350; }

    /* ── Controls legend ─────────────────────────────────── */
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      border-top: 1px solid rgba(167,139,250,0.1);
      padding-top: 12px;
    }
    .ctrl {
      font-size: 0.62rem;
      letter-spacing: 0.04em;
      color: rgba(232,232,244,0.28);
    }
    .ctrl strong { color: rgba(232,232,244,0.55); }

    /* ── Game canvas wrapper ─────────────────────────────── */
    #game-wrap {
      display: none;
      position: fixed;
      inset: 0;
      background: #1a1025;
    }
    #game-wrap canvas { display: block; border-radius: 0; }

    /* ── End-screen overlay ──────────────────────────────── */
    #endscreen {
      display: none;
      position: absolute;
      bottom: 56px;
      left: 50%;
      transform: translateX(-50%);
      gap: 10px;
      z-index: 10;
      white-space: nowrap;
    }
    .end-btn {
      background: rgba(26,16,37,0.92);
      border: 1px solid rgba(167,139,250,0.38);
      border-radius: 8px;
      padding: 10px 22px;
      color: #e8e8f4;
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: all 0.15s;
    }
    .end-btn:hover { background: rgba(122,85,204,0.28); border-color: rgba(167,139,250,0.7); }
    .end-btn.primary { border-color: rgba(79,195,247,0.45); }
    .end-btn.primary:hover { background: rgba(79,195,247,0.18); border-color: rgba(79,195,247,0.75); }
  </style>
</head>
<body>
<script>requireAuth();</script>

<!-- ── Lobby ──────────────────────────────────────────────── -->
<div id="lobby">
  <div class="lobby-top">
    <div class="lobby-logo">BOOMERANG<br><span>ARENA</span></div>
    <a href="hub.html" class="lobby-back">← HUB</a>
  </div>

  <input id="inp-user" class="lobby-input" placeholder="USERNAME" autocomplete="off" />

  <div class="mode-tabs">
    <button class="mode-tab active" data-slide="0">MULTIPLAYER</button>
    <button class="mode-tab"        data-slide="1">VS CPU</button>
  </div>

  <div class="slides-outer">
    <div class="slides-track" id="slides-track">

      <!-- Slide 0: Multiplayer -->
      <div class="slide">
        <p class="slide-hint">Share a room ID with a friend — first two in win.</p>
        <input id="inp-room" class="lobby-input" placeholder="ROOM ID (e.g. lobby1)" autocomplete="off" />
        <button id="btn-join" class="lobby-btn mp">JOIN ROOM</button>
      </div>

      <!-- Slide 1: VS CPU -->
      <div class="slide">
        <p class="slide-hint">Fight against an AI opponent — no friend required.</p>
        <div class="diff-group">
          <button class="diff-btn"        data-d="easy">EASY</button>
          <button class="diff-btn active" data-d="normal">NORMAL</button>
          <button class="diff-btn"        data-d="hard">HARD</button>
        </div>
        <button id="btn-cpu" class="lobby-btn cpu">PLAY VS CPU</button>
      </div>

    </div>
  </div>

  <div id="status"></div>

  <div class="controls">
    <div class="ctrl"><strong>WASD</strong> — move</div>
    <div class="ctrl"><strong>Right-click</strong> — throw</div>
    <div class="ctrl"><strong>Left-click</strong> — slash</div>
    <div class="ctrl"><strong>SPACE</strong> — dash</div>
    <div class="ctrl"><strong>Best of 3</strong> — rounds</div>
  </div>
</div>

<!-- ── Phaser canvas ──────────────────────────────────────── -->
<div id="game-wrap">
  <div id="endscreen">
    <button class="end-btn primary" onclick="location.reload()">PLAY AGAIN</button>
    <a href="hub.html" class="end-btn">← HUB</a>
  </div>
</div>

<script>
const WS_BASE = API_BASE.replace('https://', 'wss://').replace('http://', 'ws://');
const token   = localStorage.getItem('authToken') || '';

let ws         = null;
let playerSlot = null;
let phaserGame = null;
let scene      = null;

const lobbyEl  = document.getElementById('lobby');
const gameWrap = document.getElementById('game-wrap');
const statusEl = document.getElementById('status');

// Pre-fill username
const savedUser = localStorage.getItem('username');
if (savedUser) document.getElementById('inp-user').value = savedUser;

// ── Slide navigation ──────────────────────────────────────────────────────────
let currentSlide = 0;
const slidesTrack = document.getElementById('slides-track');
const modeTabs    = document.querySelectorAll('.mode-tab');

function goToSlide(idx) {
  currentSlide = idx;
  slidesTrack.style.transform = 'translateX(' + (-idx * 100) + '%)';
  modeTabs.forEach(function(t, i) { t.classList.toggle('active', i === idx); });
}
modeTabs.forEach(function(tab, i) {
  tab.addEventListener('click', function() { goToSlide(i); });
});

// Swipe support
var _touchX = 0;
slidesTrack.addEventListener('touchstart', function(e) { _touchX = e.touches[0].clientX; }, { passive: true });
slidesTrack.addEventListener('touchend',   function(e) {
  var dx = e.changedTouches[0].clientX - _touchX;
  if (dx < -40) goToSlide(Math.min(1, currentSlide + 1));
  if (dx >  40) goToSlide(Math.max(0, currentSlide - 1));
});

// ── Difficulty selection ──────────────────────────────────────────────────────
var selectedDiff = 'normal';
document.querySelectorAll('.diff-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.diff-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    selectedDiff = btn.dataset.d;
  });
});

// ── Status helpers ────────────────────────────────────────────────────────────
function setStatus(msg, isErr) {
  statusEl.textContent = msg;
  statusEl.className   = isErr ? 'err' : '';
}

// ── Multiplayer join ──────────────────────────────────────────────────────────
document.getElementById('btn-join').addEventListener('click', tryJoin);
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && lobbyEl.style.display !== 'none') {
    if (currentSlide === 0) tryJoin(); else playCpu();
  }
});

function tryJoin() {
  var roomId   = document.getElementById('inp-room').value.trim();
  var username = document.getElementById('inp-user').value.trim() || 'Player';
  if (!roomId) { setStatus('Enter a Room ID.', true); return; }
  localStorage.setItem('username', username);
  connectMulti(roomId, username);
}

function connectMulti(roomId, username) {
  setStatus('Connecting…');
  var slowTimer = setTimeout(function() {
    setStatus('Server is waking up — this takes ~30s on first load…');
  }, 4000);

  ws = new WebSocket(WS_BASE + '/ws/game/' + roomId);
  ws.onopen = function() {
    clearTimeout(slowTimer);
    ws.send(JSON.stringify({ token: token, username: username }));
  };
  ws.onmessage = handleWsMsg;
  ws.onclose   = function() {
    if (scene) showOverlay(scene, 'Disconnected from server');
    else setStatus('Connection closed — server may have rejected the session.', true);
  };
  ws.onerror = function() { setStatus('Connection failed — server may be starting up, try again in 30s.', true); };
}

// ── CPU join ──────────────────────────────────────────────────────────────────
document.getElementById('btn-cpu').addEventListener('click', playCpu);

function playCpu() {
  var username = document.getElementById('inp-user').value.trim() || 'Player';
  var roomId   = 'cpu_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
  localStorage.setItem('username', username);
  connectCpu(roomId, username, selectedDiff);
}

function connectCpu(roomId, username, difficulty) {
  setStatus('Starting CPU game…');
  var slowTimer = setTimeout(function() {
    setStatus('Server is waking up — this takes ~30s on first load…');
  }, 4000);

  ws = new WebSocket(WS_BASE + '/ws/game-cpu/' + roomId);
  ws.onopen = function() {
    clearTimeout(slowTimer);
    ws.send(JSON.stringify({ token: token, username: username, difficulty: difficulty }));
  };
  ws.onmessage = handleWsMsg;
  ws.onclose   = function() {
    if (scene) showOverlay(scene, 'Disconnected from server');
    else setStatus('Connection failed.', true);
  };
  ws.onerror = function() { setStatus('Connection failed — server may be starting up, try again in 30s.', true); };
}

// ── Shared WS message handler ─────────────────────────────────────────────────
function handleWsMsg(e) {
  var msg = JSON.parse(e.data);
  if (msg.type === 'error') { setStatus(msg.message, true); ws.close(); return; }
  if (msg.type === 'joined') {
    playerSlot = msg.slot;
    setStatus('You are Player ' + (msg.slot + 1) + '. Waiting for opponent…');
  }
  if (msg.type === 'player_joined') {
    setStatus(msg.username + ' joined — starting soon…');
  }
  if (msg.type === 'start' && !phaserGame) {
    lobbyEl.style.display  = 'none';
    gameWrap.style.display = 'block';
    phaserGame = launchPhaser();
  }
  if (msg.type === 'state') {
    if (scene) {
      while (_pendingStates.length) applyState(scene, _pendingStates.shift());
      applyState(scene, msg);
    } else {
      _pendingStates.push(msg);
      if (_pendingStates.length > 8) _pendingStates.shift();
    }
  }
  if (msg.type === 'player_left' && scene) { showOverlay(scene, 'Opponent disconnected'); }
}

// ── Keyboard input ────────────────────────────────────────────────────────────
const held = { up: false, down: false, left: false, right: false };
const KEY_MAP = {
  w: 'up', arrowup: 'up',
  s: 'down', arrowdown: 'down',
  a: 'left', arrowleft: 'left',
  d: 'right', arrowright: 'right',
};

function sendKeys() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'input', keys: { up: held.up, down: held.down, left: held.left, right: held.right } }));
  }
}
document.addEventListener('keydown', function(e) {
  var k = KEY_MAP[e.key.toLowerCase()];
  if (k && !held[k]) { held[k] = true; sendKeys(); }
  if (e.key === ' ' && !e.repeat && ws && ws.readyState === WebSocket.OPEN && playerSlot !== null) {
    var ddx = (held.right ? 1 : 0) - (held.left ? 1 : 0);
    var ddy = (held.down  ? 1 : 0) - (held.up   ? 1 : 0);
    ws.send(JSON.stringify({ type: 'dash', dx: ddx, dy: ddy }));
  }
});
document.addEventListener('keyup', function(e) {
  var k = KEY_MAP[e.key.toLowerCase()];
  if (k) { held[k] = false; sendKeys(); }
});
document.addEventListener('contextmenu', function(e) { e.preventDefault(); });

// ── Shared drawing constants & helpers ───────────────────────────────────────
var SLIME_BASE  = [0x4fc3f7, 0xff6b6b];
var SLIME_DARK  = [0x1a7aaa, 0xc0392b];
var HP_COLORS   = [0x4fc3f7, 0xff6b6b];
var DART_ABILITY_COLORS = { normal: null, poison: 0x39ff14, explosive: 0xff4500 };
var DART_RANGE_PX = 420;   // must match server DART_RANGE
function getDartColor(d) { return DART_ABILITY_COLORS[d.ability] || SLIME_BASE[d.owner]; }

// True 2:1 isometric projection — world (wx,wy) → screen (sx,sy)
// x_screen = cx + (wx−wcx − (wy−wcy)) * S
// y_screen = cy + (wx−wcx + (wy−wcy)) * S / 2
var ISO_S   = 0.655;         // scale: 1388×718 arena fits in ~1380px diamond
var ISO_WCX = 720, ISO_WCY = 405;   // world center
var ISO_SCX = 720, ISO_SCY = 405;   // screen center (same — arena is centered)
function w2s(wx, wy) {
  var dx = (wx - ISO_WCX) * ISO_S, dy = (wy - ISO_WCY) * ISO_S;
  return { x: ISO_SCX + dx - dy, y: ISO_SCY + (dx + dy) * 0.5 };
}
function s2w(sx, sy) {
  var rx = sx - ISO_SCX, ry = sy - ISO_SCY;
  return { x: ISO_WCX + (ry + rx * 0.5) / ISO_S, y: ISO_WCY + (ry - rx * 0.5) / ISO_S };
}
// Project a world-space unit direction vector into screen-space direction
function isoDir(ndx, ndy) {
  var vx = ndx - ndy, vy = (ndx + ndy) * 0.5;
  var l = Math.hypot(vx, vy) || 1;
  return { x: vx / l, y: vy / l };
}

// Arena hazards — positions must match server constants exactly
var BUMPERS_S = [{id:0,x:460,y:260,r:32},{id:1,x:980,y:550,r:32}];
var GRATES_S  = [{x:600,y:560,w:160,h:80},{x:760,y:170,w:160,h:80}];
var BELTS_S   = [{x:310,y:490,w:200,h:70,vx:3},{x:1130,y:320,w:200,h:70,vx:-3}];

var _pendingStates = [];

// drawSlime(g, x, floorY, bodyY, idx, s, sx, sy, leanX, flash, crowned)
function drawSlime(g, x, floorY, bodyY, idx, s, sx, sy, leanX, flash, crowned) {
  s     = s     || 1;
  sx    = sx    || 1;
  sy    = sy    || 1;
  leanX = leanX || 0;
  var bx   = x + leanX;
  var base = SLIME_BASE[idx];
  var dark = SLIME_DARK[idx];
  var cy   = bodyY - 2 * s;   // body center

  // Drop shadow
  g.fillStyle(0x000000, 0.26);
  g.fillEllipse(bx + 2*s, floorY + 5*s, 74*s*sx, 17*s);

  // ── Body: single clean circle (squishes with sx/sy) ──
  g.fillStyle(base, 1);
  g.fillEllipse(bx, cy, 64*s*sx, 64*s*sy);

  // Soft inner shading — lower-right is darker
  g.fillStyle(dark, 0.20);
  g.fillEllipse(bx + 10*s*sx, cy + 9*s*sy, 46*s*sx, 40*s*sy);

  // Specular highlight (top-left, two-layer for depth)
  g.fillStyle(0xffffff, 0.62);
  g.fillCircle(bx - 13*s, cy - 14*s, 12*s);
  g.fillStyle(0xffffff, 0.28);
  g.fillCircle(bx - 5*s,  cy - 23*s, 5*s);

  // ── Eyes: large, round, front-facing ─────────────────
  var ex  = 13 * s * sx;   // eye offset from centre
  var ey  = cy - 6 * s;    // eye row Y
  var er  = 13 * s;        // sclera radius
  var pr  = 8  * s;        // pupil radius
  // Sclera
  g.fillStyle(0xffffff, 1);
  g.fillCircle(bx - ex, ey, er);
  g.fillCircle(bx + ex, ey, er);
  // Pupils — slight inward lean so they look at you
  g.fillStyle(0x111122, 1);
  g.fillCircle(bx - ex + 2*s, ey + 1.5*s, pr);
  g.fillCircle(bx + ex - 2*s, ey + 1.5*s, pr);
  // Glints
  g.fillStyle(0xffffff, 1);
  g.fillCircle(bx - ex,       ey - 3*s, 3*s);
  g.fillCircle(bx + ex,       ey - 3*s, 3*s);

  // ── Per-player accessory ──────────────────────────────
  var topY = bodyY - 36*s;
  if (idx === 0) {
    // Player 0 (blue): glowing antenna orb
    g.fillStyle(0x5ad4e8, 1);
    g.fillRect(bx - 2.5*s, topY - 2*s, 5*s, 12*s);
    g.fillStyle(0xffffff, 0.85);
    g.fillCircle(bx, topY - 6*s, 8*s);
    g.fillStyle(0x88ffcc, 1);
    g.fillCircle(bx, topY - 6*s, 5.5*s);
    g.fillStyle(0xffffff, 0.7);
    g.fillCircle(bx - 2*s, topY - 9*s, 2.5*s);
  } else {
    // Player 1 (red): flat cap with band
    g.fillStyle(0x222233, 1);
    g.fillEllipse(bx, topY + 4*s, 50*s*sx, 11*s);
    g.fillStyle(0x1a1028, 1);
    g.fillRect(bx - 14*s, topY - 10*s, 28*s, 16*s);
    g.fillStyle(0xff3344, 1);
    g.fillRect(bx - 14*s, topY - 12*s, 28*s, 5*s);
    g.fillStyle(0xffffff, 0.2);
    g.fillRect(bx - 10*s, topY - 10*s, 9*s, 3*s);
  }

  // Crown (winner of last round, drawn above accessories)
  if (crowned) {
    var crY = topY - 20*s;
    g.fillStyle(0xffd700, 1);
    g.fillRect(bx - 13*s, crY, 26*s, 7*s);
    g.fillTriangle(bx - 13*s, crY, bx - 13*s, crY - 11*s, bx - 6*s, crY);
    g.fillTriangle(bx - 1*s,  crY, bx,         crY - 15*s, bx + 1*s,  crY);
    g.fillTriangle(bx + 13*s, crY, bx + 13*s, crY - 11*s, bx + 6*s, crY);
    g.fillStyle(0xff3333, 1);
    g.fillCircle(bx - 10*s, crY + 3*s, 2.5*s);
    g.fillCircle(bx,         crY + 3*s, 2.5*s);
    g.fillCircle(bx + 10*s, crY + 3*s, 2.5*s);
    g.fillStyle(0xffffff, 0.38);
    g.fillRect(bx - 13*s, crY, 26*s, 2*s);
  }

  // Hit-flash: white overlay on damage
  if (flash && flash > 0) {
    g.fillStyle(0xffffff, flash * 0.88);
    g.fillEllipse(bx, cy, 68*s*sx, 68*s*sy);
  }
}

function _rp(cx, cy, x, y, cosA, sinA) {
  var dx = x - cx, dy = y - cy;
  return [cx + dx * cosA - dy * sinA, cy + dx * sinA + dy * cosA];
}

// drawDart(g, x, y, ndx, ndy, col, alpha, scaleX, scaleY)
// ndx/ndy = unit direction vector; scaleX/Y used for seep squash animation
function drawDart(g, x, y, ndx, ndy, col, alpha, scaleX, scaleY) {
  alpha  = (alpha  !== undefined) ? alpha  : 1;
  scaleX = (scaleX !== undefined) ? scaleX : 1;
  scaleY = (scaleY !== undefined) ? scaleY : 1;

  var a    = Math.atan2(ndy, ndx);
  var cosA = Math.cos(a), sinA = Math.sin(a);
  function rp(lx, ly) { return _rp(x, y, x + lx, y + ly, cosA, sinA); }

  // Outer glow
  g.fillStyle(col, 0.18 * alpha);
  g.fillEllipse(x, y, 30 * scaleX, 14 * scaleY);

  // Body: elongated teardrop pointing in travel direction
  var tip  = rp(12 * scaleX, 0);
  var bl   = rp(-8 * scaleX,  5 * scaleY);
  var br   = rp(-8 * scaleX, -5 * scaleY);
  g.fillStyle(col, alpha);
  g.fillTriangle(tip[0], tip[1], bl[0], bl[1], br[0], br[1]);

  // Rounded back blob
  g.fillStyle(col, alpha);
  g.fillEllipse(x - 2 * scaleX, y, 10 * scaleX, 10 * scaleY);

  // Trailing drip dots
  for (var ti = 1; ti <= 3; ti++) {
    var tp = rp(-10 * scaleX * (ti / 3), 0);
    g.fillStyle(col, (0.35 - ti * 0.10) * alpha);
    g.fillCircle(tp[0], tp[1], (3.5 - ti * 0.8) * scaleY);
  }

  // Bright core glint
  g.fillStyle(0xffffff, 0.60 * alpha);
  g.fillCircle(x, y, 3 * scaleY);
}

function applyState(sc, state) {
  sc._pState = state;

  // HP change detection → hit-stop + flash + shake + crown fly-off
  state.players.forEach(function(p, i) {
    if (!p) return;
    if (p.hp < sc._prevHp[i]) {
      var now = performance.now();
      sc._hitFlashEnd[i] = now + 60;
      sc._hitStopEnd     = now + 72;
      sc.cameras.main.shake(110, 0.006);
      // Crown fly-off when a crowned player is hit
      if (sc._crowned && sc._crowned[i] && sc._particles) {
        for (var cp = 0; cp < 10; cp++) {
          var ang = -Math.PI * 0.6 + (Math.random() - 0.5) * Math.PI * 1.4;
          var spd = 4 + Math.random() * 8;
          var crownSP = w2s(sc._pos[i].x, sc._pos[i].y);
          sc._particles.push({
            x: crownSP.x, y: crownSP.y - 68,
            vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd - 2,
            alpha: 1, size: 3 + Math.random() * 5, col: 0xffd700, gravity: 0.28
          });
        }
      }
    }
    sc._prevHp[i] = p.hp;
    sc.hpPips[i][0].setAlpha(p.hp > 0 ? 1 : 0.15);
  });

  // Sync crown state from server
  if (state.crowned && sc._crowned) sc._crowned = state.crowned.slice();

  // Deflect detection: dart owner changed → spark burst
  (state.darts || []).forEach(function(d) {
    var prev = sc._dartOwner[d.id];
    if (prev !== undefined && prev !== d.owner && sc._particles) {
      var dpos = sc._dartPos[d.id] || { x: d.x, y: d.y };
      var sparkCol = getDartColor(d);
      for (var dp = 0; dp < 14; dp++) {
        var ang = Math.random() * Math.PI * 2;
        var spd = 3 + Math.random() * 7;
        var dSP = w2s(dpos.x, dpos.y);
        sc._particles.push({
          x: dSP.x, y: dSP.y,
          vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd - 1,
          alpha: 1, size: 2 + Math.random() * 4, col: sparkCol, gravity: 0.14
        });
      }
      sc.cameras.main.shake(70, 0.004);
    }
    sc._dartOwner[d.id] = d.owner;
    // Record seep start the first frame we see stuck=true
    if (d.stuck && !sc._dartSeepStart[d.id]) {
      sc._dartSeepStart[d.id] = performance.now();
    }
  });
  var liveDartIds = new Set((state.darts || []).map(function(d) { return d.id; }));
  Object.keys(sc._dartOwner).forEach(function(id)     { if (!liveDartIds.has(id)) delete sc._dartOwner[id]; });
  Object.keys(sc._dartSeepStart).forEach(function(id) { if (!liveDartIds.has(id)) delete sc._dartSeepStart[id]; });

  // Bumper hit detection: leading edge only → emit bounce particles once per hit
  (state.bumpers || []).forEach(function(b) {
    var wasHit = sc._bumperWasHit[b.id] || false;
    if (b.hit && !wasHit && sc._particles) {
      sc._bumperHitEnd[b.id] = performance.now() + 280;
      var bs = BUMPERS_S.find(function(s) { return s.id === b.id; });
      if (bs) {
        var bsSP = w2s(bs.x, bs.y);
        for (var bp = 0; bp < 10; bp++) {
          var ang = Math.random() * Math.PI * 2;
          var spd = 2 + Math.random() * 5;
          sc._particles.push({
            x: bsSP.x, y: bsSP.y,
            vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd - 1,
            alpha: 0.85, size: 2 + Math.random() * 4, col: 0x33ffaa, gravity: 0.12
          });
        }
      }
    }
    sc._bumperWasHit[b.id] = b.hit;
  });

  // Slime-arm deflect animation
  sc.slashGfx.clear();
  (state.slashing || []).forEach(function(active, i) {
    if (!active || !state.players[i]) return;
    var p    = state.players[i];
    var psp  = w2s(p.x, p.y);
    var pcx  = psp.x;
    var pcy  = psp.y - 10;   // screen coords for rendering
    var base = SLIME_BASE[i];
    var dark = SLIME_DARK[i];

    // Aim arm at nearest flying enemy dart; fall back to velocity, then side
    var adx = i === 0 ? 1 : -1, ady = 0, minDist = Infinity;
    (state.darts || []).forEach(function(d) {
      if (d.owner === i || d.stuck) return;
      var dsp2 = w2s(d.x, d.y);
      var ddx = dsp2.x - pcx, ddy = dsp2.y - pcy;   // screen-space direction
      var dist = Math.hypot(ddx, ddy);
      if (dist < minDist) {
        minDist = dist;
        adx = ddx / (dist || 1);
        ady = ddy / (dist || 1);
      }
    });
    if (minDist === Infinity && sc._vel && sc._vel[i]) {
      var vspd = Math.hypot(sc._vel[i].x, sc._vel[i].y);
      if (vspd > 0.2) { adx = sc._vel[i].x / vspd; ady = sc._vel[i].y / vspd; }
    }

    var a = Math.atan2(ady, adx);
    var cosA = Math.cos(a), sinA = Math.sin(a);
    function rp(lx, ly) { return _rp(pcx, pcy, pcx + lx, pcy + ly, cosA, sinA); }

    // Faint hitbox ring (shows deflect range)
    sc.slashGfx.lineStyle(1.5, base, 0.20);
    sc.slashGfx.strokeCircle(pcx, pcy, 62);

    // Arm stretch: tapered from body edge to blob tip
    var q1 = rp(28,   16);
    var q2 = rp(28,  -16);
    var q3 = rp(64,   11);
    var q4 = rp(64,  -11);
    sc.slashGfx.fillStyle(base, 0.80);
    sc.slashGfx.fillTriangle(q1[0],q1[1], q2[0],q2[1], q4[0],q4[1]);
    sc.slashGfx.fillTriangle(q1[0],q1[1], q3[0],q3[1], q4[0],q4[1]);

    // Tip blob (the shield)
    var tip = rp(72, 0);
    sc.slashGfx.fillStyle(base, 0.90);
    sc.slashGfx.fillCircle(tip[0], tip[1], 24);

    // Underside shading
    sc.slashGfx.fillStyle(dark, 0.22);
    var shade = rp(76, 7);
    sc.slashGfx.fillCircle(shade[0], shade[1], 18);

    // Specular glint
    sc.slashGfx.fillStyle(0xffffff, 0.48);
    var glint = rp(64, -8);
    sc.slashGfx.fillCircle(glint[0], glint[1], 8);

    // Trailing drip off tip
    sc.slashGfx.fillStyle(base, 0.42);
    var drip1 = rp(96, 2);
    var drip2 = rp(108, 5);
    sc.slashGfx.fillCircle(drip1[0], drip1[1], 9);
    sc.slashGfx.fillCircle(drip2[0], drip2[1], 5);
  });

  // Round score
  if (state.rounds_won && sc._roundScoreText) {
    state.rounds_won.forEach(function(w, i) {
      sc._roundScoreText[i].setText(w);
    });
  }

  // Round over: slow-mo + shake + overlay (no end buttons yet)
  if (state.phase === 'round_over' && state.winner !== null && !sc._roundOverShown) {
    sc._roundOverShown = true;
    var won = (state.winner === playerSlot);
    sc.overlayBg.setFillStyle(0x000000, 0.55).setAlpha(1).setVisible(true);
    sc.overlayText.setText(won ? '★  ROUND WON  ★' : '✗  ROUND LOST  ✗')
                  .setAlpha(1).setVisible(true);
    sc.cameras.main.shake(320, 0.013);
    sc._slowMoEnd = performance.now() + 500;
    // Splat + particle burst on the loser
    var loserId = state.winner === 0 ? 1 : 0;
    var lx = sc._pos[loserId].x, ly = sc._pos[loserId].y;
    if (!sc._splats.length) {
      sc._splats.push({ slot: loserId, x: lx, y: ly, alpha: 1 });   // world Y — converted at render
    }
    var burstCol = [0x4fc3f7, 0xff6b6b][loserId];
    var loserSP = w2s(lx, ly);
    for (var bp = 0; bp < 24; bp++) {
      var ang = Math.random() * Math.PI * 2;
      var spd = 2 + Math.random() * 10;
      sc._particles.push({
        x: loserSP.x, y: loserSP.y,
        vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd - 3,
        alpha: 0.9 + Math.random() * 0.1,
        size: 3 + Math.random() * 9, col: burstCol, gravity: 0.18
      });
    }
  }

  // New round started (server resets to 'playing')
  if (state.phase === 'playing' && sc._roundOverShown) {
    sc._roundOverShown = false;
    sc._prevHp         = [1, 1];
    sc._hitFlashEnd    = [0, 0];
    sc._splats         = [];
    sc._particles      = [];
    sc._walkTrail      = [[], []];
    sc._dartPos        = {};
    sc._dartTrail      = {};
    sc._dartSeepStart  = {};
    sc._dartOwner      = {};
    sc._bumperHitEnd   = {};
    sc._bumperWasHit   = {};
    sc._splatGfx.clear();
    sc.overlayText.setVisible(false);
    sc.overlayBg.setVisible(false);
    _showCountdown(sc);
  }

  // Match over
  if (state.phase === 'game_over' && !sc._gameOver) {
    sc._gameOver = true;
    sc.cameras.main.shake(450, 0.015);
    sc._slowMoEnd = performance.now() + 600;
    var rw  = state.rounds_won || [0, 0];
    var mw  = state.match_winner;
    var txt = (mw === playerSlot ? 'YOU WIN!' : 'YOU LOSE') + '\n' + rw[0] + ' — ' + rw[1];
    showOverlay(sc, txt);
  }
}

function showOverlay(sc, text) {
  sc.overlayBg.setFillStyle(0x000000, 0.65).setVisible(true);
  sc.overlayText.setText(text).setVisible(true);
  var es = document.getElementById('endscreen');
  if (es) es.style.display = 'flex';
}

// ── Countdown ─────────────────────────────────────────────────────────────────
function _showCountdown(sc) {
  if (!sc._countdownText) return;
  var nums = ['3', '2', '1', 'GO!'];
  var i = 0;
  (function tick() {
    if (i >= nums.length) { sc._countdownText.setVisible(false); return; }
    sc._countdownText.setText(nums[i]).setScale(1.3).setAlpha(1).setVisible(true);
    sc.tweens.add({
      targets: sc._countdownText,
      alpha: 0, scaleX: 0.7, scaleY: 0.7,
      duration: 650, ease: 'Power2',
      onComplete: function() { i++; tick(); }
    });
  })();
}

// ── Phaser ────────────────────────────────────────────────────────────────────
function launchPhaser() {

  // Arena geometry (matches server physics boundary)
  const FL = 26, FR = 1414, FT = 46, FB = 764;
  const WALL_H = 46;   // wall face height in screen px
  const LEDGE  = 14;   // world-unit depth of wall ledge cap

  // Wall palette — 4 distinct face shades + cap + crevice + edge
  const W_CAP   = 0xf2eeff;  // ledge top face — most lit
  const W_LEFT  = 0x7050b4;  // x=FL side face
  const W_BACK  = 0x4e3a94;  // y=FT back face — darkest
  const W_RIGHT = 0x8a68c4;  // x=FR near-right face
  const W_NEAR  = 0xa884d4;  // y=FB near-front face — brightest face
  const W_DEEP  = 0x120c30;  // crevice shadow
  const W_EDGE  = 0xfcf8ff;  // crisp edge highlight

  // Floor palette
  const F_BG   = 0x070418;
  const F_DARK = 0x0e082a;
  const F_MID  = 0x1a1238;
  const F_LINE = 0x2e1e98;
  const F_GLOW = 0x5840bc;

  return new Phaser.Game({
    type: Phaser.AUTO,
    backgroundColor: '#070418',
    parent: 'game-wrap',
    input: { mouse: { preventDefaultDown: true } },
    scale: {
      mode: Phaser.Scale.FIT,
      autoCenter: Phaser.Scale.CENTER_BOTH,
      width: 1440,
      height: 810,
    },
    scene: {
      key: 'GameScene',
      preload() {},

      create() {
        scene = this;
        const g = this.add.graphics();

        // ── Pre-compute all screen-space corner positions ─────────────
        const cTL = w2s(FL, FT);
        const cTR = w2s(FR, FT);
        const cBR = w2s(FR, FB);
        const cBL = w2s(FL, FB);

        // Ledge inset corners (LEDGE world units in from each wall edge)
        const lL1 = w2s(FL+LEDGE, FT), lL2 = w2s(FL+LEDGE, FB);
        const lB1 = w2s(FL, FT+LEDGE), lB2 = w2s(FR, FT+LEDGE);
        const lR1 = w2s(FR-LEDGE, FT), lR2 = w2s(FR-LEDGE, FB);
        const lN1 = w2s(FL, FB-LEDGE), lN2 = w2s(FR, FB-LEDGE);

        // ── 1. Background void ──────────────────────────────────────────
        g.fillStyle(F_BG, 1);
        g.fillRect(0, 0, 1440, 810);

        // ── 2. Far-left wall face (world x=FL, cTL→cBL) ────────────────
        g.fillStyle(W_LEFT, 1);
        g.fillPoints([cTL, cBL,
          {x:cBL.x,y:cBL.y-WALL_H}, {x:cTL.x,y:cTL.y-WALL_H}], true);
        g.lineStyle(1, W_DEEP, 0.18);
        for (let h = 18; h < WALL_H; h += 18)
          g.lineBetween(cTL.x, cTL.y-h, cBL.x, cBL.y-h);
        // Ledge cap on top of left wall
        g.fillStyle(W_CAP, 0.88);
        g.fillPoints([
          {x:cTL.x,y:cTL.y-WALL_H}, {x:cBL.x,y:cBL.y-WALL_H},
          {x:lL2.x,y:lL2.y-WALL_H}, {x:lL1.x,y:lL1.y-WALL_H}
        ], true);

        // ── 3. Far-back wall face (world y=FT, cTL→cTR) ────────────────
        g.fillStyle(W_BACK, 1);
        g.fillPoints([cTL, cTR,
          {x:cTR.x,y:cTR.y-WALL_H}, {x:cTL.x,y:cTL.y-WALL_H}], true);
        g.lineStyle(1, W_DEEP, 0.15);
        for (let h = 18; h < WALL_H; h += 18)
          g.lineBetween(cTL.x, cTL.y-h, cTR.x, cTR.y-h);
        // Ledge cap on top of back wall
        g.fillStyle(W_CAP, 0.82);
        g.fillPoints([
          {x:cTL.x,y:cTL.y-WALL_H}, {x:cTR.x,y:cTR.y-WALL_H},
          {x:lB2.x,y:lB2.y-WALL_H}, {x:lB1.x,y:lB1.y-WALL_H}
        ], true);

        // ── 4. Far wall top-edge highlights ────────────────────────────
        g.lineStyle(2.5, W_EDGE, 0.80);
        g.lineBetween(cTL.x, cTL.y-WALL_H, cBL.x, cBL.y-WALL_H);
        g.lineBetween(cTL.x, cTL.y-WALL_H, cTR.x, cTR.y-WALL_H);
        // Corner post at cTL
        g.lineStyle(2, W_EDGE, 0.60);
        g.lineBetween(cTL.x, cTL.y, cTL.x, cTL.y-WALL_H);

        // ── 5. Floor diamond ────────────────────────────────────────────
        g.fillGradientStyle(F_DARK, F_DARK, F_MID, F_MID);
        g.fillPoints([cTL, cTR, cBR, cBL], true);

        // ── 6. Floor/wall seam lines ────────────────────────────────────
        g.lineStyle(1.5, W_EDGE, 0.28);
        g.lineBetween(cTL.x, cTL.y, cBL.x, cBL.y);
        g.lineBetween(cTL.x, cTL.y, cTR.x, cTR.y);

        // ── 7. Isometric tile grid ──────────────────────────────────────
        const TW = 90, TH = 70;
        g.lineStyle(1, F_LINE, 0.13);
        for (let wx = FL; wx <= FR; wx += TW) {
          const t = w2s(wx, FT), b = w2s(wx, FB);
          g.lineBetween(t.x, t.y, b.x, b.y);
        }
        for (let wy = FT; wy <= FB; wy += TH) {
          const l = w2s(FL, wy), r = w2s(FR, wy);
          g.lineBetween(l.x, l.y, r.x, r.y);
        }
        // Subtle checkerboard
        for (let row = 0; row < Math.ceil((FB-FT)/TH); row++) {
          for (let col = 0; col < Math.ceil((FR-FL)/TW); col++) {
            if ((row+col)%2 === 0) {
              const p1=w2s(FL+col*TW,     FT+row*TH);
              const p2=w2s(FL+col*TW+TW,  FT+row*TH);
              const p3=w2s(FL+col*TW+TW,  FT+row*TH+TH);
              const p4=w2s(FL+col*TW,     FT+row*TH+TH);
              g.fillStyle(0xffffff, 0.022);
              g.fillPoints([p1,p2,p3,p4], true);
            }
          }
        }

        // ── 8. Center rings + crosshairs ────────────────────────────────
        const cI = [w2s(ISO_WCX+175,ISO_WCY), w2s(ISO_WCX,ISO_WCY+175),
                    w2s(ISO_WCX-175,ISO_WCY), w2s(ISO_WCX,ISO_WCY-175)];
        const cO = [w2s(ISO_WCX+360,ISO_WCY), w2s(ISO_WCX,ISO_WCY+360),
                    w2s(ISO_WCX-360,ISO_WCY), w2s(ISO_WCX,ISO_WCY-360)];
        g.lineStyle(2.5, F_GLOW, 0.50);
        g.strokePoints(cI, true);
        g.lineStyle(1, F_GLOW, 0.18);
        g.strokePoints(cO, true);
        g.lineStyle(1, F_GLOW, 0.10);
        g.lineBetween(cI[0].x,cI[0].y, cI[2].x,cI[2].y);
        g.lineBetween(cI[1].x,cI[1].y, cI[3].x,cI[3].y);

        // ── 9. Depth haze (far corner darker) ──────────────────────────
        g.fillGradientStyle(0x000000,0x000000,0x000000,0x000000, 0.32,0.08,0,0);
        g.fillPoints([cTL, cTR, cBR, cBL], true);

        // ── Dynamic layers (order = depth order) ──────
        this._hazardGfx = this.add.graphics();   // grates + belts + bumpers — above floor
        this._wallGfx   = this.add.graphics();   // moving wall slabs
        this._splatGfx  = this.add.graphics();   // goo puddles
        this.slashGfx  = this.add.graphics();
        this.boomGfx   = this.add.graphics();
        this.slimeGfx  = this.add.graphics();

        // ── Near-wall overlay — drawn above slimes for correct depth occlusion ──
        this._nearWallGfx = this.add.graphics();
        const nw = this._nearWallGfx;

        // Near-right wall face (world x=FR, cTR→cBR)
        nw.fillStyle(W_RIGHT, 1);
        nw.fillPoints([cTR, cBR,
          {x:cBR.x,y:cBR.y-WALL_H}, {x:cTR.x,y:cTR.y-WALL_H}], true);
        nw.lineStyle(1, W_DEEP, 0.18);
        for (let h = 18; h < WALL_H; h += 18)
          nw.lineBetween(cTR.x, cTR.y-h, cBR.x, cBR.y-h);
        // Ledge cap
        nw.fillStyle(W_CAP, 0.90);
        nw.fillPoints([
          {x:cTR.x,y:cTR.y-WALL_H}, {x:cBR.x,y:cBR.y-WALL_H},
          {x:lR2.x,y:lR2.y-WALL_H}, {x:lR1.x,y:lR1.y-WALL_H}
        ], true);

        // Near-front wall face (world y=FB, cBL→cBR) — brightest, closest to viewer
        nw.fillStyle(W_NEAR, 1);
        nw.fillPoints([cBL, cBR,
          {x:cBR.x,y:cBR.y-WALL_H}, {x:cBL.x,y:cBL.y-WALL_H}], true);
        nw.lineStyle(1, W_DEEP, 0.20);
        for (let h = 18; h < WALL_H; h += 18)
          nw.lineBetween(cBL.x, cBL.y-h, cBR.x, cBR.y-h);
        // Ledge cap
        nw.fillStyle(W_CAP, 0.95);
        nw.fillPoints([
          {x:cBL.x,y:cBL.y-WALL_H}, {x:cBR.x,y:cBR.y-WALL_H},
          {x:lN2.x,y:lN2.y-WALL_H}, {x:lN1.x,y:lN1.y-WALL_H}
        ], true);

        // Inner ledge shadow lines
        nw.lineStyle(1, W_DEEP, 0.30);
        nw.lineBetween(lR1.x, lR1.y-WALL_H, lR2.x, lR2.y-WALL_H);
        nw.lineBetween(lN1.x, lN1.y-WALL_H, lN2.x, lN2.y-WALL_H);

        // Top-edge highlights (bright rim on each wall top)
        nw.lineStyle(2.5, W_EDGE, 0.92);
        nw.lineBetween(cBL.x, cBL.y-WALL_H, cBR.x, cBR.y-WALL_H);
        nw.lineBetween(cTR.x, cTR.y-WALL_H, cBR.x, cBR.y-WALL_H);

        // Corner post at cBR — vertical edge where both near walls meet
        nw.lineStyle(3, W_EDGE, 0.95);
        nw.lineBetween(cBR.x, cBR.y, cBR.x, cBR.y-WALL_H);

        // Floor seam lines
        nw.lineStyle(1.5, W_EDGE, 0.32);
        nw.lineBetween(cBL.x, cBL.y, cBR.x, cBR.y);
        nw.lineBetween(cTR.x, cTR.y, cBR.x, cBR.y);

        // ── Name labels ───────────────────────────────
        this.nameLabels = [
          this.add.text(0, 0, '', {
            fontSize: '11px', color: '#0d2b3e',
            stroke: '#ffffff', strokeThickness: 3,
          }).setOrigin(0.5),
          this.add.text(0, 0, '', {
            fontSize: '11px', color: '#3e0d0d',
            stroke: '#ffffff', strokeThickness: 3,
          }).setOrigin(0.5),
        ];

        // ── HP pips (corner) ──────────────────────────
        this.hpPips = [[], []];
        for (let s = 0; s < 2; s++) {
          const x = s === 0 ? 40 : 1400;
          this.hpPips[s].push(this.add.circle(x, 22, 10, HP_COLORS[s]));
        }

        // ── Round score ───────────────────────────────
        this._roundScoreText = [
          this.add.text(60, 22, '0', {
            fontSize: '18px', color: '#4fc3f7', fontStyle: 'bold',
            stroke: '#000000', strokeThickness: 3,
          }).setOrigin(0, 0.5),
          this.add.text(1380, 22, '0', {
            fontSize: '18px', color: '#ff6b6b', fontStyle: 'bold',
            stroke: '#000000', strokeThickness: 3,
          }).setOrigin(1, 0.5),
        ];

        // ── Floating HP dots above each slime ─────────
        this._floatHp = [
          this.add.circle(0, 0, 7, HP_COLORS[0]),
          this.add.circle(0, 0, 7, HP_COLORS[1]),
        ];

        // ── Throw charge bar ──────────────────────────
        this.add.text(720, 790, 'RELOAD', {
          fontSize: '9px', color: '#a0a0c0', letterSpacing: 3,
        }).setOrigin(0.5);
        this.cooldownBg  = this.add.rectangle(720, 800, 140, 6, 0x3a2860);
        this.cooldownBar = this.add.rectangle(650, 800, 0, 6, SLIME_BASE[playerSlot ?? 0]).setOrigin(0, 0.5);

        // ── Overlay ───────────────────────────────────
        this.overlayBg   = this.add.rectangle(720, 405, 1440, 810, 0x000000, 0).setVisible(false);
        this.overlayText = this.add.text(720, 405, '', {
          fontSize: '52px', fontStyle: 'bold', color: '#ffffff',
          stroke: '#000000', strokeThickness: 6,
          align: 'center',
        }).setOrigin(0.5).setVisible(false);

        // ── Countdown ─────────────────────────────────
        this._countdownText = this.add.text(720, 360, '', {
          fontSize: '128px', fontStyle: 'bold', color: '#ffffff',
          stroke: '#1a0030', strokeThickness: 14,
        }).setOrigin(0.5).setVisible(false);

        // ── Interpolation state ───────────────────────
        this._pos      = [{ x: 360, y: 405 }, { x: 1080, y: 405 }];
        this._pState   = null;
        this._dartPos  = {};
        this._gameOver = false;
        this._vel  = [{ x: 0, y: 0 }, { x: 0, y: 0 }];
        this._hist = [[], []];

        // ── Juice state ───────────────────────────────
        this._hitFlashEnd    = [0, 0];
        this._hitStopEnd     = 0;
        this._slowMoEnd      = 0;
        this._prevHp         = [1, 1];
        this._dartTrail      = {};
        this._dartSeepStart  = {};
        this._dartOwner      = {};
        this._splats         = [];
        this._roundOverShown = false;
        this._particles      = [];
        this._walkTrail      = [[], []];
        this._walkTimer      = [0, 0];
        this._crowned        = [false, false];
        this._dashWindup     = [0, 0];
        this._wasDashing     = [false, false];
        this._bumperHitEnd   = {};
        this._bumperWasHit   = {};
        this._beltOffset     = 0;
        this._mouseX = 720;
        this._mouseY = 405;
        this.input.on('pointermove', (ptr) => {
          this._mouseX = ptr.x;
          this._mouseY = ptr.y;
        });

        this.input.on('pointerdown', (ptr) => {
          if (!ws || ws.readyState !== WebSocket.OPEN || playerSlot === null) return;
          if (ptr.rightButtonDown()) {
            // Shoot dart toward cursor — server rejects if dart already in play
            var me = this._pos[playerSlot];
            var aim = s2w(ptr.x, ptr.y);
            var dx = aim.x - me.x, dy = aim.y - me.y;
            var len = Math.hypot(dx, dy) || 1;
            ws.send(JSON.stringify({ type: 'shoot', dx: dx / len, dy: dy / len }));
          } else if (ptr.leftButtonDown()) {
            ws.send(JSON.stringify({ type: 'slash' }));
          }
        });

        // Flush any state messages that arrived before Phaser finished init
        while (_pendingStates.length) applyState(this, _pendingStates.shift());

        // Show initial countdown
        _showCountdown(this);
      },

      update() {
        var state = this._pState;
        if (!state) return;

        var now = performance.now();
        var dt  = this.game.loop.delta || 16.67;

        // ── Time effects (hit-stop / slow-mo) ────────
        if (now < this._hitStopEnd) {
          this.game.loop.timeScale = 0.04;
        } else if (now < this._slowMoEnd) {
          this.game.loop.timeScale = 0.28;
        } else if (this.game.loop.timeScale !== 1.0) {
          this.game.loop.timeScale = 1.0;
        }
        // dt-independent LERP: same visual feel regardless of framerate
        var LERP = (now < this._hitStopEnd) ? 0 : 1 - Math.pow(0.75, dt / (1000 / 60));

        // ── Hazards: grates, conveyor belts, bumpers ──
        this._hazardGfx.clear();
        var hg   = this._hazardGfx;
        var self = this;
        this._beltOffset = (this._beltOffset + 1) % 200;

        // Floor grates — grid bars slow players who stand on them
        GRATES_S.forEach(function(gr) {
          var gp1 = w2s(gr.x,        gr.y);
          var gp2 = w2s(gr.x + gr.w, gr.y);
          var gp3 = w2s(gr.x + gr.w, gr.y + gr.h);
          var gp4 = w2s(gr.x,        gr.y + gr.h);
          hg.fillStyle(0x0c0820, 0.80);
          hg.fillPoints([gp1, gp2, gp3, gp4], true);
          hg.lineStyle(1.5, 0x3a2060, 0.80);
          for (var gx = gr.x + 20; gx < gr.x + gr.w; gx += 20) {
            var ga = w2s(gx, gr.y), gb = w2s(gx, gr.y + gr.h);
            hg.lineBetween(ga.x, ga.y, gb.x, gb.y);
          }
          for (var gy = gr.y + 20; gy < gr.y + gr.h; gy += 20) {
            var ga = w2s(gr.x, gy), gb = w2s(gr.x + gr.w, gy);
            hg.lineBetween(ga.x, ga.y, gb.x, gb.y);
          }
          hg.lineStyle(2, 0x5533aa, 0.55);
          hg.strokePoints([gp1, gp2, gp3, gp4], true);
        });

        // Conveyor belts — scrolling chevron arrows show push direction
        BELTS_S.forEach(function(belt) {
          var bp1 = w2s(belt.x - belt.w/2, belt.y - belt.h/2);
          var bp2 = w2s(belt.x + belt.w/2, belt.y - belt.h/2);
          var bp3 = w2s(belt.x + belt.w/2, belt.y + belt.h/2);
          var bp4 = w2s(belt.x - belt.w/2, belt.y + belt.h/2);
          hg.fillStyle(0x1a0c3a, 0.88);
          hg.fillPoints([bp1, bp2, bp3, bp4], true);
          var dir = belt.vx > 0 ? 1 : -1;
          var off = ((self._beltOffset * dir) % 40 + 40) % 40;
          var iD  = isoDir(dir, 0);
          var arH = 9;
          for (var ax = belt.x - belt.w/2 + off - 40; ax < belt.x + belt.w/2 + 40; ax += 40) {
            if (ax < belt.x - belt.w/2 || ax > belt.x + belt.w/2) continue;
            var arSP = w2s(ax, belt.y);
            hg.fillStyle(0x9966ff, 0.58);
            hg.fillTriangle(arSP.x + iD.x * 14, arSP.y + iD.y * 14,
                            arSP.x - iD.y * arH, arSP.y + iD.x * arH,
                            arSP.x + iD.y * arH, arSP.y - iD.x * arH);
          }
          hg.lineStyle(2, 0xbb88ff, 0.68);
          hg.strokePoints([bp1, bp2, bp3, bp4], true);
        });

        // Jelly bumpers — isometric ellipses lying flat on the projected floor
        BUMPERS_S.forEach(function(b) {
          var bSP  = w2s(b.x, b.y);
          var hitT = self._bumperHitEnd[b.id]
                     ? Math.max(0, (self._bumperHitEnd[b.id] - now) / 280) : 0;
          var sqX  = 1 + hitT * 0.42;
          var sqY  = 1 - hitT * 0.30;
          var ew   = b.r * ISO_S * Math.SQRT2 * 2;   // projected circle width (2:1 iso)
          var eh   = ew * 0.5;
          hg.lineStyle(4, 0x33ffaa, 0.18 + hitT * 0.48);
          hg.strokeEllipse(bSP.x, bSP.y, (ew + 32) * sqX, (eh + 16) * sqY);
          hg.fillStyle(0x11cc88, 0.80 + hitT * 0.20);
          hg.fillEllipse(bSP.x, bSP.y, ew * sqX, eh * sqY);
          hg.lineStyle(2, 0x0a8855, 0.90);
          hg.strokeEllipse(bSP.x, bSP.y, ew * sqX, eh * sqY);
          hg.fillStyle(0xaaffdd, 0.55);
          hg.fillCircle(bSP.x - ew * 0.14, bSP.y - eh * 0.16, b.r * 0.22);
          if (hitT > 0.05) {
            hg.fillStyle(0xffffff, hitT * 0.78);
            hg.fillCircle(bSP.x, bSP.y, b.r * 0.38 * sqX);
          }
        });

        // ── Moving walls ──────────────────────────────
        this._wallGfx.clear();
        (state.walls || []).forEach((w) => {
          if (w.extend < 2) return;
          var ext = w.extend;
          var wx  = w.side === 'left' ? FL : FR - ext;
          var y0  = w.y - w.h / 2, y1 = w.y + w.h / 2;
          var wTL = w2s(wx,       y0);
          var wTR = w2s(wx + ext, y0);
          var wBR = w2s(wx + ext, y1);
          var wBL = w2s(wx,       y1);
          var WH  = 28;
          var wg  = this._wallGfx;
          // Top face (iso roof)
          wg.fillStyle(W_CAP, 1);
          wg.fillPoints([{x:wTL.x,y:wTL.y-WH},{x:wTR.x,y:wTR.y-WH},
                         {x:wBR.x,y:wBR.y-WH},{x:wBL.x,y:wBL.y-WH}], true);
          // Near face (bottom iso edge)
          wg.fillStyle(W_NEAR, 1);
          wg.fillPoints([wBL, wBR,
                         {x:wBR.x,y:wBR.y-WH}, {x:wBL.x,y:wBL.y-WH}], true);
          wg.lineStyle(1, W_DEEP, 0.38);
          for (var ty = 8; ty < WH; ty += 10)
            wg.lineBetween(wBL.x, wBL.y - ty, wBR.x, wBR.y - ty);
          wg.lineStyle(2, W_EDGE, 0.88);
          wg.lineBetween(wBL.x, wBL.y - WH, wBR.x, wBR.y - WH);
        });

        // ── _splatGfx: walk trail + splats + particles ─
        this._splatGfx.clear();
        var sg = this._splatGfx;

        // Walk trail droplets (faint streaks left while sliding)
        for (var ti = 0; ti < 2; ti++) {
          var wtr = this._walkTrail[ti];
          for (var td = 0; td < wtr.length; td++) {
            var tr = wtr[td];
            if (tr.alpha <= 0) continue;
            sg.fillStyle(SLIME_BASE[ti], tr.alpha * 0.28);
            sg.fillEllipse(tr.x, tr.y + 4, 16, 7);
          }
        }

        // Splats (large goo puddles on death)
        this._splats.forEach(function(sp) {
          if (sp.alpha <= 0) return;
          var c   = [0x4fc3f7, 0xff6b6b][sp.slot];
          var dk  = [0x1a7aaa, 0xc0392b][sp.slot];
          var sSP = w2s(sp.x, sp.y);
          sg.fillStyle(c, sp.alpha * 0.80);
          sg.fillEllipse(sSP.x, sSP.y + 6, 90, 28);
          sg.fillStyle(dk, sp.alpha * 0.42);
          sg.fillEllipse(sSP.x + 10, sSP.y + 10, 44, 16);
          sg.fillStyle(c, sp.alpha * 0.52);
          sg.fillEllipse(sSP.x - 38, sSP.y + 8, 22, 14);
          sg.fillEllipse(sSP.x + 44, sSP.y + 6, 18, 12);
          sg.fillEllipse(sSP.x + 4, sSP.y + 22, 24, 12);
          sp.alpha = Math.max(0, sp.alpha - 0.0018);
        });

        // Particles (burst + crown fly-off — simulate and render each frame)
        var aliveParticles = [];
        for (var pi = 0; pi < this._particles.length; pi++) {
          var pk = this._particles[pi];
          pk.vx    *= 0.93;
          pk.vy    += pk.gravity;
          pk.x     += pk.vx;
          pk.y     += pk.vy;
          pk.alpha  = Math.max(0, pk.alpha - 0.026);
          if (pk.alpha > 0) {
            sg.fillStyle(pk.col, pk.alpha);
            sg.fillCircle(pk.x, pk.y, pk.size);
            aliveParticles.push(pk);
          }
        }
        this._particles = aliveParticles;

        // ── Y-depth sort ──────────────────────────────
        var self  = this;
        var order = [0, 1].filter(function(i) { return state.players[i]; })
                          .sort(function(a, b) { return self._pos[a].y - self._pos[b].y; });

        this.slimeGfx.clear();
        order.forEach(function(i) {
          var p = state.players[i];
          if (!p) return;

          // dt-independent LERP position
          var prevX = self._pos[i].x, prevY = self._pos[i].y;
          self._pos[i].x += (p.x - self._pos[i].x) * LERP;
          self._pos[i].y += (p.y - self._pos[i].y) * LERP;

          // Smoothed velocity (EMA)
          var rawVx = self._pos[i].x - prevX;
          var rawVy = self._pos[i].y - prevY;
          self._vel[i].x = self._vel[i].x * 0.65 + rawVx * 0.35;
          self._vel[i].y = self._vel[i].y * 0.65 + rawVy * 0.35;
          var vx = self._vel[i].x, vy = self._vel[i].y;
          var speed = Math.hypot(vx, vy);

          // Position history (for dash ghost trail) — store screen coords
          var iSP   = w2s(self._pos[i].x, self._pos[i].y);
          var floorX = iSP.x;
          var floorY = iSP.y;
          self._hist[i].unshift({ x: floorX, y: floorY });
          if (self._hist[i].length > 6) self._hist[i].length = 6;

          // Y-depth scale (uses world Y for correct depth ordering)
          var normY  = Math.max(0, Math.min(1, (self._pos[i].y - FT) / (FB - FT)));
          var scale  = 0.82 + 0.18 * normY;
          var bodyY  = floorY - 38 * scale;

          var dashing = state.dashing && state.dashing[i];

          // Walking wetness trail: push a droplet every 4 frames while sliding
          self._walkTimer[i] = (self._walkTimer[i] || 0) + 1;
          if (!dashing && speed > 0.4 && self._walkTimer[i] % 4 === 0) {
            self._walkTrail[i].push({
              x: floorX + (Math.random() - 0.5) * 8,
              y: floorY,
              alpha: 0.50,
            });
          }
          // Fade existing trail entries
          for (var wj = self._walkTrail[i].length - 1; wj >= 0; wj--) {
            self._walkTrail[i][wj].alpha -= 0.0006;
            if (self._walkTrail[i][wj].alpha <= 0) self._walkTrail[i].splice(wj, 1);
          }

          // Slingshot windup: detect dash start, countdown squash frames
          var wasDash = self._wasDashing[i];
          if (dashing && !wasDash) self._dashWindup[i] = 5;
          if (self._dashWindup[i] > 0) self._dashWindup[i]--;
          self._wasDashing[i] = !!dashing;
          var windupT = self._dashWindup[i] / 5;  // 1→0 during anticipation frames

          // Squish: slingshot anticipation > dash stretch > walk lean > idle jiggle
          var squishX = 1, squishY = 1, leanX = 0;
          if (windupT > 0) {
            // Wide squash frames just before the dash fires — slingshot anticipation
            squishX = 1 + windupT * 0.45;
            squishY = 1 - windupT * 0.38;
          } else if (dashing && speed > 0.3) {
            var nx = vx / speed, ny = vy / speed;
            squishX = 1 + nx * nx * 0.65 - ny * ny * 0.35;
            squishY = 1 + ny * ny * 0.65 - nx * nx * 0.35;
            leanX   = nx * 14;
          } else if (speed > 0.15) {
            var nx = vx / speed, ny = vy / speed;
            var str = Math.min(speed * 0.1, 0.18);
            squishX = 1 + nx * nx * str - ny * ny * str * 0.5;
            squishY = 1 + ny * ny * str - nx * nx * str * 0.5;
            leanX   = nx * Math.min(speed, 1.5) * 5;
          }

          // Idle jiggle when still (and not in windup)
          if (speed < 0.18 && !dashing && windupT === 0) {
            var jt  = self.time.now * 0.0025 + i * Math.PI;
            var jig = Math.sin(jt) * 0.048;
            squishX = 1 + jig * 0.6;
            squishY = 1 - jig;
          }

          // Charge wind-up: squeeze wide, stretch tall
          var cr = (state.charge && state.charge[i]) || 0;
          if (cr > 0.08) {
            squishX *= (1 - cr * 0.16);
            squishY *= (1 + cr * 0.20);
          }

          // Charge ring
          if (cr > 0.02) {
            var ringR = (42 + cr * 28) * scale;
            self.slimeGfx.lineStyle(2 + cr * 2.5, SLIME_BASE[i], 0.25 + cr * 0.6);
            self.slimeGfx.strokeCircle(floorX, bodyY - 4 * scale, ringR);
            if (cr > 0.85) {
              self.slimeGfx.lineStyle(3, 0xffffff, (cr - 0.85) * 3.5);
              self.slimeGfx.strokeCircle(floorX, bodyY - 4 * scale, ringR + 6 * scale);
            }
          }

          // Floor glow
          self.slimeGfx.fillStyle(SLIME_BASE[i], 0.09);
          self.slimeGfx.fillEllipse(floorX + leanX * 0.1, floorY + 5 * scale, 96 * scale * squishX, 30 * scale);

          // Dash trail
          if (dashing) {
            self.slimeGfx.fillStyle(SLIME_BASE[i], 0.12);
            self.slimeGfx.fillCircle(floorX - leanX * 0.5, floorY - 16 * scale, 80 * scale);
            [0.38, 0.2, 0.1].forEach(function(alpha, gi) {
              var h = self._hist[i][gi + 2];
              if (!h) return;
              var ts = scale * (1 - gi * 0.05);
              var tby = h.y - 38 * ts;
              self.slimeGfx.fillStyle(SLIME_BASE[i], alpha);
              self.slimeGfx.fillEllipse(h.x, tby + 18*ts*squishY, 62*ts*squishX, 28*ts*squishY);
              self.slimeGfx.fillCircle(h.x, tby - 2*ts, 32*ts*squishX);
            });
          }

          // Hit flash (white overlay, decays over ~60 ms)
          var flashEnd = self._hitFlashEnd[i] || 0;
          var flash    = flashEnd > now ? Math.min(1, (flashEnd - now) / 60) : 0;

          var crowned = self._crowned && self._crowned[i];
          drawSlime(self.slimeGfx, floorX, floorY, bodyY, i, scale, squishX, squishY, leanX, flash, crowned);

          // "You" indicator ring
          if (i === playerSlot) {
            self.slimeGfx.lineStyle(2, 0xffffff, 0.42);
            self.slimeGfx.strokeEllipse(floorX, floorY + 6 * scale, 64*scale*squishX, 18*scale);
          }
          // Grate slow indicator: purple pulse under slime
          var onGrate = GRATES_S.some(function(gr) {
            return self._pos[i].x >= gr.x && self._pos[i].x <= gr.x + gr.w &&
                   self._pos[i].y >= gr.y && self._pos[i].y <= gr.y + gr.h;
          });
          if (onGrate) {
            self.slimeGfx.lineStyle(2, 0x7744ee, 0.60);
            self.slimeGfx.strokeEllipse(floorX, floorY + 4 * scale, 72*scale*squishX, 22*scale);
          }
          self.nameLabels[i].setPosition(floorX + leanX * 0.4, bodyY - 50 * scale).setText(p.username);

          // Floating HP dot
          if (self._floatHp[i]) {
            self._floatHp[i]
              .setPosition(floorX, bodyY - 60 * scale)
              .setRadius(6 * scale)
              .setAlpha(p.hp > 0 ? 0.82 : 0);
          }
        });

        // ── Aim arrow (local player, dart ready) ──────
        if (playerSlot !== null && state.dart_ready && state.dart_ready[playerSlot]) {
          var meSP = w2s(this._pos[playerSlot].x, this._pos[playerSlot].y);
          var meCx = meSP.x;
          var meCy = meSP.y - 10;
          var adx2 = this._mouseX - meCx;
          var ady2 = this._mouseY - meCy;   // both in screen space
          var alen2 = Math.hypot(adx2, ady2) || 1;
          var ndx2 = adx2 / alen2, ndy2 = ady2 / alen2;
          var acol = SLIME_BASE[playerSlot];
          var ang2 = Math.atan2(ndy2, ndx2);
          var cosA2 = Math.cos(ang2), sinA2 = Math.sin(ang2);
          var lx2 = meCx + ndx2 * DART_RANGE_PX;
          var ly2 = meCy + ndy2 * DART_RANGE_PX;

          // Dotted flight path
          for (var ri = 0.14; ri < 0.95; ri += 0.10) {
            this.slimeGfx.fillStyle(acol, 0.13);
            this.slimeGfx.fillCircle(meCx + ndx2 * DART_RANGE_PX * ri,
                                     meCy + ndy2 * DART_RANGE_PX * ri, 2.5);
          }

          // Landing reticle
          this.slimeGfx.lineStyle(1.5, acol, 0.45);
          this.slimeGfx.strokeCircle(lx2, ly2, 12);
          this.slimeGfx.fillStyle(acol, 0.25);
          this.slimeGfx.fillCircle(lx2, ly2, 5);

          // Arrowhead orbiting the slime, pointing at cursor
          var arD = 50;
          var atp  = _rp(meCx, meCy, meCx + arD + 13, meCy,      cosA2, sinA2);
          var alb  = _rp(meCx, meCy, meCx + arD - 3,  meCy + 9,  cosA2, sinA2);
          var arb  = _rp(meCx, meCy, meCx + arD - 3,  meCy - 9,  cosA2, sinA2);
          this.slimeGfx.fillStyle(acol, 0.90);
          this.slimeGfx.fillTriangle(atp[0], atp[1], alb[0], alb[1], arb[0], arb[1]);

          // Inner chevron for depth
          var atp2 = _rp(meCx, meCy, meCx + arD - 3,  meCy,      cosA2, sinA2);
          var alb2 = _rp(meCx, meCy, meCx + arD - 12, meCy + 6,  cosA2, sinA2);
          var arb2 = _rp(meCx, meCy, meCx + arD - 12, meCy - 6,  cosA2, sinA2);
          this.slimeGfx.fillStyle(acol, 0.38);
          this.slimeGfx.fillTriangle(atp2[0], atp2[1], alb2[0], alb2[1], arb2[0], arb2[1]);
        }

        // ── Darts: fly → stick → seep into ground ─────
        this.boomGfx.clear();
        var nowMs = performance.now();
        (state.darts || []).forEach((d) => {
          var col = getDartColor(d);

          if (d.stuck) {
            // Seep animation: squash flat and fade over ~900ms
            var seepStart = this._dartSeepStart[d.id] || nowMs;
            var seepT  = Math.min(1, (nowMs - seepStart) / 900);
            var alpha  = 1 - seepT;
            var scaleX = 1 + seepT * 2.0;   // spreads outward
            var scaleY = 1 - seepT * 0.85;  // flattens to ground
            var dSP  = w2s(d.x, d.y);
            var dDir = isoDir(d.ndx, d.ndy);
            drawDart(this.boomGfx, dSP.x, dSP.y, dDir.x, dDir.y, col, alpha, scaleX, scaleY);
          } else {
            // Flying dart: LERP position (stored as world coords)
            if (!this._dartPos[d.id]) this._dartPos[d.id] = { x: d.x, y: d.y };
            this._dartPos[d.id].x += (d.x - this._dartPos[d.id].x) * LERP;
            this._dartPos[d.id].y += (d.y - this._dartPos[d.id].y) * LERP;
            var px = this._dartPos[d.id].x, py = this._dartPos[d.id].y;
            var dFlySP = w2s(px, py);
            var dFlyDir = isoDir(d.ndx, d.ndy);

            // Trail: fading ghost drops (screen coords)
            if (!this._dartTrail[d.id]) this._dartTrail[d.id] = [];
            this._dartTrail[d.id].unshift({ x: dFlySP.x, y: dFlySP.y });
            if (this._dartTrail[d.id].length > 7) this._dartTrail[d.id].length = 7;
            var tr = this._dartTrail[d.id];
            for (var t = tr.length - 1; t >= 1; t--) {
              this.boomGfx.fillStyle(col, (1 - t / tr.length) * 0.30);
              this.boomGfx.fillCircle(tr[t].x, tr[t].y, Math.max(2, 6 - t));
            }

            drawDart(this.boomGfx, dFlySP.x, dFlySP.y, dFlyDir.x, dFlyDir.y, col, 1, 1, 1);
          }
        });

        // Reload bar: full when no dart in play, fills as stuck dart seeps away
        if (this.cooldownBar && playerSlot !== null) {
          var myDart = (state.darts || []).find(function(d) { return d.owner === playerSlot; });
          if (!myDart) {
            this.cooldownBar.displayWidth = 140;
          } else if (myDart.stuck) {
            var sp = this._dartSeepStart[myDart.id];
            var seepPct = sp ? Math.min(1, (nowMs - sp) / 900) : 0;
            this.cooldownBar.displayWidth = Math.round(140 * seepPct);
          } else {
            this.cooldownBar.displayWidth = 0;
          }
        }

        var _live = new Set((state.darts || []).map((d) => d.id));
        Object.keys(this._dartPos).forEach((id)       => { if (!_live.has(id)) delete this._dartPos[id]; });
        Object.keys(this._dartTrail).forEach((id)     => { if (!_live.has(id)) delete this._dartTrail[id]; });
      },
    },
  });
}
</script>
