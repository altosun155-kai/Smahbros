<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smash Bracket — Team Battle</title>
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/auth.js"></script>
  <script src="js/chars.js"></script>
  <style>
    /* ── Layout ── */
    .tb-layout { display: flex; gap: 24px; align-items: start; }
    .tb-sidebar { width: 360px; flex-shrink: 0; }
    .tb-main { flex: 1; min-width: 0; }
    .tb-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
    .tb-section-label { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; margin-top: 16px; }
    .tb-section-label:first-child { margin-top: 0; }

    /* ── Config row ── */
    .cfg-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
    .cfg-row label { font-size: 0.82rem; color: var(--text-muted); width: 130px; flex-shrink: 0; }
    .cfg-row select, .cfg-row input[type=text] { flex: 1; padding: 7px 10px; font-size: 0.85rem; background: #0f0f17; border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; color: var(--text); font-family: inherit; }
    .cfg-row select:focus, .cfg-row input:focus { outline: none; border-color: var(--accent-blue); }

    /* ── Characters per player stepper (matches bracket.html) ── */
    .cpp-row { display: flex; align-items: center; gap: 0; height: 34px; }
    .cpp-btn { padding: 0 13px; height: 100%; background: var(--card-bg2); border: 1px solid var(--border); color: var(--text); font-size: 1.1rem; cursor: pointer; font-weight: 700; line-height: 1; }
    .cpp-btn:first-child { border-right: none; border-radius: 6px 0 0 6px; }
    .cpp-btn:last-child  { border-left: none;  border-radius: 0 6px 6px 0; }
    .cpp-display { min-width: 36px; height: 100%; display: flex; align-items: center; justify-content: center; background: var(--card-bg2); border: 1px solid var(--border); font-size: 0.95rem; font-weight: 700; color: var(--text); padding: 0 10px; }

    /* ── Team blocks ── */
    .team-block { background: var(--card-bg2); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; }
    .team-block-hdr { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .team-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .team-name-inp { flex: 1; padding: 5px 10px; font-size: 0.92rem; font-weight: 700; background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--text); }
    .team-name-inp:focus { outline: none; border-bottom-color: var(--accent-blue); }
    .team-avg-elo { font-size: 0.72rem; color: var(--text-muted); margin-top: 6px; }

    /* ── Player slot ── */
    .player-slot { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 8px; padding: 8px 10px; margin-bottom: 8px; }
    .player-slot-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
    .player-sel { flex: 1; padding: 5px 8px; font-size: 0.82rem; background: #0f0f17; border: 1px solid rgba(255,255,255,0.12); border-radius: 5px; color: var(--text); }
    .player-sel:focus { outline: none; border-color: var(--accent-blue); }
    .autofill-btn { padding: 4px 9px; font-size: 0.72rem; background: rgba(0,119,200,0.15); border: 1px solid rgba(0,119,200,0.35); border-radius: 5px; color: var(--accent-blue); cursor: pointer; white-space: nowrap; }
    .autofill-btn:hover { background: rgba(0,119,200,0.28); }
    .char-slots { display: flex; gap: 5px; flex-wrap: wrap; }
    .char-inp { flex: 1; min-width: 90px; padding: 4px 7px; font-size: 0.78rem; background: #0f0f17; border: 1px solid rgba(255,255,255,0.1); border-radius: 5px; color: var(--text); }
    .char-inp:focus { outline: none; border-color: var(--accent-blue); }

    /* ── Bracket rounds ── */
    .bracket-rounds { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 16px; }
    .round-col { flex-shrink: 0; min-width: 220px; }
    .round-title { font-size: 0.78rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
    .round-col.grand-final .round-title { color: var(--accent-gold); }
    .match-card { background: var(--card-bg2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; }
    .match-card:hover { border-color: var(--accent-blue); box-shadow: 0 0 10px rgba(0,119,200,0.15); }
    .round-col.grand-final .match-card { border-color: rgba(245,166,35,0.35); box-shadow: 0 0 16px rgba(245,166,35,0.1); background: linear-gradient(135deg, #1a150a, #16213e); }
    .match-card.done { border-color: rgba(76,175,80,0.4); }
    .team-slot { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 0.85rem; color: var(--text); border-bottom: 1px solid var(--border); }
    .team-slot:last-child { border-bottom: none; }
    .team-slot.winner { color: #ffe066; font-weight: 700; }
    .team-slot.loser { color: var(--text-muted); opacity: 0.55; }
    .team-slot.tbd { color: rgba(255,255,255,0.2); font-style: italic; font-size: 0.75rem; }
    .team-slot.bye { color: var(--text-muted); font-style: italic; opacity: 0.45; font-size: 0.78rem; }
    .slot-chars { display: flex; gap: 3px; margin-left: auto; flex-shrink: 0; }
    .slot-char-icon { width: 20px; height: 20px; object-fit: contain; border-radius: 3px; background: rgba(255,255,255,0.05); }

    /* ── VS Modal ── */
    #vsModal { display: none; position: fixed; inset: 0; z-index: 1000; }
    #vsModal.open { display: flex; align-items: center; justify-content: center; }
    .vs-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); }
    .vs-box {
      position: relative; z-index: 1; background: var(--card-bg);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 18px;
      padding: 28px 24px 22px; width: 100%; max-width: 640px; max-height: 90vh;
      overflow-y: auto; margin: 20px;
    }
    .vs-round-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 18px; text-align: center; }
    .vs-teams { display: grid; grid-template-columns: 1fr auto 1fr; gap: 14px; align-items: start; margin-bottom: 22px; }
    .vs-team-name { font-size: 1rem; font-weight: 800; margin-bottom: 10px; text-align: center; }
    .vs-member { display: flex; align-items: center; gap: 9px; padding: 8px 10px; background: var(--card-bg2); border-radius: 8px; margin-bottom: 6px; }
    .vs-member-info { flex: 1; min-width: 0; }
    .vs-member-player { font-size: 0.85rem; font-weight: 600; color: var(--text); }
    .vs-member-chars { display: flex; gap: 4px; margin-top: 3px; flex-wrap: wrap; }
    .vs-char-icon { width: 28px; height: 28px; object-fit: contain; border-radius: 4px; background: rgba(255,255,255,0.06); }
    .vs-char-name { font-size: 0.7rem; color: var(--text-muted); }
    .vs-divider { display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: 900; color: rgba(255,255,255,0.25); padding-top: 22px; }
    .vs-buttons { display: flex; gap: 12px; }
    .tb-win-btn {
      flex: 1; padding: 14px 10px; font-size: 0.95rem; font-weight: 800;
      border: none; border-radius: 10px; cursor: pointer;
      letter-spacing: 0.5px; text-transform: uppercase;
      transition: transform 0.1s, opacity 0.1s;
    }
    .tb-win-btn:hover { transform: scale(1.04); opacity: 0.92; }
    .tb-win-btn.t1 { background: #cc1111; color: #fff; }
    .tb-win-btn.t2 { background: #1155cc; color: #fff; }
    .vs-close-btn { position: absolute; top: 14px; right: 16px; background: none; border: none; color: var(--text-muted); font-size: 1.2rem; cursor: pointer; padding: 4px 8px; border-radius: 4px; }
    .vs-close-btn:hover { color: var(--text); }
    .vs-undo-row { text-align: center; margin-top: 12px; }
    .vs-undo-btn { background: none; border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; color: var(--text-muted); font-size: 0.8rem; padding: 6px 14px; cursor: pointer; transition: color 0.15s, border-color 0.15s; }
    .vs-undo-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.35); }

    /* ── Sidebar roster (active bracket) ── */
    .roster-team { margin-bottom: 12px; }
    .roster-team-name { font-size: 0.88rem; font-weight: 700; display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
    .roster-member { font-size: 0.78rem; color: var(--text-muted); padding-left: 16px; margin-bottom: 2px; }

    /* ── Bracket placeholder ── */
    #bracketEmpty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    #bracketEmpty .empty-icon { font-size: 3rem; margin-bottom: 12px; }

    /* ── Winner banner ── */
    #winnerBanner { display: none; text-align: center; padding: 24px; background: linear-gradient(135deg, rgba(245,166,35,0.18), rgba(255,200,60,0.1)); border: 1.5px solid rgba(245,166,35,0.5); border-radius: 14px; margin-bottom: 20px; }
    #winnerBanner.show { display: block; }
    #winnerBanner .win-title { font-size: 0.7rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent-gold); margin-bottom: 6px; }
    #winnerBanner .win-name { font-size: 1.6rem; font-weight: 900; color: #fff; }

    @media (max-width: 900px) {
      .tb-layout { flex-direction: column; }
      .tb-sidebar { width: 100%; }
      .vs-teams { grid-template-columns: 1fr; }
      .vs-divider { padding-top: 0; }
    }
  </style>
</head>
<body>
<script>requireAuth();</script>
<div id="toast-container"></div>
<nav class="navbar" id="main-nav"></nav>

<main class="page-container">
  <div class="page-header">
    <h1>👥 Team Battle Bracket</h1>
    <p>Team vs team single-elimination. No Elo changes — just glory.</p>
  </div>

  <!-- VS Modal -->
  <div id="vsModal">
    <div class="vs-backdrop" onclick="closeVsModal()"></div>
    <div class="vs-box">
      <button class="vs-close-btn" onclick="closeVsModal()">✕</button>
      <div class="vs-round-label" id="vsRoundLabel"></div>
      <div class="vs-teams">
        <div id="vsTeamA"></div>
        <div class="vs-divider">VS</div>
        <div id="vsTeamB"></div>
      </div>
      <div class="vs-buttons">
        <button class="tb-win-btn t1" id="vsBtnA" onclick="recordWinner(0)"></button>
        <button class="tb-win-btn t2" id="vsBtnB" onclick="recordWinner(1)"></button>
      </div>
      <div class="vs-undo-row">
        <button class="vs-undo-btn" id="vsUndoBtn" onclick="undoCurrentMatch()" style="display:none;">Undo result</button>
      </div>
    </div>
  </div>

  <div class="tb-layout">
    <!-- ── Sidebar ── -->
    <div class="tb-sidebar">

      <!-- Setup (no active bracket) -->
      <div id="setupCard" class="tb-card">
        <div class="tb-section-label">Tournament</div>
        <div class="cfg-row">
          <label>Name</label>
          <input type="text" id="tourneyName" placeholder="Friday Night Teams" maxlength="50" />
        </div>

        <div class="tb-section-label">Format</div>
        <div class="cfg-row">
          <label>Number of Teams</label>
          <select id="numTeams" onchange="rebuildTeamForms()">
            <option value="2">2 Teams</option>
            <option value="4" selected>4 Teams</option>
            <option value="8">8 Teams</option>
          </select>
        </div>
        <div class="cfg-row">
          <label>Players per Team</label>
          <select id="playersPerTeam" onchange="rebuildTeamForms()">
            <option value="1">1 Player</option>
            <option value="2" selected>2 Players</option>
            <option value="3">3 Players</option>
            <option value="4">4 Players</option>
          </select>
        </div>
        <div class="cfg-row">
          <label>Chars per Player</label>
          <div class="cpp-row">
            <button type="button" class="cpp-btn" onclick="adjustCPP(-1)">−</button>
            <div class="cpp-display" id="cppDisplay">2</div>
            <button type="button" class="cpp-btn" onclick="adjustCPP(1)">+</button>
            <input type="hidden" id="charsPerPlayer" value="2" />
          </div>
        </div>
        <div class="cfg-row">
          <label>Bracket Style</label>
          <select id="bracketStyle">
            <option value="strongVsStrong">Strong vs Strong (1v2, 3v4…)</option>
            <option value="strongVsWeak">Strong vs Weak (1v8, 2v7…)</option>
          </select>
        </div>

        <div class="tb-section-label">Teams</div>
        <div id="teamForms"></div>

        <button class="btn btn-primary" style="width:100%;margin-top:4px;" onclick="generateBracket()">
          Generate Bracket
        </button>
      </div>

      <!-- Active bracket info -->
      <div id="bracketInfoCard" class="tb-card" style="display:none;">
        <div style="font-size:0.88rem;font-weight:700;margin-bottom:14px;" id="bracketInfoTitle"></div>
        <div id="teamRoster"></div>
        <button class="btn btn-outline" style="width:100%;margin-top:12px;margin-bottom:8px;" onclick="endTournament()">
          End Tournament
        </button>
        <button class="btn btn-outline" style="width:100%;color:#e74c3c;border-color:rgba(231,76,60,0.4);" onclick="deleteBracket()">
          Delete Bracket
        </button>
      </div>
    </div>

    <!-- ── Main bracket area ── -->
    <div class="tb-main">
      <div id="winnerBanner">
        <div class="win-title">🏆 Tournament Champion</div>
        <div class="win-name" id="winnerName"></div>
      </div>
      <div id="bracketEmpty">
        <div class="empty-icon">👥</div>
        <p>Configure your teams and click <strong>Generate Bracket</strong> to start.</p>
      </div>
      <div id="bracketRounds" class="bracket-rounds" style="display:none;"></div>
    </div>
  </div>
</main>

<script src="js/nav-inject.js"></script>
<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script>
// ── State ──────────────────────────────────────────────────────────────────
let state = {
  bracketId: null,
  bracketName: '',
  // teams: [{name, color, members: [{player, characters: [str,...]}]}]
  teams: [],
  bracketData: [],  // [{a: teamName, b: teamName}]
  roundWinners: {},
  isLive: false,
  winner: null,
};

let _eloLb = null;
let _usersCache = null;
let _statsCache = {}; // username -> [{character, elo}]

const TEAM_COLORS = [
  '#e74c3c', '#3498db', '#2ecc71', '#f39c12',
  '#9b59b6', '#1abc9c', '#e67e22', '#e91e63',
];

// ── Init ───────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  await loadUsers();
  rebuildTeamForms();
  const bid = new URLSearchParams(location.search).get('b');
  if (bid) await loadBracket(parseInt(bid));
});

async function loadUsers() {
  try {
    const data = await apiGet('/users/all');
    _usersCache = (data || []).map(u => u.username).sort();
  } catch { _usersCache = []; }
}

async function getEloLb() {
  if (_eloLb) return _eloLb;
  try { _eloLb = await apiGet('/characters/stats/leaderboard/elo'); }
  catch { _eloLb = []; }
  return _eloLb;
}

async function getPlayerStats(username) {
  if (_statsCache[username]) return _statsCache[username];
  try {
    const d = await apiGet(`/characters/stats/${encodeURIComponent(username)}`);
    _statsCache[username] = (d.stats || [])
      .filter(s => (s.wins || 0) + (s.losses || 0) > 0)
      .sort((a, b) => (b.elo || 1000) - (a.elo || 1000));
  } catch { _statsCache[username] = []; }
  return _statsCache[username];
}

// ── Chars per player stepper ───────────────────────────────────────────────
function adjustCPP(delta) {
  const inp = document.getElementById('charsPerPlayer');
  const v = Math.min(4, Math.max(1, parseInt(inp.value) + delta));
  inp.value = v;
  document.getElementById('cppDisplay').textContent = v;
  rebuildTeamForms();
}

function getCPP() {
  return parseInt(document.getElementById('charsPerPlayer').value) || 2;
}

// ── Build team forms ───────────────────────────────────────────────────────
function rebuildTeamForms() {
  const numTeams = parseInt(document.getElementById('numTeams').value);
  const ppt = parseInt(document.getElementById('playersPerTeam').value);
  const cpp = getCPP();
  const container = document.getElementById('teamForms');

  // Preserve existing values
  const saved = {};
  container.querySelectorAll('.team-block').forEach(block => {
    const ti = block.dataset.ti;
    saved[ti] = {
      name: block.querySelector('.team-name-inp')?.value,
      members: [],
    };
    block.querySelectorAll('.player-slot').forEach((slot, mi) => {
      saved[ti].members[mi] = {
        player: slot.querySelector('.player-sel')?.value || '',
        chars: [...slot.querySelectorAll('.char-inp')].map(i => i.value),
      };
    });
  });

  container.innerHTML = '';

  // Character datalist (shared)
  let dl = document.getElementById('charlist');
  if (!dl) {
    dl = document.createElement('datalist');
    dl.id = 'charlist';
    (SMASH_ROSTER || []).forEach(c => {
      const o = document.createElement('option'); o.value = c; dl.appendChild(o);
    });
    document.body.appendChild(dl);
  }

  for (let t = 0; t < numTeams; t++) {
    const color = TEAM_COLORS[t % TEAM_COLORS.length];
    const svd = saved[t] || {};
    const defaultName = svd.name || `Team ${t + 1}`;

    const block = document.createElement('div');
    block.className = 'team-block';
    block.dataset.ti = t;

    // Team header
    const hdr = document.createElement('div');
    hdr.className = 'team-block-hdr';
    hdr.innerHTML = `
      <div class="team-dot" style="background:${color}"></div>
      <input class="team-name-inp" value="${defaultName}" maxlength="24" />`;
    block.appendChild(hdr);

    // Player slots
    for (let m = 0; m < ppt; m++) {
      const svdMember = svd.members?.[m] || {};
      const slot = document.createElement('div');
      slot.className = 'player-slot';
      slot.dataset.mi = m;

      const playerOptions = (_usersCache || [])
        .map(u => `<option value="${u}"${svdMember.player === u ? ' selected' : ''}>${u}</option>`)
        .join('');

      // Char inputs
      const charInputs = Array.from({ length: cpp }, (_, ci) => {
        const v = svdMember.chars?.[ci] || '';
        return `<input class="char-inp" list="charlist" placeholder="Char ${ci + 1}" value="${v}" autocomplete="off" data-ci="${ci}" />`;
      }).join('');

      slot.innerHTML = `
        <div class="player-slot-hdr">
          <select class="player-sel">
            <option value="">— player —</option>
            ${playerOptions}
          </select>
          <button type="button" class="autofill-btn" title="Auto-fill top ${cpp} chars by Elo">⚡ Fill</button>
        </div>
        <div class="char-slots">${charInputs}</div>`;

      // Auto-fill handler
      slot.querySelector('.autofill-btn').addEventListener('click', async () => {
        const playerSel = slot.querySelector('.player-sel');
        const username = playerSel.value;
        if (!username) { showToast('Select a player first.', 'warn'); return; }
        const stats = await getPlayerStats(username);
        const charInps = slot.querySelectorAll('.char-inp');
        charInps.forEach((inp, ci) => {
          inp.value = stats[ci]?.character || '';
        });
        updateAvgElo(t);
      });

      // Elo preview on change
      slot.querySelectorAll('.char-inp, .player-sel').forEach(el => {
        el.addEventListener('change', () => updateAvgElo(t));
        el.addEventListener('input', () => updateAvgElo(t));
      });

      block.appendChild(slot);
    }

    // Avg Elo footer
    const avgEl = document.createElement('div');
    avgEl.className = 'team-avg-elo';
    avgEl.id = `avgElo${t}`;
    avgEl.textContent = 'Avg Elo: —';
    block.appendChild(avgEl);

    container.appendChild(block);
  }
}

async function updateAvgElo(ti) {
  const lb = await getEloLb();
  const block = document.querySelector(`[data-ti="${ti}"]`);
  if (!block) return;
  let total = 0, count = 0;
  block.querySelectorAll('.player-slot').forEach(slot => {
    const player = slot.querySelector('.player-sel').value;
    slot.querySelectorAll('.char-inp').forEach(inp => {
      const char = inp.value.trim();
      if (player && char) {
        const row = lb.find(r => r.username === player && r.character === char);
        total += row ? row.elo : 1000;
        count++;
      }
    });
  });
  const el = document.getElementById(`avgElo${ti}`);
  if (el) el.textContent = count > 0 ? `Avg Elo: ${Math.round(total / count)}` : 'Avg Elo: —';
}

// ── Collect teams from form ────────────────────────────────────────────────
function collectTeams() {
  const teams = [];
  document.querySelectorAll('.team-block').forEach((block, t) => {
    const name = block.querySelector('.team-name-inp').value.trim() || `Team ${t + 1}`;
    const color = TEAM_COLORS[t % TEAM_COLORS.length];
    const members = [];
    block.querySelectorAll('.player-slot').forEach(slot => {
      const player = slot.querySelector('.player-sel').value;
      const characters = [...slot.querySelectorAll('.char-inp')]
        .map(i => i.value.trim()).filter(Boolean);
      if (player) members.push({ player, characters });
    });
    teams.push({ name, color, members });
  });
  return teams;
}

// ── Seed & generate ────────────────────────────────────────────────────────
async function generateBracket() {
  const name = document.getElementById('tourneyName').value.trim() || 'Team Battle';
  const teams = collectTeams();
  if (teams.length < 2) { showToast('Need at least 2 teams.', 'error'); return; }

  const lb = await getEloLb();
  const teamsWithElo = teams.map(t => {
    const elos = t.members.flatMap(m =>
      m.characters.map(c => {
        const row = lb.find(r => r.username === m.player && r.character === c);
        return row ? row.elo : 1000;
      })
    );
    const avg = elos.length ? Math.round(elos.reduce((a, b) => a + b, 0) / elos.length) : 1000;
    return { ...t, avgElo: avg };
  });

  // Sort descending by avg Elo (seed 1 = best)
  teamsWithElo.sort((a, b) => b.avgElo - a.avgElo);

  // Pad to power of 2
  let size = 2;
  while (size < teamsWithElo.length) size *= 2;
  const seeded = [...teamsWithElo];
  while (seeded.length < size) seeded.push({ name: 'BYE', color: '#555', members: [], avgElo: 0, isBye: true });

  const style = document.getElementById('bracketStyle').value;
  const pairs = [];
  if (style === 'strongVsWeak') {
    for (let i = 0; i < size / 2; i++) {
      pairs.push({ a: seeded[i].name, b: seeded[size - 1 - i].name });
    }
  } else {
    for (let i = 0; i < size; i += 2) {
      pairs.push({ a: seeded[i].name, b: seeded[i + 1].name });
    }
  }

  // Store teams as {name: {members, color}}
  const teamsDict = {};
  teamsWithElo.forEach(t => {
    teamsDict[t.name] = { members: t.members, color: t.color };
  });

  try {
    const res = await apiPost('/brackets', {
      name,
      mode: 'team_battle',
      bracket_data: pairs,
      bracket_style: style,
      is_live: true,
      teams: teamsDict,
    });
    if (res.id) {
      await loadBracket(res.id);
      history.pushState({}, '', `?b=${res.id}`);
    }
  } catch {
    showToast('Failed to create bracket.', 'error');
  }
}

// ── Load bracket ───────────────────────────────────────────────────────────
async function loadBracket(bracketId) {
  try {
    const data = await apiGet(`/brackets/${bracketId}`);
    state.bracketId = data.id;
    state.bracketName = data.name;
    state.bracketData = data.bracket_data || [];
    state.roundWinners = data.round_winners || {};
    state.isLive = data.is_live;
    state.winner = data.winner || null;

    const teamsDict = data.teams || {};
    state.teams = Object.entries(teamsDict).map(([name, val], i) => {
      // Support both old format {player, character} and new {player, characters:[]}
      const rawMembers = Array.isArray(val) ? val : (val.members || []);
      const members = rawMembers.map(m => ({
        player: m.player,
        characters: m.characters || (m.character ? [m.character] : []),
      }));
      const color = (val.color) || TEAM_COLORS[i % TEAM_COLORS.length];
      return { name, color, members };
    });

    await initializeByes();
    renderBracket();
    showBracketView();
  } catch {
    showToast('Bracket not found.', 'error');
  }
}

// ── Auto-advance BYEs ──────────────────────────────────────────────────────
async function initializeByes() {
  const tasks = [];
  state.bracketData.forEach((pair, mi) => {
    const key = `r0_m${mi}`;
    if (state.roundWinners[key]) return;
    let winner = null;
    if (pair.a === 'BYE' && pair.b && pair.b !== 'BYE') winner = pair.b;
    else if (pair.b === 'BYE' && pair.a && pair.a !== 'BYE') winner = pair.a;
    if (winner) {
      state.roundWinners[key] = winner;
      tasks.push(apiPatch(`/brackets/${state.bracketId}/winner`, { key, winner }));
    }
  });
  if (tasks.length) await Promise.all(tasks);
}

// ── Show bracket UI ────────────────────────────────────────────────────────
function showBracketView() {
  document.getElementById('setupCard').style.display = 'none';
  document.getElementById('bracketInfoCard').style.display = 'block';
  document.getElementById('bracketRounds').style.display = 'flex';
  document.getElementById('bracketEmpty').style.display = 'none';
  document.getElementById('bracketInfoTitle').textContent = state.bracketName;
  renderRoster();
  if (state.winner) {
    document.getElementById('winnerName').textContent = state.winner;
    document.getElementById('winnerBanner').classList.add('show');
  } else {
    document.getElementById('winnerBanner').classList.remove('show');
  }
}

function renderRoster() {
  document.getElementById('teamRoster').innerHTML = state.teams.map(t => `
    <div class="roster-team">
      <div class="roster-team-name">
        <div style="width:9px;height:9px;border-radius:50%;background:${t.color};flex-shrink:0;"></div>
        ${t.name}
      </div>
      ${t.members.map(m => `
        <div class="roster-member">
          ${m.player}${m.characters.length ? ` — ${m.characters.join(', ')}` : ''}
        </div>`).join('')}
    </div>`).join('');
}

// ── Bracket rendering ──────────────────────────────────────────────────────
function getRounds() {
  const rounds = [{}];
  state.bracketData.forEach((pair, mi) => { rounds[0][mi] = [pair.a, pair.b]; });
  let ri = 0;
  while (Object.keys(rounds[ri]).length > 1) {
    const prev = rounds[ri];
    const next = {};
    const mis = Object.keys(prev).map(Number).sort((a, b) => a - b);
    for (let j = 0; j < mis.length; j += 2) {
      if (j + 1 >= mis.length) break;
      next[j / 2] = [
        state.roundWinners[`r${ri}_m${mis[j]}`] || '',
        state.roundWinners[`r${ri}_m${mis[j + 1]}`] || '',
      ];
    }
    rounds.push(next);
    ri++;
  }
  return rounds;
}

function roundLabel(ri, total) {
  const rem = total - 1 - ri;
  if (rem === 0) return 'Grand Final';
  if (rem === 1) return 'Semifinals';
  if (rem === 2) return 'Quarterfinals';
  return `Round ${ri + 1}`;
}

function getTeam(name) {
  return state.teams.find(t => t.name === name);
}

function charImgUrl(character) {
  if (!character) return '';
  const override = typeof CHAR_FILE_OVERRIDES !== 'undefined' && CHAR_FILE_OVERRIDES[character];
  return `${SUPABASE_CHARS}${encodeURIComponent(override || `${character}.png`)}`;
}

function renderBracket() {
  const rounds = getRounds();
  const container = document.getElementById('bracketRounds');
  container.innerHTML = '';
  const total = rounds.length;

  rounds.forEach((matches, ri) => {
    const col = document.createElement('div');
    col.className = 'round-col' + (ri === total - 1 ? ' grand-final' : '');
    col.innerHTML = `<div class="round-title">${roundLabel(ri, total)}</div>`;

    Object.keys(matches).map(Number).sort((a, b) => a - b).forEach(mi => {
      const [aName, bName] = matches[mi];
      const key = `r${ri}_m${mi}`;
      const winner = state.roundWinners[key] || '';
      const isBye = aName === 'BYE' || bName === 'BYE';

      const card = document.createElement('div');
      card.className = 'match-card' + (winner ? ' done' : '');
      if (!isBye) card.onclick = () => openVsModal(ri, mi, aName, bName, key);

      card.innerHTML = teamSlotHtml(aName, winner === aName, !!winner && winner !== aName, !aName) +
                       teamSlotHtml(bName, winner === bName, !!winner && winner !== bName, !bName);
      col.appendChild(card);
    });

    container.appendChild(col);
  });
}

function teamSlotHtml(name, isWin, isLose, isEmpty) {
  if (isEmpty || !name) return `<div class="team-slot tbd">TBD</div>`;
  if (name === 'BYE')    return `<div class="team-slot bye">BYE</div>`;
  const team = getTeam(name);
  const dot = team ? `<div style="width:8px;height:8px;border-radius:50%;background:${team.color};flex-shrink:0;"></div>` : '';

  // Show up to 2 char icons from first member
  let charIcons = '';
  if (team) {
    const firstMember = team.members[0];
    if (firstMember) {
      charIcons = `<div class="slot-chars">` +
        firstMember.characters.slice(0, 3).map(c =>
          `<img class="slot-char-icon" src="${charImgUrl(c)}" alt="${c}" title="${c}" onerror="this.style.display='none'" />`
        ).join('') +
        `</div>`;
    }
  }

  const cls = isWin ? 'winner' : isLose ? 'loser' : '';
  return `<div class="team-slot ${cls}">${dot}<span>${name}${isWin ? ' 🏆' : ''}</span>${charIcons}</div>`;
}

// ── VS Modal ───────────────────────────────────────────────────────────────
let _vs = null;

function openVsModal(ri, mi, aName, bName, key) {
  _vs = { ri, mi, aName, bName, key };
  const rounds = getRounds();
  document.getElementById('vsRoundLabel').textContent =
    `${roundLabel(ri, rounds.length)} · Match ${mi + 1}`;

  renderVsTeam('vsTeamA', aName, '#cc1111');
  renderVsTeam('vsTeamB', bName, '#1155cc');
  document.getElementById('vsBtnA').textContent = `${aName} Wins`;
  document.getElementById('vsBtnB').textContent = `${bName} Wins`;

  const existing = state.roundWinners[key];
  document.getElementById('vsUndoBtn').style.display = existing ? 'inline-block' : 'none';
  document.getElementById('vsModal').classList.add('open');
}

function renderVsTeam(elId, teamName, accent) {
  const el = document.getElementById(elId);
  const team = teamName ? getTeam(teamName) : null;
  if (!team) {
    el.innerHTML = `<div class="vs-team-name" style="color:${accent}">${teamName || 'TBD'}</div>`;
    return;
  }

  const membersHtml = team.members.map(m => {
    const charIconsHtml = m.characters.map(c => {
      const url = charImgUrl(c);
      return `<img class="vs-char-icon" src="${url}" alt="${c}" title="${c}" onerror="this.style.display='none'" />`;
    }).join('');
    const charNamesHtml = m.characters.length
      ? `<div class="vs-member-chars">${charIconsHtml}</div>`
      : '';
    return `
      <div class="vs-member">
        <div class="vs-member-info">
          <div class="vs-member-player">${m.player || '?'}</div>
          ${charNamesHtml}
        </div>
      </div>`;
  }).join('') || '<div style="color:var(--text-muted);font-size:0.82rem;padding:8px;">No members</div>';

  el.innerHTML = `<div class="vs-team-name" style="color:${accent}">${teamName}</div>${membersHtml}`;
}

function closeVsModal() {
  document.getElementById('vsModal').classList.remove('open');
  _vs = null;
}

async function recordWinner(side) {
  if (!_vs) return;
  const { aName, bName, key, ri } = _vs;
  const winner = side === 0 ? aName : bName;
  const isGF = ri === getRounds().length - 1;

  try {
    await apiPatch(`/brackets/${state.bracketId}/winner`, {
      key, winner,
      tournament_winner: isGF ? winner : null,
    });
    state.roundWinners[key] = winner;
    if (isGF) state.winner = winner;
    renderBracket();
    closeVsModal();
    if (isGF) {
      document.getElementById('winnerName').textContent = winner;
      document.getElementById('winnerBanner').classList.add('show');
    }
  } catch {
    showToast('Failed to record result.', 'error');
  }
}

async function undoCurrentMatch() {
  if (!_vs) return;
  const { key } = _vs;
  try {
    await apiPatch(`/brackets/${state.bracketId}/winner`, { key, winner: '' });
    delete state.roundWinners[key];
    state.winner = null;
    document.getElementById('winnerBanner').classList.remove('show');
    renderBracket();
    closeVsModal();
    showToast('Result undone.', 'success');
  } catch {
    showToast('Failed to undo.', 'error');
  }
}

// ── End / Delete ───────────────────────────────────────────────────────────
async function endTournament() {
  if (!confirm('End this tournament?')) return;
  try {
    await apiPatch(`/brackets/${state.bracketId}/end`, {});
    state.isLive = false;
    showToast('Tournament ended.', 'success');
  } catch { showToast('Failed to end.', 'error'); }
}

async function deleteBracket() {
  if (!confirm('Delete this bracket permanently?')) return;
  try {
    await apiDelete(`/brackets/${state.bracketId}`);
    state.bracketId = null;
    document.getElementById('setupCard').style.display = 'block';
    document.getElementById('bracketInfoCard').style.display = 'none';
    document.getElementById('bracketRounds').style.display = 'none';
    document.getElementById('bracketEmpty').style.display = 'block';
    document.getElementById('winnerBanner').classList.remove('show');
    history.pushState({}, '', location.pathname);
    showToast('Deleted.', 'success');
  } catch { showToast('Failed to delete.', 'error'); }
}

function showToast(msg, type = 'info') { _showToast(msg, type); }
</script>
