<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smash Bracket — Character Skins</title>
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/auth.js"></script>
  <style>
    /* ── Grid ────────────────────────────────────────── */
    .skins-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(86px, 1fr));
      gap: 6px;
      margin-top: 18px;
    }

    .skin-tile {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      background: #0a0a14;
      border: 2px solid rgba(255,255,255,0.07);
      cursor: pointer;
      aspect-ratio: 1;
      transition: transform 0.12s, border-color 0.12s, box-shadow 0.12s;
    }

    .skin-tile:hover {
      transform: scale(1.09);
      z-index: 5;
      border-color: rgba(255,255,255,0.35);
    }

    .skin-tile.has-pick {
      border-color: var(--accent-gold);
      box-shadow: 0 0 16px 3px rgba(245,166,35,0.5);
      transform: scale(1.07);
      z-index: 3;
    }
    .skin-tile.has-pick:hover {
      transform: scale(1.13);
    }

    .skin-tile img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      pointer-events: none;
    }

    .skin-tile .char-fallback {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.48rem;
      font-weight: 700;
      color: var(--text-muted);
      text-align: center;
      padding: 4px;
    }

    .skin-tile .alt-badge {
      position: absolute;
      top: 3px;
      right: 3px;
      min-width: 20px;
      height: 20px;
      border-radius: 10px;
      padding: 0 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 900;
      color: #111;
      background: var(--accent-gold);
      line-height: 1;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    }

    .skin-tile .char-name {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      color: #fff;
      font-size: 0.46rem;
      font-weight: 700;
      text-align: center;
      padding: 10px 3px 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Picker overlay ──────────────────────────────── */
    .picker-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .picker-overlay.open { display: flex; }

    .picker-modal {
      background: var(--card-bg);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 22px 22px 20px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
    }

    .picker-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
    }

    .picker-portrait {
      width: 72px;
      height: 72px;
      border-radius: 8px;
      overflow: hidden;
      background: var(--card-bg2);
      border: 2px solid var(--border);
      flex-shrink: 0;
      transition: border-color 0.15s;
    }

    .picker-portrait img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .picker-header-text h3 {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 3px;
    }

    .picker-header-text p {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    /* 4-column grid of alt swatches */
    .alt-swatches {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 18px;
    }

    .alt-swatch {
      border-radius: 8px;
      overflow: hidden;
      aspect-ratio: 1;
      cursor: pointer;
      border: 3px solid transparent;
      background: var(--card-bg2);
      position: relative;
      transition: border-color 0.1s, transform 0.1s;
    }

    .alt-swatch:hover { transform: scale(1.06); }

    .alt-swatch.selected {
      border-color: var(--accent-gold);
      box-shadow: 0 0 8px rgba(245,166,35,0.5);
    }

    .alt-swatch img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      pointer-events: none;
    }

    .alt-swatch .swatch-num {
      position: absolute;
      top: 3px;
      right: 4px;
      font-size: 0.6rem;
      font-weight: 900;
      color: rgba(255,255,255,0.85);
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      line-height: 1;
    }

    .alt-swatch .swatch-fallback {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 800;
      color: var(--text-muted);
    }

    .picker-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    /* ── Top bar ─────────────────────────────────────── */
    .top-bar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .last-saved { font-size: 0.82rem; color: var(--text-muted); }
    .skins-note { font-size: 0.8rem; color: var(--text-muted); margin-top: 8px; }

    /* Skeleton shimmer for image loading */
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position:  200% 0; }
    }
    .skin-tile.loading {
      background: linear-gradient(90deg, #1a1a2e 25%, #252540 50%, #1a1a2e 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
    }
    .skin-tile.loading img { opacity: 0; }
    .skin-tile img.loaded  { opacity: 1; transition: opacity 0.2s; }
  </style>
</head>
<body>
<script>requireAuth();</script>
<div id="toast-container"></div>
<nav class="navbar" id="main-nav"></nav>

<main class="page-container">
  <div class="page-header">
    <h1>Character Skins</h1>
    <p>Pick your preferred alt costume for each character. Click any portrait to choose.</p>
  </div>

  <div id="loadingState" class="loading-center">
    <div class="spinner"></div><span>Loading…</span>
  </div>

  <div id="skinsContent" style="display:none;">
    <div class="top-bar">
      <button class="btn btn-primary" onclick="saveSkins()">Save Preferences</button>
      <button class="btn btn-outline" onclick="resetSkins()">Reset All</button>
      <span class="last-saved" id="lastSaved"></span>
    </div>
    <p class="skins-note">Gold border = custom alt selected. Numbers match in-game costume slots (1 = default).</p>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:10px;">
      <input id="skinsSearch" type="text" placeholder="Search characters…"
        oninput="filterSkinsGrid()"
        style="background:var(--card-bg2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 14px;font-size:0.85rem;width:220px;outline:none;transition:border-color .15s;"
        onfocus="this.style.borderColor='var(--accent-blue)'" onblur="this.style.borderColor='var(--border)'" />
      <button onclick="document.getElementById('skinsSearch').value='';filterSkinsGrid()"
        style="background:none;border:1px solid var(--border);color:var(--text-muted);border-radius:8px;padding:7px 12px;cursor:pointer;font-size:0.8rem;">Clear</button>
    </div>
    <div class="skins-grid" id="skinsGrid"></div>
  </div>
</main>

<!-- Picker modal -->
<div class="picker-overlay" id="pickerOverlay" onclick="closePicker(event)">
  <div class="picker-modal" onclick="event.stopPropagation()">
    <div class="picker-header">
      <div class="picker-portrait" id="pickerPortrait">
        <img id="pickerPortraitImg" src="" alt="" />
      </div>
      <div class="picker-header-text">
        <h3 id="pickerCharName"></h3>
        <p id="pickerAltLabel">Alt 1 — Default</p>
      </div>
    </div>
    <div class="alt-swatches" id="altSwatches"></div>
    <div class="picker-actions">
      <button class="btn btn-outline" onclick="closePicker()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmPick()">Select</button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/friends-sidebar.js"></script>
<script src="js/nav-inject.js"></script>
<script src="js/nav.js"></script>
<script src="js/chars.js"></script>
<script>
  const ROSTER = ["Mario","Donkey Kong","Link","Samus","Dark Samus","Yoshi","Kirby","Fox","Pikachu","Luigi","Ness","Captain Falcon","Jigglypuff","Peach","Daisy","Bowser","Ice Climbers","Sheik","Zelda","Dr. Mario","Pichu","Falco","Marth","Lucina","Young Link","Ganondorf","Mewtwo","Roy","Chrom","Mr. Game & Watch","Meta Knight","Pit","Dark Pit","Zero Suit Samus","Wario","Snake","Ike","Pokémon Trainer","Diddy Kong","Lucas","Sonic","King Dedede","Olimar","Lucario","R.O.B.","Toon Link","Wolf","Villager","Mega Man","Wii Fit Trainer","Rosalina & Luma","Little Mac","Greninja","Mii Brawler","Mii Swordfighter","Mii Gunner","Palutena","Pac-Man","Robin","Shulk","Bowser Jr.","Duck Hunt","Ryu","Ken","Cloud","Corrin","Bayonetta","Inkling","Ridley","Simon","Richter","King K. Rool","Isabelle","Incineroar","Piranha Plant","Joker","Hero","Banjo & Kazooie","Terry","Byleth","Min Min","Steve","Sephiroth","Pyra/Mythra","Kazuya","Sora"];

  let skins = {};
  let pickerChar = null;
  let pickerSelected = 0;

  // ── Grid ─────────────────────────────────────────────

  function buildGrid() {
    const grid = document.getElementById('skinsGrid');
    grid.innerHTML = '';
    ROSTER.forEach(char => {
      const alt = skins[char] ?? null; // 0-indexed, null = default shown

      const tile = document.createElement('div');
      tile.className = 'skin-tile loading' + (alt !== null ? ' has-pick' : '');
      tile.title = char;
      tile.onclick = () => openPicker(char);

      // Show selected alt portrait, fall back to base
      const displayAlt = alt !== null ? alt + 1 : 1;
      const img = document.createElement('img');
      img.src = charAltImgUrl(char, displayAlt);
      img.alt = char;
      img.onload = () => { img.classList.add('loaded'); tile.classList.remove('loading'); };
      img.onerror = () => {
        tile.classList.remove('loading');
        if (img.src !== charImgUrl(char)) { img.src = charImgUrl(char); return; }
        img.remove(); addFb(tile, char);
      };
      tile.appendChild(img);

      // Alt number badge (only if non-default)
      if (alt !== null && alt !== 0) {
        const badge = document.createElement('div');
        badge.className = 'alt-badge';
        badge.textContent = alt + 1;
        tile.appendChild(badge);
      }

      const name = document.createElement('div');
      name.className = 'char-name';
      name.textContent = char;
      tile.appendChild(name);

      grid.appendChild(tile);
    });
  }

  function addFb(tile, char) {
    const fb = document.createElement('div');
    fb.className = 'char-fallback';
    fb.textContent = char.length > 7 ? char.slice(0, 6) + '…' : char;
    tile.appendChild(fb);
  }

  // ── Picker ────────────────────────────────────────────

  function openPicker(char) {
    pickerChar = char;
    pickerSelected = skins[char] ?? 0;
    document.getElementById('pickerCharName').textContent = char;
    renderSwatches();
    updatePortrait();
    document.getElementById('pickerOverlay').classList.add('open');
  }

  function renderSwatches() {
    const container = document.getElementById('altSwatches');
    container.innerHTML = '';
    for (let i = 0; i < 8; i++) {
      const sw = document.createElement('div');
      sw.className = 'alt-swatch' + (i === pickerSelected ? ' selected' : '');
      sw.onclick = () => { pickerSelected = i; renderSwatches(); updatePortrait(); };

      const img = document.createElement('img');
      img.src = charAltImgUrl(pickerChar, i + 1);
      img.alt = `Alt ${i + 1}`;
      img.onerror = () => {
        img.remove();
        const fb = document.createElement('div');
        fb.className = 'swatch-fallback';
        fb.textContent = i + 1;
        sw.appendChild(fb);
      };
      sw.appendChild(img);

      const num = document.createElement('div');
      num.className = 'swatch-num';
      num.textContent = i + 1;
      sw.appendChild(num);

      container.appendChild(sw);
    }
  }

  function updatePortrait() {
    const img = document.getElementById('pickerPortraitImg');
    img.src = charAltImgUrl(pickerChar, pickerSelected + 1);
    img.onerror = () => { img.src = charImgUrl(pickerChar); };
    document.getElementById('pickerAltLabel').textContent =
      `Alt ${pickerSelected + 1}${pickerSelected === 0 ? ' — Default' : ''}`;
  }

  function confirmPick() {
    if (pickerChar === null) return;
    skins[pickerChar] = pickerSelected;
    closePicker();
    buildGrid();
  }

  function closePicker(e) {
    if (e && e.target !== document.getElementById('pickerOverlay')) return;
    document.getElementById('pickerOverlay').classList.remove('open');
    pickerChar = null;
  }

  // ── Save / Reset ──────────────────────────────────────

  function filterSkinsGrid() {
    const q = (document.getElementById('skinsSearch')?.value || '').toLowerCase().trim();
    document.querySelectorAll('#skinsGrid .skin-tile').forEach(tile => {
      const name = (tile.querySelector('img')?.alt || tile.querySelector('.char-fallback')?.textContent || tile.querySelector('.char-name')?.textContent || '').toLowerCase();
      tile.style.display = (!q || name.includes(q)) ? '' : 'none';
    });
  }

  async function saveSkins() {
    try {
      await apiPut('/characters/skins', { skins });
      showToast('Skin preferences saved!', 'success');
      document.getElementById('lastSaved').textContent = 'Last saved: just now';
    } catch (err) {
      showToast('Error saving: ' + err.message, 'error');
    }
  }

  function resetSkins() {
    if (!confirm('Clear all skin preferences?')) return;
    skins = {};
    buildGrid();
  }

  // ── Init ──────────────────────────────────────────────

  (async function init() {
    try {
      const me = await apiGet('/users/me');
      if (me) {
        document.getElementById('navUsername').textContent = me.username;
        const url = me.avatar_url || `https://api.dicebear.com/9.x/pixel-art/svg?seed=${encodeURIComponent(me.username)}`;
        const av = document.getElementById('navAvatar');
        av.src = url; av.style.display = 'block';
      }
    } catch (_) {}

    try {
      const data = await apiGet('/characters/skins');
      skins = data.skins || {};
    } catch (_) {}

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('skinsContent').style.display = 'block';
    buildGrid();
  })();
</script>
</body>
</html>
