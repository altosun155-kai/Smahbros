<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smash Bracket — Team Battle</title>
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/auth.js"></script>
  <script src="js/chars.js"></script>
  <style>
    /* ── Layout (mirrors bracket.html) ── */
    .bracket-layout { display: flex; gap: 24px; align-items: start; }
    .sidebar-wrap { width: 320px; flex-shrink: 0; }
    .sidebar-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
    .sidebar-card h2 { font-size: 0.88rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px; }

    /* ── Player row (like bracket.html entry grid) ── */
    .player-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; align-items: start; }
    .player-label { font-size: 0.85rem; color: var(--text); font-weight: 500; padding-top: 6px; }
    .char-picker-input { width: 100%; padding: 6px 8px; font-size: 0.82rem; background: #0f0f17; border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; color: #e8edf3; box-sizing: border-box; }
    .char-picker-input:focus { outline: none; border-color: var(--accent-blue); }

    /* ── CPP stepper (identical to bracket.html) ── */
    .cpp-row { display: flex; align-items: center; gap: 0; height: 34px; }
    .cpp-btn { padding: 0 13px; height: 100%; background: var(--card-bg2); border: 1px solid var(--border); color: var(--text); font-size: 1.1rem; cursor: pointer; font-weight: 700; line-height: 1; }
    .cpp-btn:first-child { border-right: none; border-radius: 6px 0 0 6px; }
    .cpp-btn:last-child  { border-left:  none; border-radius: 0 6px 6px 0; }
    .cpp-display { min-width: 36px; height: 100%; display: flex; align-items: center; justify-content: center; background: var(--card-bg2); border: 1px solid var(--border); font-size: 0.95rem; font-weight: 700; color: var(--text); padding: 0 10px; }

    /* ── Team section in sidebar ── */
    .team-header { display: flex; align-items: center; gap: 8px; margin: 16px 0 10px; }
    .team-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .team-name-inp { flex: 1; padding: 4px 8px; font-size: 0.9rem; font-weight: 700; background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--text); }
    .team-name-inp:focus { outline: none; border-bottom-color: var(--accent-blue); }
    .team-avg-elo { font-size: 0.72rem; color: var(--text-muted); margin-bottom: 10px; }
    .team-divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

    /* ── Friend chips ── */
    .friend-chip {
      display: flex; align-items: center; gap: 6px;
      background: var(--card-bg2); border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 10px 4px 6px;
      cursor: pointer; font-size: 0.82rem; color: var(--text);
      transition: border-color 0.15s;
    }
    .friend-chip:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
    .friend-chip.added { border-color: #4caf50; color: #4caf50; }
    .friend-chip img { width: 22px; height: 22px; border-radius: 50%; }
    .friend-chip .online-dot  { width: 7px; height: 7px; border-radius: 50%; background: #4caf50; flex-shrink: 0; }
    .friend-chip .offline-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); flex-shrink: 0; }

    /* ── Player select + autofill ── */
    .player-sel-row { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
    .player-sel { flex: 1; padding: 5px 8px; font-size: 0.82rem; background: #0f0f17; border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; color: var(--text); }
    .player-sel:focus { outline: none; border-color: var(--accent-blue); }
    .autofill-btn { padding: 4px 9px; font-size: 0.72rem; background: rgba(0,119,200,0.15); border: 1px solid rgba(0,119,200,0.35); border-radius: 5px; color: var(--accent-blue); cursor: pointer; white-space: nowrap; flex-shrink: 0; }
    .autofill-btn:hover { background: rgba(0,119,200,0.28); }
    .char-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; padding-left: 4px; }
    .char-inp { flex: 1; min-width: 80px; padding: 4px 7px; font-size: 0.78rem; background: #0f0f17; border: 1px solid rgba(255,255,255,0.1); border-radius: 5px; color: var(--text); }
    .char-inp:focus { outline: none; border-color: var(--accent-blue); }

    /* ── Sticky generate button ── */
    .sticky-bar { position: sticky; bottom: 0; z-index: 30; background: var(--navbar-bg); border-top: 1px solid var(--border); padding: 12px 0; display: flex; gap: 10px; align-items: center; margin-top: 20px; }

    /* ── Bracket main area ── */
    .bracket-rounds { display: flex; gap: 32px; overflow-x: auto; padding-bottom: 16px; align-items: start; }
    .round-col { flex-shrink: 0; }
    .round-title { font-size: 0.78rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
    .round-col.grand-final .round-title { color: var(--accent-gold); }

    /* ── Match group: one per team pairing per round ── */
    .match-group { background: var(--card-bg2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 14px; min-width: 260px; max-width: 300px; }
    .round-col.grand-final .match-group { border-color: rgba(245,166,35,0.35); box-shadow: 0 0 18px rgba(245,166,35,0.1); background: linear-gradient(135deg, #1a150a, #16213e); }
    .match-group.done { border-color: rgba(76,175,80,0.3); }

    .match-group-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .match-teams-label { font-size: 0.8rem; font-weight: 700; display: flex; align-items: center; gap: 6px; }
    .match-score-pill { font-size: 0.7rem; font-weight: 700; background: rgba(255,255,255,0.07); border-radius: 20px; padding: 2px 8px; color: var(--text-muted); font-variant-numeric: tabular-nums; }

    /* tbd/bye cards */
    .match-tbd { color: rgba(255,255,255,0.2); font-style: italic; font-size: 0.8rem; padding: 10px 0; text-align: center; }

    /* ── Individual game card ── */
    .game-card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.07); border-radius: 8px; padding: 9px 10px; margin-bottom: 7px; }
    .game-card.won { border-color: rgba(255,255,255,0.14); }
    .game-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 7px; }
    .game-sides { display: grid; grid-template-columns: 1fr auto 1fr; gap: 6px; align-items: center; }
    .game-side { display: flex; flex-direction: column; gap: 4px; }
    .game-side.right { align-items: flex-end; }
    .game-player-row { display: flex; align-items: center; gap: 5px; }
    .game-player-row.right { flex-direction: row-reverse; }
    .gc-icon { width: 24px; height: 24px; object-fit: contain; border-radius: 3px; background: rgba(255,255,255,0.04); flex-shrink: 0; }
    .gc-text { }
    .gc-char { font-size: 0.78rem; font-weight: 600; color: var(--text); }
    .gc-player { font-size: 0.68rem; color: var(--text-muted); }
    .game-vs-col { display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 900; color: rgba(255,255,255,0.18); }
    .game-action { margin-top: 8px; }
    .game-winner-row { display: flex; align-items: center; justify-content: space-between; }
    .game-winner-badge { font-size: 0.75rem; font-weight: 700; }
    .game-btns { display: flex; gap: 5px; }
    .g-win-btn { flex: 1; padding: 6px 4px; font-size: 0.72rem; font-weight: 800; border: none; border-radius: 6px; cursor: pointer; opacity: 0.85; transition: opacity 0.1s, transform 0.1s; }
    .g-win-btn:hover { opacity: 1; transform: scale(1.03); }
    .g-undo-btn { padding: 4px 8px; font-size: 0.68rem; background: none; border: 1px solid rgba(255,255,255,0.12); border-radius: 5px; color: var(--text-muted); cursor: pointer; }
    .g-undo-btn:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }

    /* ── Match winner section (below games) ── */
    .match-winner-section { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
    .match-winner-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 7px; }
    .match-win-btns { display: flex; gap: 6px; }
    .m-win-btn { flex: 1; padding: 9px 6px; font-size: 0.78rem; font-weight: 800; border: none; border-radius: 7px; cursor: pointer; opacity: 0.88; transition: opacity 0.1s, transform 0.1s; }
    .m-win-btn:hover { opacity: 1; transform: scale(1.03); }
    .match-result-row { display: flex; align-items: center; justify-content: space-between; }
    .match-result-badge { font-size: 0.85rem; font-weight: 800; }
    .m-undo-btn { padding: 4px 9px; font-size: 0.72rem; background: none; border: 1px solid rgba(255,255,255,0.12); border-radius: 5px; color: var(--text-muted); cursor: pointer; }
    .m-undo-btn:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }

    /* ── Winner banner ── */
    #winnerBanner { display: none; text-align: center; padding: 22px; background: linear-gradient(135deg, rgba(245,166,35,0.18), rgba(255,200,60,0.1)); border: 1.5px solid rgba(245,166,35,0.5); border-radius: 14px; margin-bottom: 20px; }
    #winnerBanner.show { display: block; }
    #winnerBanner .win-title { font-size: 0.7rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent-gold); margin-bottom: 6px; }
    #winnerBanner .win-name { font-size: 1.6rem; font-weight: 900; }

    #bracketEmpty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    #bracketEmpty .empty-icon { font-size: 3rem; margin-bottom: 12px; }

    @media (max-width: 900px) {
      .bracket-layout { flex-direction: column; }
      .sidebar-wrap { width: 100%; }
    }
  </style>
</head>
<body>
<script>requireAuth();</script>
<div id="toast-container"></div>
<nav class="navbar" id="main-nav"></nav>

<main class="page-container">
  <div class="page-header">
    <h1>👥 Team Battle Bracket</h1>
    <p>Team vs team — each match plays out as a series of character games. No Elo changes.</p>
  </div>

  <div class="bracket-layout">
    <!-- ── Sidebar ── -->
    <div class="sidebar-wrap">

      <!-- Setup (hidden when bracket is active) -->
      <div id="setupPane">
        <div class="sidebar-card">
          <h2>Tournament</h2>
          <div class="form-group" style="margin-bottom:12px;">
            <input type="text" id="tourneyName" placeholder="Tournament name" maxlength="50" />
          </div>

          <h2>Format</h2>
          <div style="margin-bottom:12px;">
            <label style="font-size:0.72rem;color:var(--text-muted);display:block;margin-bottom:4px;">Players / Team</label>
            <select id="playersPerTeam" onchange="rebuildTeamForms()" style="width:100%;padding:6px 8px;font-size:0.85rem;">
              <option value="1">1</option>
              <option value="2" selected>2</option>
              <option value="3">3</option>
              <option value="4">4</option>
            </select>
          </div>

          <!-- Friends quick-add -->
          <div id="friendsQuickAdd" style="display:none;margin-bottom:14px;">
            <h2>Add Friends</h2>
            <div id="friendChips" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
          </div>

          <h2>Characters per Player</h2>
          <div class="cpp-row" style="margin-bottom:16px;">
            <button type="button" class="cpp-btn" onclick="adjustCPP(-1)">−</button>
            <div class="cpp-display" id="cppDisplay">2</div>
            <button type="button" class="cpp-btn" onclick="adjustCPP(1)">+</button>
            <input type="hidden" id="charsPerPlayer" value="2" />
          </div>

          <h2>Teams</h2>
          <div id="teamForms"></div>
        </div>

        <div class="sticky-bar">
          <button class="btn btn-gold" onclick="generateBracket()">Generate Bracket</button>
        </div>
      </div>

      <!-- Active bracket info -->
      <div id="bracketInfoPane" style="display:none;">
        <div class="sidebar-card">
          <h2 id="bracketInfoTitle" style="color:var(--text);text-transform:none;font-size:1rem;margin-bottom:12px;"></h2>
          <div id="teamRoster"></div>
          <button class="btn btn-outline" style="width:100%;margin-top:14px;margin-bottom:8px;" onclick="endTournament()">End Tournament</button>
          <button class="btn btn-outline" style="width:100%;color:#e74c3c;border-color:rgba(231,76,60,0.4);" onclick="deleteBracket()">Delete Bracket</button>
        </div>
      </div>
    </div>

    <!-- ── Main bracket area ── -->
    <div style="flex:1;min-width:0;">
      <div id="winnerBanner">
        <div class="win-title">🏆 Tournament Champion</div>
        <div class="win-name" id="winnerName"></div>
      </div>
      <div id="bracketEmpty">
        <div class="empty-icon">👥</div>
        <p>Configure your teams and click <strong>Generate Bracket</strong> to start.</p>
      </div>
      <div id="bracketRounds" class="bracket-rounds" style="display:none;"></div>
    </div>
  </div>
</main>

<script src="js/nav-inject.js"></script>
<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script>
// ── State ─────────────────────────────────────────────────────────────────
let state = {
  bracketId: null,
  bracketName: '',
  teams: [],       // [{name, color, members:[{player,characters:[]}], lineups:[[char,...],...]}]
  bracketData: [], // [{a:teamName, b:teamName}]
  roundWinners: {},// r{ri}_m{mi}→teamName, r{ri}_m{mi}_g{gi}→teamName
  isLive: false,
  winner: null,
};

let _eloLb = null, _usersCache = null, _statsCache = {};

const TEAM_COLORS = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22','#e91e63'];

// ── Init ──────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  await loadUsers();
  rebuildTeamForms();
  loadFriends();
  const bid = new URLSearchParams(location.search).get('b');
  if (bid) await loadBracket(parseInt(bid));
});

async function loadUsers() {
  try { const d = await apiGet('/users/all'); _usersCache = (d||[]).map(u=>u.username).sort(); }
  catch { _usersCache = []; }
}
async function getEloLb() {
  if (!_eloLb) { try { _eloLb = await apiGet('/characters/stats/leaderboard/elo'); } catch { _eloLb=[]; } }
  return _eloLb;
}
async function getPlayerStats(u) {
  if (!_statsCache[u]) {
    try {
      const d = await apiGet(`/characters/stats/${encodeURIComponent(u)}`);
      _statsCache[u] = (d.stats||[]).filter(s=>(s.wins||0)+(s.losses||0)>0).sort((a,b)=>(b.elo||1000)-(a.elo||1000));
    } catch { _statsCache[u]=[]; }
  }
  return _statsCache[u];
}

// ── CPP stepper ───────────────────────────────────────────────────────────
function adjustCPP(d) {
  const inp = document.getElementById('charsPerPlayer');
  const v = Math.min(8, Math.max(1, parseInt(inp.value)+d));
  inp.value = v;
  document.getElementById('cppDisplay').textContent = v;
  rebuildTeamForms();
}
function getCPP() { return parseInt(document.getElementById('charsPerPlayer').value)||2; }

// ── Friends quick-add ─────────────────────────────────────────────────────
async function loadFriends() {
  const section = document.getElementById('friendsQuickAdd');
  const chips   = document.getElementById('friendChips');
  section.style.display = 'block';
  try {
    const friends = await apiGet('/friends');
    if (friends && friends.length) {
      friends.forEach(f => {
        const chip = document.createElement('div');
        chip.className = 'friend-chip';
        chip.id = `chip_${f.username}`;
        const av = f.avatar_url || `https://api.dicebear.com/9.x/pixel-art/svg?seed=${encodeURIComponent(f.username)}`;
        chip.innerHTML = `
          <img src="${av}" alt="${f.username}" onerror="this.src='https://api.dicebear.com/9.x/pixel-art/svg?seed=${encodeURIComponent(f.username)}'" />
          <span class="${f.active ? 'online-dot' : 'offline-dot'}"></span>
          ${f.username}`;
        chip.addEventListener('click', () => toggleFriendSlot(f.username, chip));
        chips.appendChild(chip);
      });
    } else {
      chips.innerHTML = '<span style="font-size:0.8rem;color:var(--text-muted);">No friends yet.</span>';
    }
  } catch (_) {
    chips.innerHTML = '<span style="font-size:0.8rem;color:var(--text-muted);">No friends yet.</span>';
  }
}

function toggleFriendSlot(username, chip) {
  const allSelects = [...document.querySelectorAll('.player-sel')];
  const existing = allSelects.find(s => s.value === username);
  if (existing) {
    existing.value = '';
    chip.classList.remove('added');
    existing.dispatchEvent(new Event('change'));
    return;
  }
  const empty = allSelects.find(s => !s.value);
  if (empty) {
    empty.value = username;
    chip.classList.add('added');
    empty.dispatchEvent(new Event('change'));
  } else {
    showToast('No empty player slots.', 'warn');
  }
}

function refreshChipStates() {
  const taken = new Set([...document.querySelectorAll('.player-sel')].map(s => s.value).filter(Boolean));
  document.querySelectorAll('.friend-chip').forEach(chip => {
    const u = chip.id.replace('chip_', '');
    chip.classList.toggle('added', taken.has(u));
  });
}

// ── Team forms ────────────────────────────────────────────────────────────
function rebuildTeamForms() {
  const numTeams = 2;
  const ppt      = parseInt(document.getElementById('playersPerTeam').value);
  const cpp      = getCPP();
  const container = document.getElementById('teamForms');

  const saved = {};
  container.querySelectorAll('[data-ti]').forEach(b => {
    const ti = b.dataset.ti;
    saved[ti] = { name: b.querySelector('.team-name-inp')?.value, members: [] };
    b.querySelectorAll('[data-mi]').forEach((slot, mi) => {
      saved[ti].members[mi] = {
        player: slot.querySelector('.player-sel')?.value||'',
        chars:  [...slot.querySelectorAll('.char-inp')].map(i=>i.value),
      };
    });
  });

  container.innerHTML = '';
  if (!document.getElementById('charlist')) {
    const dl = document.createElement('datalist'); dl.id='charlist';
    (SMASH_ROSTER||[]).forEach(c=>{const o=document.createElement('option');o.value=c;dl.appendChild(o);});
    document.body.appendChild(dl);
  }

  for (let t = 0; t < numTeams; t++) {
    const color = TEAM_COLORS[t % TEAM_COLORS.length];
    const svd   = saved[t] || {};
    const wrap  = document.createElement('div');
    wrap.dataset.ti = t;

    // Team name header
    const hdr = document.createElement('div');
    hdr.className = 'team-header';
    hdr.innerHTML = `<div class="team-dot" style="background:${color}"></div>
      <input class="team-name-inp" value="${svd.name||`Team ${t+1}`}" maxlength="24" />`;
    wrap.appendChild(hdr);

    // Players
    for (let m = 0; m < ppt; m++) {
      const sv = svd.members?.[m]||{};
      const slot = document.createElement('div');
      slot.dataset.mi = m;

      const opts = (_usersCache||[]).map(u=>
        `<option value="${u}"${sv.player===u?' selected':''}>${u}</option>`).join('');
      const charInps = Array.from({length:cpp},(_,ci)=>
        `<input class="char-inp" list="charlist" placeholder="Char ${ci+1}" value="${sv.chars?.[ci]||''}" autocomplete="off" />`
      ).join('');

      slot.innerHTML = `
        <div class="player-sel-row">
          <select class="player-sel"><option value="">— player —</option>${opts}</select>
          <button type="button" class="autofill-btn">⚡ Fill</button>
        </div>
        <div class="char-row">${charInps}</div>`;

      slot.querySelector('.autofill-btn').addEventListener('click', async () => {
        const p = slot.querySelector('.player-sel').value;
        if (!p) { showToast('Select a player first.','warn'); return; }
        const stats = await getPlayerStats(p);
        slot.querySelectorAll('.char-inp').forEach((inp,ci)=>{ inp.value=stats[ci]?.character||''; });
        updateAvgElo(t);
      });
      slot.querySelector('.player-sel').addEventListener('change', () => {
        updateAvgElo(t);
        refreshChipStates();
      });
      slot.querySelectorAll('.char-inp').forEach(el=>{
        el.addEventListener('change',()=>updateAvgElo(t));
        el.addEventListener('input', ()=>updateAvgElo(t));
      });
      wrap.appendChild(slot);
    }

    const avgEl = document.createElement('div');
    avgEl.className='team-avg-elo'; avgEl.id=`avgElo${t}`; avgEl.textContent='Avg Elo: —';
    wrap.appendChild(avgEl);

    if (t < numTeams-1) {
      const hr = document.createElement('hr'); hr.className='team-divider';
      wrap.appendChild(hr);
    }
    container.appendChild(wrap);
  }
  refreshChipStates();
}

async function updateAvgElo(ti) {
  const lb = await getEloLb();
  const wrap = document.querySelector(`[data-ti="${ti}"]`);
  if (!wrap) return;
  let total=0, count=0;
  wrap.querySelectorAll('[data-mi]').forEach(slot => {
    const p = slot.querySelector('.player-sel').value;
    slot.querySelectorAll('.char-inp').forEach(inp => {
      const c = inp.value.trim();
      if (p && c) { const r=lb.find(x=>x.username===p&&x.character===c); total+=(r?.elo||1000); count++; }
    });
  });
  const el = document.getElementById(`avgElo${ti}`);
  if (el) el.textContent = count>0 ? `Avg Elo: ${Math.round(total/count)}` : 'Avg Elo: —';
}

// ── Collect + shuffle + lineups ───────────────────────────────────────────
function collectTeams() {
  return [...document.querySelectorAll('[data-ti]')].map((wrap,t)=>({
    name: wrap.querySelector('.team-name-inp').value.trim()||`Team ${t+1}`,
    color: TEAM_COLORS[t%TEAM_COLORS.length],
    members: [...wrap.querySelectorAll('[data-mi]')].map(slot=>({
      player: slot.querySelector('.player-sel').value,
      characters: [...slot.querySelectorAll('.char-inp')].map(i=>i.value.trim()).filter(Boolean),
    })).filter(m=>m.player),
  }));
}

function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function buildLineups(team) {
  const numGames = Math.max(0,...team.members.map(m=>m.characters.length));
  const perPlayer = team.members.map(m=>shuffle(m.characters));
  return Array.from({length:numGames},(_,g)=>
    team.members.map((_,pi)=>perPlayer[pi][g]).filter(Boolean)
  );
}

// ── Generate bracket ──────────────────────────────────────────────────────
async function generateBracket() {
  const name = document.getElementById('tourneyName').value.trim()||'Team Battle';
  const teams = collectTeams();
  if (teams.length<2) { showToast('Need at least 2 teams.','error'); return; }

  const lb = await getEloLb();
  const seeded = shuffle(teams.map(t=>{
    const elos = t.members.flatMap(m=>m.characters.map(c=>(lb.find(r=>r.username===m.player&&r.character===c)?.elo||1000)));
    return {...t, avgElo: elos.length ? Math.round(elos.reduce((a,b)=>a+b,0)/elos.length) : 1000};
  }));

  let size=2; while(size<seeded.length) size*=2;
  while(seeded.length<size) seeded.push({name:'BYE',color:'#555',members:[],avgElo:0,isBye:true});

  const pairs=[];
  for(let i=0;i<size;i+=2) pairs.push({a:seeded[i].name,b:seeded[i+1].name});

  const teamsDict={};
  seeded.filter(t=>!t.isBye).forEach(t=>{
    teamsDict[t.name]={color:t.color,members:t.members,lineups:buildLineups(t)};
  });

  try {
    const res = await apiPost('/brackets',{name,mode:'team_battle',bracket_data:pairs,bracket_style:'random',is_live:true,teams:teamsDict});
    if (res.id) { await loadBracket(res.id); history.pushState({},'',`?b=${res.id}`); }
  } catch { showToast('Failed to create bracket.','error'); }
}

// ── Load bracket ──────────────────────────────────────────────────────────
async function loadBracket(bracketId) {
  try {
    const data = await apiGet(`/brackets/${bracketId}`);
    state.bracketId=data.id; state.bracketName=data.name;
    state.bracketData=data.bracket_data||[]; state.roundWinners=data.round_winners||{};
    state.isLive=data.is_live; state.winner=data.winner||null;

    const td=data.teams||{};
    state.teams=Object.entries(td).map(([name,val],i)=>{
      const raw=Array.isArray(val)?val:(val.members||[]);
      return {
        name, color:val.color||TEAM_COLORS[i%TEAM_COLORS.length],
        members:raw.map(m=>({player:m.player,characters:m.characters||(m.character?[m.character]:[]) })),
        lineups:val.lineups||[],
      };
    });

    await initializeByes();
    renderBracket();
    showBracketView();
  } catch { showToast('Bracket not found.','error'); }
}

async function initializeByes() {
  const tasks=[];
  state.bracketData.forEach((pair,mi)=>{
    const key=`r0_m${mi}`;
    if(state.roundWinners[key]) return;
    const w=pair.a==='BYE'?pair.b:pair.b==='BYE'?pair.a:null;
    if(w){state.roundWinners[key]=w;tasks.push(apiPatch(`/brackets/${state.bracketId}/winner`,{key,winner:w}));}
  });
  if(tasks.length) await Promise.all(tasks);
}

function showBracketView() {
  document.getElementById('setupPane').style.display='none';
  document.getElementById('bracketInfoPane').style.display='block';
  document.getElementById('bracketRounds').style.display='flex';
  document.getElementById('bracketEmpty').style.display='none';
  document.getElementById('bracketInfoTitle').textContent=state.bracketName;
  renderRoster();
  if(state.winner){
    document.getElementById('winnerName').textContent=state.winner;
    document.getElementById('winnerBanner').classList.add('show');
  } else {
    document.getElementById('winnerBanner').classList.remove('show');
  }
}

function renderRoster() {
  document.getElementById('teamRoster').innerHTML=state.teams.map(t=>`
    <div style="margin-bottom:10px;">
      <div style="font-size:0.88rem;font-weight:700;display:flex;align-items:center;gap:7px;margin-bottom:4px;">
        <div style="width:8px;height:8px;border-radius:50%;background:${t.color};flex-shrink:0;"></div>${t.name}
      </div>
      ${t.members.map(m=>`<div style="font-size:0.75rem;color:var(--text-muted);padding-left:15px;">${m.player}${m.characters.length?` — ${m.characters.join(', ')}`:''}</div>`).join('')}
    </div>`).join('');
}

// ── Bracket rounds ─────────────────────────────────────────────────────────
function getRounds() {
  const rounds=[{}];
  state.bracketData.forEach((p,mi)=>{rounds[0][mi]=[p.a,p.b];});
  let ri=0;
  while(Object.keys(rounds[ri]).length>1){
    const prev=rounds[ri],next={};
    const mis=Object.keys(prev).map(Number).sort((a,b)=>a-b);
    for(let j=0;j<mis.length;j+=2){
      if(j+1>=mis.length) break;
      next[j/2]=[state.roundWinners[`r${ri}_m${mis[j]}`]||'',state.roundWinners[`r${ri}_m${mis[j+1]}`]||''];
    }
    rounds.push(next); ri++;
  }
  return rounds;
}

function roundLabel(ri,total){
  const rem=total-1-ri;
  if(rem===0) return 'Grand Final';
  if(rem===1) return 'Semifinals';
  if(rem===2) return 'Quarterfinals';
  return `Round ${ri+1}`;
}

function getTeam(name){return state.teams.find(t=>t.name===name);}

function charImgUrl(c){
  if(!c) return '';
  const ov=typeof CHAR_FILE_OVERRIDES!=='undefined'&&CHAR_FILE_OVERRIDES[c];
  return `${SUPABASE_CHARS}${encodeURIComponent(ov||`${c}.png`)}`;
}

function matchGameScore(key){
  const s={};
  let g=0;
  while(state.roundWinners[`${key}_g${g}`]!==undefined){
    const w=state.roundWinners[`${key}_g${g}`];
    if(w) s[w]=(s[w]||0)+1;
    g++;
  }
  return s;
}

// ── Render bracket ────────────────────────────────────────────────────────
function renderBracket() {
  const rounds=getRounds();
  const container=document.getElementById('bracketRounds');
  container.innerHTML='';
  const total=rounds.length;

  rounds.forEach((matches,ri)=>{
    const col=document.createElement('div');
    col.className='round-col'+(ri===total-1?' grand-final':'');
    col.innerHTML=`<div class="round-title">${roundLabel(ri,total)}</div>`;

    Object.keys(matches).map(Number).sort((a,b)=>a-b).forEach(mi=>{
      const [aName,bName]=matches[mi];
      const key=`r${ri}_m${mi}`;
      const matchWinner=state.roundWinners[key]||'';
      const isBye=aName==='BYE'||bName==='BYE';
      const ta=getTeam(aName), tb=getTeam(bName);

      const grp=document.createElement('div');
      grp.className='match-group'+(matchWinner?' done':'');

      // TBD / BYE
      if(isBye||!aName||!bName){
        grp.innerHTML=`<div class="match-tbd">${!aName||!bName?'TBD':'BYE'}</div>`;
        col.appendChild(grp); return;
      }

      // Score
      const score=matchGameScore(key);
      const numGames=Math.max(ta?.lineups?.length||0,tb?.lineups?.length||0);
      const sA=score[aName]||0, sB=score[bName]||0;

      // Header
      grp.innerHTML=`
        <div class="match-group-hdr">
          <div class="match-teams-label">
            <span style="color:${ta?.color||'#fff'}">${aName}</span>
            <span style="color:rgba(255,255,255,0.3);font-size:0.7rem;">vs</span>
            <span style="color:${tb?.color||'#fff'}">${bName}</span>
          </div>
          <div class="match-score-pill">${sA} – ${sB}</div>
        </div>`;

      // Individual game cards
      for(let g=0;g<numGames;g++){
        const gKey=`${key}_g${g}`;
        const gWinner=state.roundWinners[gKey]||'';
        const aLineup=ta?.lineups?.[g]||[];
        const bLineup=tb?.lineups?.[g]||[];

        const card=document.createElement('div');
        card.className='game-card'+(gWinner?' won':'');

        // Side HTML builder
        const sideHtml=(lineup,team,isRight)=>lineup.map((char,pi)=>{
          const player=team?.members?.[pi]?.player||'';
          return `<div class="game-player-row${isRight?' right':''}">
            <img class="gc-icon" src="${charImgUrl(char)}" alt="${char}" title="${char}" onerror="this.style.display='none'" />
            <div class="gc-text${isRight?'" style="text-align:right':''}">
              <div class="gc-char">${char}</div>
              <div class="gc-player">${player}</div>
            </div>
          </div>`;
        }).join('');

        let actionHtml='';
        if(gWinner){
          const winTeam=gWinner===aName?ta:tb;
          actionHtml=`<div class="game-action">
            <div class="game-winner-row">
              <div class="game-winner-badge" style="color:${winTeam?.color||'#ffe066'}">🏆 ${gWinner}</div>
              ${!matchWinner?`<button class="g-undo-btn" onclick="recordGame('${gKey}','',true)">undo</button>`:''}
            </div>
          </div>`;
        } else if(!matchWinner){
          actionHtml=`<div class="game-action">
            <div class="game-btns">
              <button class="g-win-btn" style="background:${ta?.color||'#cc1111'}88;color:#fff;" onclick="recordGame('${gKey}','${aName}',false)">${aName}</button>
              <button class="g-win-btn" style="background:${tb?.color||'#1155cc'}88;color:#fff;" onclick="recordGame('${gKey}','${bName}',false)">${bName}</button>
            </div>
          </div>`;
        }

        card.innerHTML=`
          <div class="game-label">Game ${g+1}</div>
          <div class="game-sides">
            <div class="game-side">${sideHtml(aLineup,ta,false)}</div>
            <div class="game-vs-col">vs</div>
            <div class="game-side right">${sideHtml(bLineup,tb,true)}</div>
          </div>
          ${actionHtml}`;

        grp.appendChild(card);
      }

      // Match winner section
      const mws=document.createElement('div');
      mws.className='match-winner-section';
      if(matchWinner){
        const wt=getTeam(matchWinner);
        mws.innerHTML=`<div class="match-result-row">
          <div class="match-result-badge" style="color:${wt?.color||'#ffe066'}">🏆 ${matchWinner} wins</div>
          <button class="m-undo-btn" onclick="undoMatchWinner('${key}')">undo</button>
        </div>`;
      } else {
        mws.innerHTML=`<div class="match-winner-label">Who wins the match?</div>
          <div class="match-win-btns">
            <button class="m-win-btn" style="background:${ta?.color||'#cc1111'}88;color:#fff;" onclick="setMatchWinner('${key}','${aName}',${ri})">${aName}</button>
            <button class="m-win-btn" style="background:${tb?.color||'#1155cc'}88;color:#fff;" onclick="setMatchWinner('${key}','${bName}',${ri})">${bName}</button>
          </div>`;
      }
      grp.appendChild(mws);
      col.appendChild(grp);
    });

    container.appendChild(col);
  });
}

// ── Game & match recording ────────────────────────────────────────────────
async function recordGame(gKey, teamName, isUndo) {
  const winner = isUndo ? '' : teamName;
  try {
    await apiPatch(`/brackets/${state.bracketId}/winner`,{key:gKey,winner});
    if(isUndo) delete state.roundWinners[gKey];
    else state.roundWinners[gKey]=winner;
    renderBracket();
  } catch { showToast('Failed to record game.','error'); }
}

async function setMatchWinner(key, teamName, ri) {
  const rounds=getRounds();
  const isGF=ri===rounds.length-1;
  try {
    await apiPatch(`/brackets/${state.bracketId}/winner`,{
      key,winner:teamName,tournament_winner:isGF?teamName:null,
    });
    state.roundWinners[key]=teamName;
    if(isGF){
      state.winner=teamName;
      document.getElementById('winnerName').textContent=teamName;
      document.getElementById('winnerBanner').classList.add('show');
    }
    renderBracket();
  } catch { showToast('Failed to record match winner.','error'); }
}

async function undoMatchWinner(key) {
  try {
    await apiPatch(`/brackets/${state.bracketId}/winner`,{key,winner:''});
    delete state.roundWinners[key];
    state.winner=null;
    document.getElementById('winnerBanner').classList.remove('show');
    renderBracket();
  } catch { showToast('Failed to undo.','error'); }
}

// ── End / Delete ──────────────────────────────────────────────────────────
async function endTournament(){
  if(!confirm('End this tournament?')) return;
  try{await apiPatch(`/brackets/${state.bracketId}/end`,{});showToast('Tournament ended.','success');}
  catch{showToast('Failed.','error');}
}
async function deleteBracket(){
  if(!confirm('Delete this bracket permanently?')) return;
  try{
    await apiDelete(`/brackets/${state.bracketId}`);
    state.bracketId=null;
    document.getElementById('setupPane').style.display='block';
    document.getElementById('bracketInfoPane').style.display='none';
    document.getElementById('bracketRounds').style.display='none';
    document.getElementById('bracketEmpty').style.display='block';
    document.getElementById('winnerBanner').classList.remove('show');
    history.pushState({},'',location.pathname);
    showToast('Deleted.','success');
  } catch{showToast('Failed.','error');}
}

function showToast(msg,type='info'){_showToast(msg,type);}
</script>
