<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boomerang Arena — Smahbros</title>
  <script src="js/auth.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background:
        radial-gradient(ellipse 120% 45% at 50% -8%, rgba(0,55,140,0.38) 0%, transparent 60%),
        #0d0d1a;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* ── Lobby ────────────────────────────────────────── */
    #lobby {
      width: 340px;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 20px;
      padding: 36px 32px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    #lobby h1 {
      font-size: 1.35rem;
      font-weight: 700;
      text-align: center;
      letter-spacing: .02em;
      margin-bottom: 4px;
    }
    #lobby h1 span { color: #4fc3f7; }

    .hint {
      font-size: 0.78rem;
      color: #64748b;
      text-align: center;
      line-height: 1.5;
    }

    #lobby input {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 11px 14px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border-color .15s;
    }
    #lobby input:focus { border-color: rgba(79,195,247,0.55); }
    #lobby input::placeholder { color: #475569; }

    #btn-join {
      background: #4fc3f7;
      color: #0d0d1a;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s;
      margin-top: 2px;
    }
    #btn-join:hover { background: #81d4fa; }

    #status {
      text-align: center;
      font-size: 0.85rem;
      color: #94a3b8;
      min-height: 1.2em;
    }
    #status.err { color: #ef5350; }

    /* ── Controls key legend ─────────────────────────── */
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-top: 4px;
    }
    .ctrl {
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.78rem;
      color: #94a3b8;
    }
    .ctrl strong { color: #e2e8f0; }

    /* ── Game canvas wrapper ─────────────────────────── */
    #game-wrap { display: none; position: relative; }
    #game-wrap canvas { display: block; border-radius: 10px; }
  </style>
</head>
<body>
<script>requireAuth();</script>

<!-- ── Lobby ──────────────────────────────────────────── -->
<div id="lobby">
  <h1>Boomerang <span>Arena</span></h1>
  <p class="hint">Share a Room ID with a friend — first two in win.</p>

  <input id="inp-room" placeholder="Room ID (e.g. lobby1)" autocomplete="off" />
  <input id="inp-user" placeholder="Username" autocomplete="off" />
  <button id="btn-join">Join Room</button>
  <div id="status"></div>

  <div class="controls">
    <div class="ctrl"><strong>WASD</strong> — move</div>
    <div class="ctrl"><strong>Right-click</strong> — throw</div>
    <div class="ctrl"><strong>Left-click</strong> — slash</div>
    <div class="ctrl"><strong>3 HP</strong> — last one standing</div>
  </div>
</div>

<!-- ── Phaser canvas ─────────────────────────────────── -->
<div id="game-wrap"></div>

<script>
const WS_BASE = 'wss://smash-bracket-api.onrender.com';
const token   = localStorage.getItem('authToken') || '';

let ws         = null;
let playerSlot = null;
let phaserGame = null;
let scene      = null;

const lobbyEl  = document.getElementById('lobby');
const gameWrap = document.getElementById('game-wrap');
const statusEl = document.getElementById('status');

// Pre-fill username from stored value
const savedUser = localStorage.getItem('username');
if (savedUser) document.getElementById('inp-user').value = savedUser;

// ── Lobby join ────────────────────────────────────────────────────────────────
document.getElementById('btn-join').addEventListener('click', tryJoin);
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && lobbyEl.style.display !== 'none') tryJoin();
});

function tryJoin() {
  const roomId   = document.getElementById('inp-room').value.trim();
  const username = document.getElementById('inp-user').value.trim() || 'Player';
  if (!roomId) { setStatus('Enter a Room ID.', true); return; }
  connect(roomId, username);
}

function setStatus(msg, isErr = false) {
  statusEl.textContent = msg;
  statusEl.className   = isErr ? 'err' : '';
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connect(roomId, username) {
  setStatus('Connecting…');
  const slowTimer = setTimeout(() =>
    setStatus('Server is waking up — this takes ~30s on first load…'), 4000);

  ws = new WebSocket(`${WS_BASE}/ws/game/${roomId}`);

  ws.onopen = () => {
    clearTimeout(slowTimer);
    ws.send(JSON.stringify({ token, username }));
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);

    if (msg.type === 'error') {
      setStatus(msg.message, true);
      ws.close();
      return;
    }
    if (msg.type === 'joined') {
      playerSlot = msg.slot;
      setStatus(`You are Player ${msg.slot + 1}. Waiting for opponent…`);
    }
    if (msg.type === 'player_joined') {
      setStatus(`${msg.username} joined — starting soon…`);
    }
    if (msg.type === 'start' && !phaserGame) {
      lobbyEl.style.display  = 'none';
      gameWrap.style.display = 'block';
      phaserGame = launchPhaser();
    }
    if (msg.type === 'state' && scene) {
      scene.applyState(msg);
    }
    if (msg.type === 'player_left' && scene) {
      scene.showOverlay('Opponent disconnected');
    }
  };

  ws.onclose = () => {
    if (scene) scene.showOverlay('Disconnected from server');
    else setStatus('Connection closed — server may have rejected the session.', true);
  };
  ws.onerror = () => setStatus('Connection failed — server may be starting up, try again in 30s.', true);
}

// ── Keyboard input ────────────────────────────────────────────────────────────
const held = { up: false, down: false, left: false, right: false };
const KEY_MAP = {
  w: 'up', arrowup: 'up',
  s: 'down', arrowdown: 'down',
  a: 'left', arrowleft: 'left',
  d: 'right', arrowright: 'right',
};

function sendKeys() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'input', keys: { ...held } }));
  }
}

document.addEventListener('keydown', (e) => {
  const k = KEY_MAP[e.key.toLowerCase()];
  if (k && !held[k]) { held[k] = true; sendKeys(); }
});
document.addEventListener('keyup', (e) => {
  const k = KEY_MAP[e.key.toLowerCase()];
  if (k) { held[k] = false; sendKeys(); }
});

document.addEventListener('contextmenu', (e) => e.preventDefault());

// ── Phaser ────────────────────────────────────────────────────────────────────
function launchPhaser() {
  // Slime colours — base, highlight, shadow
  const SLIME_BASE  = [0x4fc3f7, 0xff6b6b];
  const SLIME_LIGHT = [0x9edcf8, 0xffaaaa];
  const SLIME_DARK  = [0x1a7aaa, 0xc0392b];

  const HP_COLORS   = [0x4fc3f7, 0xff6b6b];
  // Boomerangs: warm yellow/orange — stand out on green grass
  const BOOM_COLORS = [0xffd54f, 0xff8a65];

  // Arena geometry (matches server physics boundary)
  const FL = 20, FR = 780, FT = 38, FB = 562;   // floor left/right/top/bottom

  // Wall palette
  const W_TOP   = 0xb09ae8;   // top face of wall block (light purple)
  const W_FRONT = 0x7a55cc;   // front face
  const W_DEEP  = 0x4a3090;   // inner shadow / corner
  const W_EDGE  = 0x9070d8;   // bright edge line

  // Floor palette
  const GRASS_A = 0x5cb85c;   // main green
  const GRASS_B = 0x4da84d;   // slightly darker for tile grid

  // Draws a cute slime blob with eyes + smile at (x, y)
  function drawSlime(g, x, y, idx) {
    const base = SLIME_BASE[idx];
    const dark = SLIME_DARK[idx];

    // Drop shadow
    g.fillStyle(0x000000, 0.22);
    g.fillEllipse(x + 4, y + 25, 52, 14);

    // Lower body — wide squished ellipse
    g.fillStyle(base, 1);
    g.fillEllipse(x, y + 6, 50, 30);
    // Upper dome — slightly narrower
    g.fillEllipse(x, y - 4, 42, 32);

    // Side shading
    g.fillStyle(dark, 0.28);
    g.fillCircle(x + 11, y + 4, 22);

    // Specular highlight
    g.fillStyle(0xffffff, 0.52);
    g.fillEllipse(x - 10, y - 10, 20, 13);

    // Eyes — white sclera
    g.fillStyle(0xffffff, 1);
    g.fillCircle(x - 9, y - 2, 7.5);
    g.fillCircle(x + 9, y - 2, 7.5);
    // Pupils
    g.fillStyle(0x111122, 1);
    g.fillCircle(x - 8, y - 1, 4.5);
    g.fillCircle(x + 10, y - 1, 4.5);
    // Eye shine
    g.fillStyle(0xffffff, 1);
    g.fillCircle(x - 6, y - 3, 2);
    g.fillCircle(x + 12, y - 3, 2);

    // Smile (arc from 0→π clockwise = U shape)
    g.lineStyle(2.5, 0x111122, 0.8);
    g.beginPath();
    g.arc(x, y + 9, 6, 0, Math.PI, false);
    g.strokePath();
  }

  // Draws a boomerang — warm colours so it reads clearly on green
  function drawBoom(g, bx, by, col, returning) {
    g.fillStyle(0x000000, 0.25);
    g.fillEllipse(bx + 3, by + 11, 18, 5);
    g.fillStyle(col, 1);
    g.fillTriangle(bx, by - 10, bx - 7, by + 4, bx + 1, by + 1);
    g.fillTriangle(bx, by - 10, bx + 7, by + 4, bx - 1, by + 1);
    g.fillStyle(0xffffff, returning ? 0.75 : 0.4);
    g.fillCircle(bx - 2, by - 4, 2.5);
  }

  return new Phaser.Game({
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    backgroundColor: '#1a1025',
    parent: 'game-wrap',
    input: { mouse: { preventDefaultDown: true } },
    scene: {
      key: 'GameScene',
      preload() {},

      create() {
        scene = this;
        const g = this.add.graphics();

        // ── Grass floor ───────────────────────────────
        g.fillStyle(GRASS_A, 1);
        g.fillRect(FL, FT, FR - FL, FB - FT);
        // Subtle tile grid
        g.lineStyle(1, GRASS_B, 0.35);
        for (let x = FL; x <= FR; x += 48) g.lineBetween(x, FT, x, FB);
        for (let y = FT; y <= FB; y += 48) g.lineBetween(FL, y, FR, y);

        // ── Top wall — top face + front face ─────────
        g.fillStyle(W_TOP, 1);
        g.fillRect(0, 0, 800, FT - 16);
        g.fillStyle(W_FRONT, 1);
        g.fillRect(0, FT - 16, 800, 16);

        // ── Bottom wall ───────────────────────────────
        g.fillStyle(W_FRONT, 1);
        g.fillRect(0, FB, 800, 22);
        g.fillStyle(W_DEEP, 1);
        g.fillRect(0, FB + 22, 800, 600 - FB - 22);

        // ── Side walls ────────────────────────────────
        g.fillStyle(W_FRONT, 1);
        g.fillRect(0, FT, FL, FB - FT);
        g.fillRect(FR, FT, 800 - FR, FB - FT);
        // Inner shadow strip
        g.fillStyle(W_DEEP, 0.45);
        g.fillRect(FL, FT, 6, FB - FT);
        g.fillRect(FR - 6, FT, 6, FB - FT);

        // ── Corner blocks ─────────────────────────────
        g.fillStyle(W_DEEP, 1);
        g.fillRect(0, 0, FL, FT);
        g.fillRect(FR, 0, 800 - FR, FT);
        g.fillRect(0, FB, FL, 600 - FB);
        g.fillRect(FR, FB, 800 - FR, 600 - FB);

        // ── Wall block texture lines ──────────────────
        g.lineStyle(1, W_DEEP, 0.45);
        // Top wall vertical block seams
        for (let x = 0; x < 800; x += 80) g.lineBetween(x, 0, x, FT);
        // Bottom wall seams
        for (let x = 0; x < 800; x += 80) g.lineBetween(x, FB, x, 600);
        // Side wall horizontal seams
        for (let y = FT; y < FB; y += 70) {
          g.lineBetween(0, y, FL, y);
          g.lineBetween(FR, y, 800, y);
        }

        // ── Floor edge highlight ──────────────────────
        g.lineStyle(2, W_EDGE, 0.7);
        g.lineBetween(FL, FT, FR, FT);
        g.lineBetween(FL, FB, FR, FB);
        g.lineBetween(FL, FT, FL, FB);
        g.lineBetween(FR, FT, FR, FB);

        // ── Dynamic layers ────────────────────────────
        this.slashGfx = this.add.graphics();
        this.boomGfx  = this.add.graphics();
        this.slimeGfx = this.add.graphics();

        // ── Name labels ───────────────────────────────
        this.nameLabels = [
          this.add.text(0, 0, '', {
            fontSize: '11px', color: '#0d2b3e',
            stroke: '#ffffff', strokeThickness: 3,
          }).setOrigin(0.5),
          this.add.text(0, 0, '', {
            fontSize: '11px', color: '#3e0d0d',
            stroke: '#ffffff', strokeThickness: 3,
          }).setOrigin(0.5),
        ];

        // ── HP pips ───────────────────────────────────
        this.hpPips = [[], []];
        for (let s = 0; s < 2; s++) {
          for (let i = 0; i < 3; i++) {
            const x = s === 0 ? 30 + i * 17 : 770 - i * 17;
            this.hpPips[s].push(this.add.circle(x, 18, 6, HP_COLORS[s]));
          }
        }

        // ── Cooldown bar ──────────────────────────────
        this.cooldownBg  = this.add.rectangle(400, 582, 140, 6, 0x3a2860);
        this.cooldownBar = this.add.rectangle(330, 582, 0, 6, SLIME_BASE[playerSlot ?? 0]).setOrigin(0, 0.5);

        // ── Overlay ───────────────────────────────────
        this.overlayBg   = this.add.rectangle(400, 300, 800, 600, 0x000000, 0).setVisible(false);
        this.overlayText = this.add.text(400, 300, '', {
          fontSize: '44px', fontStyle: 'bold', color: '#ffffff',
          stroke: '#000000', strokeThickness: 6,
        }).setOrigin(0.5).setVisible(false);

        // ── Mouse input ───────────────────────────────
        this._pos = [{ x: 200, y: 300 }, { x: 600, y: 300 }];
        this.input.on('pointerdown', (ptr) => {
          if (!ws || ws.readyState !== WebSocket.OPEN || playerSlot === null) return;
          const me = this._pos[playerSlot];
          if (ptr.rightButtonDown()) {
            const dx = ptr.x - me.x, dy = ptr.y - me.y;
            const len = Math.hypot(dx, dy) || 1;
            ws.send(JSON.stringify({ type: 'throw', dx: dx / len, dy: dy / len }));
          } else if (ptr.leftButtonDown()) {
            ws.send(JSON.stringify({ type: 'slash' }));
          }
        });
      },

      update() {},

      applyState(state) {
        // ── HUD ────────────────────────────────────
        state.players.forEach((p, i) => {
          if (!p) return;
          this._pos[i] = { x: p.x, y: p.y };
          this.nameLabels[i].setPosition(p.x, p.y - 42).setText(p.username);
          for (let h = 0; h < 3; h++) {
            this.hpPips[i][h].setAlpha(h < p.hp ? 1 : 0.15);
          }
        });

        // ── Slash flash ────────────────────────────
        this.slashGfx.clear();
        (state.slashing || []).forEach((active, i) => {
          if (!active || !state.players[i]) return;
          const p = state.players[i];
          this.slashGfx.fillStyle(SLIME_BASE[i], 0.2);
          this.slashGfx.fillCircle(p.x, p.y, 62);
          this.slashGfx.lineStyle(2, SLIME_BASE[i], 0.55);
          this.slashGfx.strokeCircle(p.x, p.y, 62);
        });

        // ── Boomerangs ─────────────────────────────
        this.boomGfx.clear();
        (state.boomerangs || []).forEach((b) => {
          drawBoom(this.boomGfx, b.x, b.y, BOOM_COLORS[b.owner], b.returning);
        });

        // ── Slimes ─────────────────────────────────
        this.slimeGfx.clear();
        state.players.forEach((p, i) => {
          if (!p) return;
          this._pos[i] = { x: p.x, y: p.y };
          drawSlime(this.slimeGfx, p.x, p.y, i);
          // "You" indicator ring under slime
          if (i === playerSlot) {
            this.slimeGfx.lineStyle(2.5, 0xffffff, 0.45);
            this.slimeGfx.strokeEllipse(p.x, p.y + 25, 46, 12);
          }
        });

        // ── Win/lose ───────────────────────────────
        if (state.phase === 'done' && state.winner !== null) {
          this.showOverlay(state.winner === playerSlot ? 'You Win!' : 'You Lose');
        }
      },

      showOverlay(text) {
        this.overlayBg.setFillStyle(0x000000, 0.65).setVisible(true);
        this.overlayText.setText(text).setVisible(true);
      },
    },
  });
}
</script>
</body>
</html>
