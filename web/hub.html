<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Hub — Smashbros</title>
  <script src="js/auth.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #06060f;
      --text:    #e8e8f4;
      --muted:   rgba(232,232,244,0.3);
      --line:    rgba(255,255,255,0.07);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 28px 52px;
      overflow: hidden;
    }

    /* Animated background orbs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
    }
    body::before {
      width: 70vw; height: 70vw;
      background: radial-gradient(circle, rgba(79,195,247,0.07) 0%, transparent 70%);
      top: -30vw; left: -20vw;
      animation: drift 14s ease-in-out infinite alternate;
    }
    body::after {
      width: 55vw; height: 55vw;
      background: radial-gradient(circle, rgba(168,85,247,0.06) 0%, transparent 70%);
      bottom: -15vw; right: -10vw;
      animation: drift 19s ease-in-out infinite alternate-reverse;
    }
    @keyframes drift {
      from { transform: translate(0, 0); }
      to   { transform: translate(8vw, 6vw); }
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 1;
    }
    .wordmark {
      font-family: 'Bebas Neue', 'Arial Black', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.16em;
      color: var(--muted);
    }
    .signout {
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-decoration: none;
      cursor: pointer;
      transition: color 0.15s;
    }
    .signout:hover { color: var(--text); }

    /* Main */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    /* Giant stacked title */
    .title {
      font-family: 'Bebas Neue', 'Arial Black', sans-serif;
      font-size: clamp(5.5rem, 19vw, 15rem);
      line-height: 0.86;
      letter-spacing: 0.01em;
      margin-bottom: 2.8rem;
      user-select: none;
      animation: fadeUp 0.55s ease both;
    }
    .title .t2 { color: #4fc3f7; }

    /* Divider + label */
    .divider {
      width: 72px;
      height: 1px;
      background: var(--line);
      margin-bottom: 1.4rem;
      animation: fadeUp 0.55s 0.05s ease both;
    }
    .label {
      font-size: 0.6rem;
      letter-spacing: 0.24em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 1.2rem;
      animation: fadeUp 0.55s 0.08s ease both;
    }

    /* Menu rows */
    .menu { list-style: none; }
    .menu li { border-top: 1px solid var(--line); }
    .menu li:last-child { border-bottom: 1px solid var(--line); }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.68rem 0;
      text-decoration: none;
      color: var(--text);
      font-size: clamp(0.72rem, 1.6vw, 0.92rem);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      position: relative;
      transition: color 0.16s;
    }
    /* Row hover background sweep */
    .menu-item::before {
      content: '';
      position: absolute;
      inset: 0 -52px;
      background: transparent;
      transition: background 0.2s;
      pointer-events: none;
    }
    .menu-item:hover::before { background: rgba(255,255,255,0.025); }

    .arrow {
      display: inline-block;
      min-width: 2.6em;
      color: var(--muted);
      transition: transform 0.22s cubic-bezier(.25,.8,.25,1), color 0.16s;
    }
    .menu-item:hover .arrow { transform: translateX(8px); }

    .item-tag {
      margin-left: auto;
      font-size: 0.56rem;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* Per-row accent colours */
    .menu-item[data-c="cyan"]:hover  .arrow { color: #4fc3f7; }
    .menu-item[data-c="cyan"]:hover  .item-tag { color: rgba(79,195,247,0.5); }
    .menu-item[data-c="violet"]:hover .arrow { color: #a78bfa; }
    .menu-item[data-c="violet"]:hover .item-tag { color: rgba(167,139,250,0.5); }
    .menu-item[data-c="yellow"]:hover .arrow { color: #facc15; }
    .menu-item[data-c="yellow"]:hover .item-tag { color: rgba(250,204,21,0.5); }
    .menu-item[data-c="green"]:hover  .arrow { color: #4ade80; }
    .menu-item[data-c="green"]:hover  .item-tag { color: rgba(74,222,128,0.5); }
    .menu-item[data-c="pink"]:hover   .arrow { color: #f472b6; }
    .menu-item[data-c="pink"]:hover   .item-tag { color: rgba(244,114,182,0.5); }
    .menu-item[data-c="orange"]:hover .arrow { color: #fb923c; }
    .menu-item[data-c="orange"]:hover .item-tag { color: rgba(251,146,60,0.5); }

    /* Staggered entrance */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .menu li {
      opacity: 0;
      animation: fadeUp 0.45s ease both;
    }
    .menu li:nth-child(1) { animation-delay: 0.12s; }
    .menu li:nth-child(2) { animation-delay: 0.19s; }
    .menu li:nth-child(3) { animation-delay: 0.26s; }
    .menu li:nth-child(4) { animation-delay: 0.33s; }
    .menu li:nth-child(5) { animation-delay: 0.40s; }
    .menu li:nth-child(6) { animation-delay: 0.47s; }

    @media (max-width: 560px) {
      body { padding: 20px 24px; }
      .title { font-size: clamp(4.5rem, 24vw, 7rem); margin-bottom: 2rem; }
      body::before { display: none; }
    }
  </style>
</head>
<body>
<script>requireAuth();</script>

<header>
  <div class="wordmark">SMASHBROS</div>
  <a class="signout" onclick="logout()">SIGN OUT</a>
</header>

<main>
  <div class="title">
    SMASH<br>
    <span class="t2">BROS</span>
  </div>

  <div class="divider"></div>
  <p class="label">What are you looking for?</p>

  <ul class="menu">
    <li><a href="index.html"        class="menu-item" data-c="cyan">
      <span class="arrow">——→</span> Smash Tracker    <span class="item-tag">Dashboard</span></a></li>

    <li><a href="game.html"         class="menu-item" data-c="violet">
      <span class="arrow">——→</span> Boomerang Arena  <span class="item-tag">Play</span></a></li>

    <li><a href="leaderboard.html"  class="menu-item" data-c="yellow">
      <span class="arrow">——→</span> Leaderboard      <span class="item-tag">Rankings</span></a></li>

    <li><a href="my-brackets.html"  class="menu-item" data-c="green">
      <span class="arrow">——→</span> My Brackets      <span class="item-tag">Tournaments</span></a></li>

    <li><a href="friends.html"      class="menu-item" data-c="pink">
      <span class="arrow">——→</span> Friends          <span class="item-tag">Social</span></a></li>

    <li><a href="profile.html"      class="menu-item" data-c="orange">
      <span class="arrow">——→</span> Profile          <span class="item-tag">Stats</span></a></li>
  </ul>
</main>

</body>
</html>
