<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smash Bracket — Top 10 Favorites</title>
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/auth.js"></script>
  <style>
    .chips-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
    .char-chip {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--card-bg);
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }
    .char-chip:hover { border-color: var(--accent-blue); color: var(--text); }
    .char-chip.selected {
      background: var(--accent-blue);
      border-color: var(--accent-blue);
      color: #fff;
    }
    .char-chip.disabled { opacity: 0.25; cursor: not-allowed; pointer-events: none; }
    .counter { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 16px; }
    .counter span { color: var(--accent-gold); }
    .power-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .power-item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--card-bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 16px;
      transition: border-color 0.15s;
    }
    .power-item:hover { border-color: rgba(255,255,255,0.15); }
    .power-rank {
      font-size: 1.4rem;
      font-weight: 900;
      min-width: 36px;
      text-align: center;
      line-height: 1;
      flex-shrink: 0;
    }
    .power-rank-1 { color: #ffd700; }
    .power-rank-2 { color: #c0c0c0; }
    .power-rank-3 { color: #cd7f32; }
    .power-rank-n { color: rgba(255,255,255,0.2); }
    .power-char-img { width: 40px; height: 40px; object-fit: contain; border-radius: 6px; background: var(--card-bg); flex-shrink: 0; }
    .power-char-name { font-size: 0.95rem; font-weight: 700; color: var(--text); flex: 1; }
    .power-remove { background: none; border: none; color: rgba(255,255,255,0.25); font-size: 0.8rem; cursor: pointer; padding: 4px 6px; border-radius: 4px; transition: color 0.12s; }
    .power-remove:hover { color: #e74c3c; }
  </style>
</head>
<body>
<script>requireAuth();</script>
<div id="toast-container"></div>

<nav class="navbar" id="main-nav"></nav>

<main class="page-container">
  <div class="page-header">
    <h1>⭐ Top 10 Favorite Characters</h1>
    <p>Pick up to 10 of your favorite Smash Ultimate fighters.</p>
  </div>

  <div id="loadingState" class="loading-center">
    <div class="spinner"></div><span>Loading favorites…</span>
  </div>

  <div id="favsContent" style="display:none;">
    <div class="counter"><span id="selCount">0</span>/10 selected</div>

    <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;">
      <input id="chipsSearch" type="text" placeholder="Search characters…"
        oninput="filterChips()"
        style="background:var(--card-bg2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 14px;font-size:16px;width:220px;outline:none;transition:border-color .15s;"
        onfocus="this.style.borderColor='var(--accent-blue)'" onblur="this.style.borderColor='var(--border)'" />
      <button type="button" onclick="document.getElementById('chipsSearch').value='';filterChips()"
        style="background:none;border:1px solid var(--border);color:var(--text-muted);border-radius:8px;padding:8px 12px;cursor:pointer;font-size:0.8rem;">Clear</button>
    </div>

    <div class="chips-grid" id="chipsGrid"></div>

    <div style="display:flex;gap:10px;align-items:center;margin-bottom:32px;">
      <button type="button" class="btn btn-primary" onclick="saveFavorites()">Save Favorites</button>
      <button type="button" class="btn btn-outline" onclick="clearAll()">Clear All</button>
    </div>

    <div id="currentFavsSection" style="display:none;">
      <h2 style="font-size:0.72rem;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;">Your Power Rankings</h2>
      <ul class="power-list" id="favList"></ul>
    </div>
  </div>
</main>

<script src="js/api.js"></script>
<script src="js/chars.js"></script>
<script src="js/nav-inject.js"></script>
<script src="js/nav.js"></script>
<script>
  const ROSTER = ["Mario","Donkey Kong","Link","Samus","Dark Samus","Yoshi","Kirby","Fox","Pikachu","Luigi","Ness","Captain Falcon","Jigglypuff","Peach","Daisy","Bowser","Ice Climbers","Sheik","Zelda","Dr. Mario","Pichu","Falco","Marth","Lucina","Young Link","Ganondorf","Mewtwo","Roy","Chrom","Mr. Game & Watch","Meta Knight","Pit","Dark Pit","Zero Suit Samus","Wario","Snake","Ike","Pokémon Trainer","Diddy Kong","Lucas","Sonic","King Dedede","Olimar","Lucario","R.O.B.","Toon Link","Wolf","Villager","Mega Man","Wii Fit Trainer","Rosalina & Luma","Little Mac","Greninja","Mii Brawler","Mii Swordfighter","Mii Gunner","Palutena","Pac-Man","Robin","Shulk","Bowser Jr.","Duck Hunt","Ryu","Ken","Cloud","Corrin","Bayonetta","Inkling","Ridley","Simon","Richter","King K. Rool","Isabelle","Incineroar","Piranha Plant","Joker","Hero","Banjo & Kazooie","Terry","Byleth","Min Min","Steve","Sephiroth","Pyra/Mythra","Kazuya","Sora"];

  let selected = new Set();

  function buildChips() {
    const grid = document.getElementById('chipsGrid');
    grid.innerHTML = '';
    ROSTER.forEach(char => {
      const chip = document.createElement('span');
      chip.className = 'char-chip' + (selected.has(char) ? ' selected' : '');
      chip.id = `chip_${char.replace(/[^a-zA-Z0-9]/g,'_')}`;
      chip.textContent = char;
      chip.addEventListener('click', () => toggleChar(char));
      grid.appendChild(chip);
    });
    updateCounter();
  }

  function toggleChar(char) {
    if (selected.has(char)) {
      selected.delete(char);
    } else {
      if (selected.size >= 10) {
        showToast('Maximum 10 favorites allowed.', 'warn');
        return;
      }
      selected.add(char);
    }
    const id = `chip_${char.replace(/[^a-zA-Z0-9]/g,'_')}`;
    const chip = document.getElementById(id);
    if (chip) chip.classList.toggle('selected', selected.has(char));
    updateCounter();
    updateFavList();
  }

  function updateCounter() {
    document.getElementById('selCount').textContent = selected.size;
    const full = selected.size >= 10;
    document.querySelectorAll('.char-chip:not(.selected)').forEach(chip => {
      chip.classList.toggle('disabled', full);
    });
  }

  function filterChips() {
    const q = (document.getElementById('chipsSearch')?.value || '').toLowerCase().trim();
    document.querySelectorAll('#chipsGrid .char-chip').forEach(chip => {
      chip.style.display = (!q || chip.textContent.toLowerCase().includes(q)) ? '' : 'none';
    });
  }

  function updateFavList() {
    const section = document.getElementById('currentFavsSection');
    const list = document.getElementById('favList');
    const arr = [...selected];
    if (!arr.length) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    list.innerHTML = arr.map((c, i) => {
      const rankClass = i === 0 ? 'power-rank-1' : i === 1 ? 'power-rank-2' : i === 2 ? 'power-rank-3' : 'power-rank-n';
      const rankLabel = i === 0 ? '#1' : i === 1 ? '#2' : i === 2 ? '#3' : `#${i+1}`;
      const imgUrl = typeof charImgUrl === 'function' ? charImgUrl(c) : '';
      const img = imgUrl ? `<img class="power-char-img" src="${imgUrl}" alt="${c}" onerror="this.style.display='none'" />` : '';
      return `<li class="power-item">
        <span class="power-rank ${rankClass}">${rankLabel}</span>
        ${img}
        <span class="power-char-name">${c}</span>
        <button type="button" class="power-remove" onclick="toggleChar('${c.replace(/'/g,"\\'")}')">✕</button>
      </li>`;
    }).join('');
  }

  function clearAll() {
    selected = new Set();
    buildChips();
    updateFavList();
  }

  async function saveFavorites() {
    try {
      await apiPut('/characters/favorites', {characters: [...selected]});
      showToast('Favorites saved!', 'success');
    } catch (err) {
      showToast('Error saving: ' + err.message, 'error');
    }
  }

  (async function init() {
    try {
      const me = await apiGet('/users/me');
      if (me) {
        document.getElementById('navUsername').textContent = me.username;
        const url = me.avatar_url || `https://api.dicebear.com/9.x/pixel-art/svg?seed=${encodeURIComponent(me.username)}`;
        const av = document.getElementById('navAvatar');
        av.src = url; av.style.display = 'block';
      }
    } catch (_) {}

    try {
      const data = await apiGet('/characters/favorites');
      if (data && data.characters) {
        data.characters.slice(0,10).forEach(c => selected.add(c));
      }
    } catch (_) {}

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('favsContent').style.display = 'block';
    buildChips();
    updateFavList();
  })();
</script>

</body>
</html>
