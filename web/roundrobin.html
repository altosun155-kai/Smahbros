<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smash Bracket — Round Robin</title>
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/auth.js"></script>
  <style>
    .rr-layout { display: grid; grid-template-columns: 300px 1fr; gap: 24px; align-items: start; }
    .match-card { background: var(--card-bg2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; margin-bottom: 10px; }
    .match-label { font-size: 0.88rem; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .winner-btns { display: flex; gap: 8px; flex-wrap: wrap; }
    .winner-btn { padding: 5px 12px; border-radius: 6px; font-size: 0.82rem; font-weight: 600; cursor: pointer; border: 1.5px solid var(--border); background: var(--card-bg); color: var(--text-muted); transition: all 0.15s; }
    .winner-btn.selected-a { background: var(--accent-blue); border-color: var(--accent-blue); color: #fff; }
    .winner-btn.selected-b { background: var(--accent-gold); border-color: var(--accent-gold); color: #111; }
    .winner-btn.selected-none { background: var(--card-bg2); color: var(--text-muted); }
    .score-row-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 4px; margin-top: 8px; }
    .matches-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 12px; }
    .standings-table { width: 100%; }
    .saved-session { background: var(--card-bg2); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; }
    .saved-session h3 { font-size: 0.95rem; color: var(--text); margin-bottom: 4px; }
    .saved-session .meta { font-size: 0.8rem; color: var(--text-muted); }
    .section-title { font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 16px; }
    @media (max-width: 900px) { .rr-layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<script>requireAuth();</script>
<div id="toast-container"></div>

<nav class="navbar" id="main-nav"></nav>

<main class="page-container">
  <div class="page-header">
    <h1>🔄 Round Robin Scheduler</h1>
    <p>Schedule everyone vs everyone and track live standings.</p>
  </div>

  <div class="tabs" id="rrTabs">
    <button class="tab-btn active" onclick="switchRRTab('generate')">Generate Schedule</button>
    <button class="tab-btn" onclick="switchRRTab('saved')">My Saved Sessions</button>
  </div>

  <!-- Generate tab -->
  <div class="tab-panel active" id="tab-generate">
    <div class="rr-layout">
      <div>
        <div class="card" style="margin-bottom:16px;">
          <h2 style="font-size:0.9rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px;">Players</h2>
          <div class="form-group">
            <textarea id="rrPlayersInput" rows="6" placeholder="You&#10;Friend1&#10;Friend2">You
Friend1
Friend2</textarea>
          </div>
          <button class="btn btn-gold" style="width:100%;" onclick="generateRR()">Generate Schedule</button>
        </div>

        <div class="card" id="standingsCard" style="display:none;">
          <div class="section-title">Live Standings</div>
          <table class="data-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Player</th>
                <th>W</th>
                <th>L</th>
                <th>Kills</th>
                <th>Win%</th>
              </tr>
            </thead>
            <tbody id="standingsBody"></tbody>
          </table>

          <hr class="section-divider" />
          <div style="display:flex;gap:10px;align-items:center;">
            <input type="text" id="rrSessionName" placeholder="Session name…" style="flex:1;padding:9px 12px;background:#0f0f17;border:1px solid rgba(255,255,255,0.15);border-radius:7px;color:#e8edf3;font-size:0.88rem;" />
            <button class="btn btn-primary btn-sm" onclick="saveRRSession()">Save</button>
          </div>
        </div>
      </div>

      <div>
        <div id="rrEmpty" style="color:var(--text-muted);font-size:0.9rem;padding:32px 0;">
          Add players and click "Generate Schedule" to begin.
        </div>
        <div id="rrMatchesContainer" style="display:none;">
          <div class="section-title" id="rrMatchCount"></div>
          <div class="matches-grid" id="rrMatches"></div>
          <div style="margin-top:16px;">
            <button class="btn btn-outline btn-sm" onclick="resetRR()">Reset</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Saved sessions tab -->
  <div class="tab-panel" id="tab-saved">
    <div id="savedLoading" class="loading-center">
      <div class="spinner"></div><span>Loading sessions…</span>
    </div>
    <div id="savedList" style="display:none;max-width:700px;"></div>
    <div id="savedEmpty" class="empty-state" style="display:none;">
      <p>No saved sessions yet. Generate and save one first.</p>
    </div>
  </div>
</main>

<script src="js/api.js"></script>
<script src="js/friends-sidebar.js"></script>
<script src="js/nav-inject.js"></script>
<script src="js/nav.js"></script>
<script>
  let rrSchedule = null;
  let rrResults = {};

  function getPlayers() {
    return document.getElementById('rrPlayersInput').value
      .split('\n').map(p => p.trim()).filter(p => p && p.toUpperCase() !== 'BYE');
  }

  function generateRR() {
    const players = getPlayers();
    if (players.length < 2) { showToast('Need at least 2 players.', 'warn'); return; }

    const schedule = [];
    for (let i = 0; i < players.length; i++) {
      for (let j = i + 1; j < players.length; j++) {
        schedule.push([players[i], players[j]]);
      }
    }
    // Shuffle
    for (let i = schedule.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [schedule[i], schedule[j]] = [schedule[j], schedule[i]];
    }

    rrSchedule = schedule;
    rrResults = {};
    renderMatches();
    updateStandings();
  }

  function renderMatches() {
    const container = document.getElementById('rrMatches');
    const empty = document.getElementById('rrEmpty');
    const matchesSection = document.getElementById('rrMatchesContainer');
    const standingsCard = document.getElementById('standingsCard');

    empty.style.display = 'none';
    matchesSection.style.display = 'block';
    standingsCard.style.display = 'block';
    document.getElementById('rrMatchCount').textContent = `${rrSchedule.length} Matches`;

    container.innerHTML = '';
    rrSchedule.forEach(([p1, p2], i) => {
      const mid = `${i}_${p1}_${p2}`;
      const res = rrResults[mid] || null;
      const w = res ? res.winner : '';
      const p1k = res ? res.p1kills : null;
      const p2k = res ? res.p2kills : null;

      const p1e = p1.replace(/'/g, "\\'");
      const p2e = p2.replace(/'/g, "\\'");

      const scoresBtns = (winner, wk, lk, colorClass) => [
        [3,0], [3,1], [3,2]
      ].map(([wKills, lKills]) => {
        const isWinner1 = winner === p1;
        const sel = w === winner && (isWinner1 ? p1k === wKills && p2k === lKills : p2k === wKills && p1k === lKills);
        const p1kills = isWinner1 ? wKills : lKills;
        const p2kills = isWinner1 ? lKills : wKills;
        return `<button class="winner-btn ${sel ? colorClass : ''}" onclick="rrPickScore(${i},'${p1e}','${p2e}','${winner.replace(/'/g,"\\'")}',${p1kills},${p2kills})">${wKills}-${lKills}</button>`;
      }).join('');

      const card = document.createElement('div');
      card.className = 'match-card';
      card.id = `match_${i}`;
      card.innerHTML = `
        <div class="match-label">Match ${i + 1}: <strong>${p1}</strong> vs <strong>${p2}</strong></div>
        <div class="score-row-label">${p1} wins</div>
        <div class="winner-btns">${scoresBtns(p1, p1k, p2k, 'selected-a')}</div>
        <div class="score-row-label">${p2} wins</div>
        <div class="winner-btns">${scoresBtns(p2, p2k, p1k, 'selected-b')}</div>
        <div style="margin-top:6px;">
          <button class="winner-btn ${!w ? 'selected-none' : ''}" onclick="rrPickScore(${i},'${p1e}','${p2e}','',0,0)">Undecided</button>
        </div>
      `;
      container.appendChild(card);
    });
  }

  function rrPickScore(i, p1, p2, winner, p1kills, p2kills) {
    const mid = `${i}_${p1}_${p2}`;
    rrResults[mid] = winner ? { winner, p1kills, p2kills } : null;
    // Re-render just this card
    const oldCard = document.getElementById(`match_${i}`);
    if (oldCard) {
      const tmp = document.createElement('div');
      const res = rrResults[mid];
      const w = res ? res.winner : '';
      const p1k = res ? res.p1kills : null;
      const p2k = res ? res.p2kills : null;
      const p1e = p1.replace(/'/g, "\\'");
      const p2e = p2.replace(/'/g, "\\'");

      const scoresBtns = (winnerName, colorClass) => [
        [3,0], [3,1], [3,2]
      ].map(([wKills, lKills]) => {
        const isWinner1 = winnerName === p1;
        const sel = w === winnerName && (isWinner1 ? p1k === wKills && p2k === lKills : p2k === wKills && p1k === lKills);
        const ak = isWinner1 ? wKills : lKills;
        const bk = isWinner1 ? lKills : wKills;
        return `<button class="winner-btn ${sel ? colorClass : ''}" onclick="rrPickScore(${i},'${p1e}','${p2e}','${winnerName.replace(/'/g,"\\'")}',${ak},${bk})">${wKills}-${lKills}</button>`;
      }).join('');

      oldCard.innerHTML = `
        <div class="match-label">Match ${i + 1}: <strong>${p1}</strong> vs <strong>${p2}</strong></div>
        <div class="score-row-label">${p1} wins</div>
        <div class="winner-btns">${scoresBtns(p1, 'selected-a')}</div>
        <div class="score-row-label">${p2} wins</div>
        <div class="winner-btns">${scoresBtns(p2, 'selected-b')}</div>
        <div style="margin-top:6px;">
          <button class="winner-btn ${!w ? 'selected-none' : ''}" onclick="rrPickScore(${i},'${p1e}','${p2e}','',0,0)">Undecided</button>
        </div>
      `;
    }
    updateStandings();
  }

  function updateStandings() {
    if (!rrSchedule) return;
    const players = getPlayers();
    const records = {};
    players.forEach(p => { records[p] = {wins: 0, losses: 0, kills: 0}; });

    rrSchedule.forEach(([p1, p2], i) => {
      const mid = `${i}_${p1}_${p2}`;
      const res = rrResults[mid];
      if (!res || !res.winner) return;
      if (res.winner === p1) {
        records[p1].wins++; records[p2].losses++;
      } else {
        records[p2].wins++; records[p1].losses++;
      }
      records[p1].kills += res.p1kills || 0;
      records[p2].kills += res.p2kills || 0;
    });

    const sorted = Object.entries(records).sort((a, b) => {
      if (b[1].wins !== a[1].wins) return b[1].wins - a[1].wins;
      if (b[1].kills !== a[1].kills) return b[1].kills - a[1].kills;
      return a[1].losses - b[1].losses;
    });

    const tbody = document.getElementById('standingsBody');
    tbody.innerHTML = sorted.map(([p, r], i) => {
      const total = r.wins + r.losses;
      const pct = total > 0 ? Math.round(r.wins / total * 100) : 0;
      return `<tr>
        <td style="color:var(--text-muted);font-weight:700;">${i+1}</td>
        <td style="font-weight:600;">${p}</td>
        <td style="color:#27ae60;">${r.wins}</td>
        <td style="color:#e74c3c;">${r.losses}</td>
        <td style="color:#e67e22;font-weight:700;">${r.kills}</td>
        <td>${pct}%</td>
      </tr>`;
    }).join('');
  }

  function resetRR() {
    rrSchedule = null;
    rrResults = {};
    document.getElementById('rrEmpty').style.display = 'block';
    document.getElementById('rrMatchesContainer').style.display = 'none';
    document.getElementById('standingsCard').style.display = 'none';
  }

  async function saveRRSession() {
    const name = document.getElementById('rrSessionName').value.trim();
    if (!name) { showToast('Enter a session name.', 'warn'); return; }
    if (!rrSchedule) { showToast('Generate a schedule first.', 'warn'); return; }
    const players = getPlayers();
    const records = {};
    players.forEach(p => { records[p] = {wins: 0, losses: 0, kills: 0}; });
    rrSchedule.forEach(([p1, p2], i) => {
      const mid = `${i}_${p1}_${p2}`;
      const res = rrResults[mid];
      if (!res || !res.winner) return;
      if (res.winner === p1) { records[p1].wins++; records[p2].losses++; }
      else { records[p2].wins++; records[p1].losses++; }
      records[p1].kills += res.p1kills || 0;
      records[p2].kills += res.p2kills || 0;
    });
    try {
      await apiPost('/roundrobin', {
        name,
        players,
        results: rrResults,
        records,
      });
      showToast(`Saved "${name}"!`, 'success');
    } catch (err) {
      showToast('Error saving: ' + err.message, 'error');
    }
  }

  // ── Tab switching ─────────────────────────────────
  function switchRRTab(tab) {
    document.querySelectorAll('#rrTabs .tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (i === 0 && tab === 'generate') || (i === 1 && tab === 'saved'));
    });
    document.getElementById('tab-generate').classList.toggle('active', tab === 'generate');
    document.getElementById('tab-saved').classList.toggle('active', tab === 'saved');
    if (tab === 'saved') loadSavedSessions();
  }

  async function loadSavedSessions() {
    const loading = document.getElementById('savedLoading');
    const list = document.getElementById('savedList');
    const empty = document.getElementById('savedEmpty');
    loading.style.display = 'flex';
    list.style.display = 'none';
    empty.style.display = 'none';

    try {
      const data = await apiGet('/roundrobin');
      loading.style.display = 'none';
      if (!data || data.length === 0) {
        empty.style.display = 'block';
        return;
      }
      list.style.display = 'block';
      list.innerHTML = data.map(s => `
        <div class="saved-session">
          <h3>${s.session_name || s.name || 'Session'}</h3>
          <div class="meta">${s.created_at ? new Date(s.created_at).toLocaleDateString() : ''} · ${(s.players || []).length} players</div>
        </div>
      `).join('');
    } catch (err) {
      loading.style.display = 'none';
      showToast('Error loading sessions: ' + err.message, 'error');
    }
  }

  // ── Init ─────────────────────────────────────────
  (async function init() {
    try {
      const me = await apiGet('/users/me');
      if (me) {
        document.getElementById('navUsername').textContent = me.username;
        const url = me.avatar_url || `https://api.dicebear.com/9.x/pixel-art/svg?seed=${encodeURIComponent(me.username)}`;
        const av = document.getElementById('navAvatar');
        av.src = url; av.style.display = 'block';
      }
    } catch (_) {}

    // Check if opened with #saved hash
    if (window.location.hash === '#saved') {
      switchRRTab('saved');
    }
  })();
</script>
</body>
</html>
