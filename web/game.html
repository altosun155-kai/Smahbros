hat<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boomerang Arena — Smahbros</title>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1025;
      color: #e8e8f4;
      font-family: 'Space Mono', 'Courier New', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* ── Lobby ───────────────────────────────────────────── */
    #lobby {
      width: 400px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .lobby-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 2px;
    }
    .lobby-logo {
      font-family: 'Bebas Neue', 'Arial Black', sans-serif;
      font-size: 2.5rem;
      line-height: 0.88;
      letter-spacing: 0.03em;
    }
    .lobby-logo span { color: #4fc3f7; }
    .lobby-back {
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      color: rgba(232,232,244,0.28);
      text-decoration: none;
      padding-top: 6px;
      transition: color 0.15s;
    }
    .lobby-back:hover { color: rgba(232,232,244,0.65); }

    .lobby-input {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(167,139,250,0.22);
      border-radius: 8px;
      padding: 11px 14px;
      color: #e8e8f4;
      font-family: inherit;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    .lobby-input:focus { border-color: rgba(167,139,250,0.6); }
    .lobby-input::placeholder { color: rgba(232,232,244,0.2); }

    /* ── Mode tabs ───────────────────────────────────────── */
    .mode-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border: 1px solid rgba(167,139,250,0.18);
      border-radius: 8px;
      overflow: hidden;
    }
    .mode-tab {
      background: transparent;
      border: none;
      padding: 9px 0;
      color: rgba(232,232,244,0.3);
      font-family: inherit;
      font-size: 0.66rem;
      letter-spacing: 0.14em;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .mode-tab.active {
      background: rgba(122,85,204,0.28);
      color: #e8e8f4;
    }
    .mode-tab:hover:not(.active) {
      background: rgba(167,139,250,0.08);
      color: rgba(232,232,244,0.6);
    }

    /* ── Slides ──────────────────────────────────────────── */
    .slides-outer { overflow: hidden; }
    .slides-track {
      display: flex;
      transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    .slide {
      flex: 0 0 100%;
      display: flex;
      flex-direction: column;
      gap: 11px;
    }
    .slide-hint {
      font-size: 0.66rem;
      letter-spacing: 0.04em;
      color: rgba(232,232,244,0.32);
      line-height: 1.55;
    }

    /* ── Difficulty ──────────────────────────────────────── */
    .diff-group {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .diff-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(167,139,250,0.18);
      border-radius: 7px;
      padding: 9px 0;
      color: rgba(232,232,244,0.35);
      font-family: inherit;
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: all 0.15s;
    }
    .diff-btn.active {
      background: rgba(122,85,204,0.32);
      border-color: rgba(167,139,250,0.55);
      color: #e8e8f4;
    }
    .diff-btn:hover:not(.active) {
      background: rgba(167,139,250,0.08);
      color: rgba(232,232,244,0.65);
    }

    /* ── Buttons ─────────────────────────────────────────── */
    .lobby-btn {
      width: 100%;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-family: inherit;
      font-size: 0.75rem;
      letter-spacing: 0.14em;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }
    .lobby-btn.mp  { background: #4fc3f7; color: #0d0813; }
    .lobby-btn.mp:hover  { background: #81d4fa; }
    .lobby-btn.cpu { background: #7a55cc; color: #fff; }
    .lobby-btn.cpu:hover { background: #9370e8; }

    /* ── Status ──────────────────────────────────────────── */
    #status {
      text-align: center;
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      color: rgba(232,232,244,0.4);
      min-height: 1.2em;
    }
    #status.err { color: #ef5350; }

    /* ── Controls legend ─────────────────────────────────── */
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      border-top: 1px solid rgba(167,139,250,0.1);
      padding-top: 12px;
    }
    .ctrl {
      font-size: 0.62rem;
      letter-spacing: 0.04em;
      color: rgba(232,232,244,0.28);
    }
    .ctrl strong { color: rgba(232,232,244,0.55); }

    /* ── Game canvas wrapper ─────────────────────────────── */
    #game-wrap {
      display: none;
      position: fixed;
      inset: 0;
      background: #1a1025;
    }
    #game-wrap canvas { display: block; border-radius: 0; }

    /* ── End-screen overlay ──────────────────────────────── */
    #endscreen {
      display: none;
      position: absolute;
      bottom: 56px;
      left: 50%;
      transform: translateX(-50%);
      gap: 10px;
      z-index: 10;
      white-space: nowrap;
    }
    .end-btn {
      background: rgba(26,16,37,0.92);
      border: 1px solid rgba(167,139,250,0.38);
      border-radius: 8px;
      padding: 10px 22px;
      color: #e8e8f4;
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: all 0.15s;
    }
    .end-btn:hover { background: rgba(122,85,204,0.28); border-color: rgba(167,139,250,0.7); }
    .end-btn.primary { border-color: rgba(79,195,247,0.45); }
    .end-btn.primary:hover { background: rgba(79,195,247,0.18); border-color: rgba(79,195,247,0.75); }
  </style>
</head>
<body>
<script>requireAuth();</script>

<!-- ── Lobby ──────────────────────────────────────────────── -->
<div id="lobby">
  <div class="lobby-top">
    <div class="lobby-logo">BOOMERANG<br><span>ARENA</span></div>
    <a href="hub.html" class="lobby-back">← HUB</a>
  </div>

  <input id="inp-user" class="lobby-input" placeholder="USERNAME" autocomplete="off" />

  <div class="mode-tabs">
    <button class="mode-tab active" data-slide="0">MULTIPLAYER</button>
    <button class="mode-tab"        data-slide="1">VS CPU</button>
  </div>

  <div class="slides-outer">
    <div class="slides-track" id="slides-track">

      <!-- Slide 0: Multiplayer -->
      <div class="slide">
        <p class="slide-hint">Share a room ID with a friend — first two in win.</p>
        <input id="inp-room" class="lobby-input" placeholder="ROOM ID (e.g. lobby1)" autocomplete="off" />
        <button id="btn-join" class="lobby-btn mp">JOIN ROOM</button>
      </div>

      <!-- Slide 1: VS CPU -->
      <div class="slide">
        <p class="slide-hint">Fight against an AI opponent — no friend required.</p>
        <div class="diff-group">
          <button class="diff-btn"        data-d="easy">EASY</button>
          <button class="diff-btn active" data-d="normal">NORMAL</button>
          <button class="diff-btn"        data-d="hard">HARD</button>
        </div>
        <button id="btn-cpu" class="lobby-btn cpu">PLAY VS CPU</button>
      </div>

    </div>
  </div>

  <div id="status"></div>

  <div class="controls">
    <div class="ctrl"><strong>WASD</strong> — move</div>
    <div class="ctrl"><strong>Right-click</strong> — throw</div>
    <div class="ctrl"><strong>Left-click</strong> — slash</div>
    <div class="ctrl"><strong>SPACE</strong> — dash</div>
    <div class="ctrl"><strong>Best of 3</strong> — rounds</div>
  </div>
</div>

<!-- ── Phaser canvas ──────────────────────────────────────── -->
<div id="game-wrap">
  <div id="endscreen">
    <button class="end-btn primary" onclick="location.reload()">PLAY AGAIN</button>
    <a href="hub.html" class="end-btn">← HUB</a>
  </div>
</div>

<script>
const WS_BASE = API_BASE.replace('https://', 'wss://').replace('http://', 'ws://');
const token   = localStorage.getItem('authToken') || '';

let ws         = null;
let playerSlot = null;
let phaserGame = null;
let scene      = null;

const lobbyEl  = document.getElementById('lobby');
const gameWrap = document.getElementById('game-wrap');
const statusEl = document.getElementById('status');

// Pre-fill username
const savedUser = localStorage.getItem('username');
if (savedUser) document.getElementById('inp-user').value = savedUser;

// ── Slide navigation ──────────────────────────────────────────────────────────
let currentSlide = 0;
const slidesTrack = document.getElementById('slides-track');
const modeTabs    = document.querySelectorAll('.mode-tab');

function goToSlide(idx) {
  currentSlide = idx;
  slidesTrack.style.transform = 'translateX(' + (-idx * 100) + '%)';
  modeTabs.forEach(function(t, i) { t.classList.toggle('active', i === idx); });
}
modeTabs.forEach(function(tab, i) {
  tab.addEventListener('click', function() { goToSlide(i); });
});

// Swipe support
var _touchX = 0;
slidesTrack.addEventListener('touchstart', function(e) { _touchX = e.touches[0].clientX; }, { passive: true });
slidesTrack.addEventListener('touchend',   function(e) {
  var dx = e.changedTouches[0].clientX - _touchX;
  if (dx < -40) goToSlide(Math.min(1, currentSlide + 1));
  if (dx >  40) goToSlide(Math.max(0, currentSlide - 1));
});

// ── Difficulty selection ──────────────────────────────────────────────────────
var selectedDiff = 'normal';
document.querySelectorAll('.diff-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.diff-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    selectedDiff = btn.dataset.d;
  });
});

// ── Status helpers ────────────────────────────────────────────────────────────
function setStatus(msg, isErr) {
  statusEl.textContent = msg;
  statusEl.className   = isErr ? 'err' : '';
}

// ── Multiplayer join ──────────────────────────────────────────────────────────
document.getElementById('btn-join').addEventListener('click', tryJoin);
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && lobbyEl.style.display !== 'none') {
    if (currentSlide === 0) tryJoin(); else playCpu();
  }
});

function tryJoin() {
  var roomId   = document.getElementById('inp-room').value.trim();
  var username = document.getElementById('inp-user').value.trim() || 'Player';
  if (!roomId) { setStatus('Enter a Room ID.', true); return; }
  localStorage.setItem('username', username);
  connectMulti(roomId, username);
}

function connectMulti(roomId, username) {
  setStatus('Connecting…');
  var slowTimer = setTimeout(function() {
    setStatus('Server is waking up — this takes ~30s on first load…');
  }, 4000);

  ws = new WebSocket(WS_BASE + '/ws/game/' + roomId);
  ws.onopen = function() {
    clearTimeout(slowTimer);
    ws.send(JSON.stringify({ token: token, username: username }));
  };
  ws.onmessage = handleWsMsg;
  ws.onclose   = function() {
    if (scene) showOverlay(scene, 'Disconnected from server');
    else setStatus('Connection closed — server may have rejected the session.', true);
  };
  ws.onerror = function() { setStatus('Connection failed — server may be starting up, try again in 30s.', true); };
}

// ── CPU join ──────────────────────────────────────────────────────────────────
document.getElementById('btn-cpu').addEventListener('click', playCpu);

function playCpu() {
  var username = document.getElementById('inp-user').value.trim() || 'Player';
  var roomId   = 'cpu_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
  localStorage.setItem('username', username);
  connectCpu(roomId, username, selectedDiff);
}

function connectCpu(roomId, username, difficulty) {
  setStatus('Starting CPU game…');
  var slowTimer = setTimeout(function() {
    setStatus('Server is waking up — this takes ~30s on first load…');
  }, 4000);

  ws = new WebSocket(WS_BASE + '/ws/game-cpu/' + roomId);
  ws.onopen = function() {
    clearTimeout(slowTimer);
    ws.send(JSON.stringify({ token: token, username: username, difficulty: difficulty }));
  };
  ws.onmessage = handleWsMsg;
  ws.onclose   = function() {
    if (scene) showOverlay(scene, 'Disconnected from server');
    else setStatus('Connection failed.', true);
  };
  ws.onerror = function() { setStatus('Connection failed — server may be starting up, try again in 30s.', true); };
}

// ── Shared WS message handler ─────────────────────────────────────────────────
function handleWsMsg(e) {
  var msg = JSON.parse(e.data);
  if (msg.type === 'error') { setStatus(msg.message, true); ws.close(); return; }
  if (msg.type === 'joined') {
    playerSlot = msg.slot;
    setStatus('You are Player ' + (msg.slot + 1) + '. Waiting for opponent…');
  }
  if (msg.type === 'player_joined') {
    setStatus(msg.username + ' joined — starting soon…');
  }
  if (msg.type === 'start' && !phaserGame) {
    lobbyEl.style.display  = 'none';
    gameWrap.style.display = 'block';
    phaserGame = launchPhaser();
  }
  if (msg.type === 'state') {
    if (scene) {
      while (_pendingStates.length) applyState(scene, _pendingStates.shift());
      applyState(scene, msg);
    } else {
      _pendingStates.push(msg);
      if (_pendingStates.length > 8) _pendingStates.shift();
    }
  }
  if (msg.type === 'player_left' && scene) { showOverlay(scene, 'Opponent disconnected'); }
}

// ── Keyboard input ────────────────────────────────────────────────────────────
const held = { up: false, down: false, left: false, right: false };
const KEY_MAP = {
  w: 'up', arrowup: 'up',
  s: 'down', arrowdown: 'down',
  a: 'left', arrowleft: 'left',
  d: 'right', arrowright: 'right',
};

function sendKeys() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'input', keys: { up: held.up, down: held.down, left: held.left, right: held.right } }));
  }
}
document.addEventListener('keydown', function(e) {
  var k = KEY_MAP[e.key.toLowerCase()];
  if (k && !held[k]) { held[k] = true; sendKeys(); }
  if (e.key === ' ' && !e.repeat && ws && ws.readyState === WebSocket.OPEN && playerSlot !== null) {
    var ddx = (held.right ? 1 : 0) - (held.left ? 1 : 0);
    var ddy = (held.down  ? 1 : 0) - (held.up   ? 1 : 0);
    ws.send(JSON.stringify({ type: 'dash', dx: ddx, dy: ddy }));
  }
});
document.addEventListener('keyup', function(e) {
  var k = KEY_MAP[e.key.toLowerCase()];
  if (k) { held[k] = false; sendKeys(); }
});
document.addEventListener('contextmenu', function(e) { e.preventDefault(); });

// ── Shared drawing constants & helpers ───────────────────────────────────────
var SLIME_BASE  = [0x4fc3f7, 0xff6b6b];
var SLIME_DARK  = [0x1a7aaa, 0xc0392b];
var HP_COLORS   = [0x4fc3f7, 0xff6b6b];
var BOOM_COLORS = [0xffd54f, 0xff8a65];

var _pendingStates = [];

// drawSlime(g, x, floorY, bodyY, idx, s, sx, sy, leanX, flash, crowned)
function drawSlime(g, x, floorY, bodyY, idx, s, sx, sy, leanX, flash, crowned) {
  s     = s     || 1;
  sx    = sx    || 1;
  sy    = sy    || 1;
  leanX = leanX || 0;
  var bx   = x + leanX;
  var base = SLIME_BASE[idx];
  var dark = SLIME_DARK[idx];

  // Shadow: flat on floor, clearly below hovering body
  g.fillStyle(0x000000, 0.3);
  g.fillEllipse(x + leanX * 0.12 + 2*s, floorY + 6*s, 72*s*sx, 18*s);

  // ── Body: big round blob with bottom drip ─────────────
  g.fillStyle(base, 1);
  g.fillEllipse(bx, bodyY + 18*s*sy, 62*s*sx, 30*s*sy);  // drip extends toward floor
  g.fillCircle(bx, bodyY - 2*s, 32*s);                    // main sphere

  // Dark underside shading
  g.fillStyle(dark, 0.3);
  g.fillCircle(bx + 12*s, bodyY + 8*s, 26*s);

  // Specular highlight (top-left)
  g.fillStyle(0xffffff, 0.55);
  g.fillCircle(bx - 12*s, bodyY - 15*s, 12*s);
  g.fillStyle(0xffffff, 0.25);
  g.fillCircle(bx - 5*s, bodyY - 24*s, 5*s);

  // ── Eyes: large and expressive ───────────────────────
  g.fillStyle(0xffffff, 1);
  g.fillCircle(bx - 11*s*sx, bodyY - 5*s, 11*s);
  g.fillCircle(bx + 11*s*sx, bodyY - 5*s, 11*s);
  g.fillStyle(0x111122, 1);
  g.fillCircle(bx - 8*s*sx,  bodyY - 4*s, 7*s);
  g.fillCircle(bx + 14*s*sx, bodyY - 4*s, 7*s);
  g.fillStyle(0xffffff, 1);
  g.fillCircle(bx - 5*s*sx,  bodyY - 7*s, 2.5*s);
  g.fillCircle(bx + 17*s*sx, bodyY - 7*s, 2.5*s);

  // ── Per-player accessory ──────────────────────────────
  var topY = bodyY - 34*s;
  if (idx === 0) {
    // Player 0 (blue): glowing antenna
    g.fillStyle(0x5ad4e8, 1);
    g.fillRect(bx - 2.5*s, topY - 4*s, 5*s, 14*s);
    g.fillStyle(0xffffff, 0.85);
    g.fillCircle(bx, topY - 8*s, 8*s);
    g.fillStyle(0x88ffcc, 1);
    g.fillCircle(bx, topY - 8*s, 5.5*s);
    g.fillStyle(0xffffff, 0.7);
    g.fillCircle(bx - 2*s, topY - 11*s, 2.5*s);
  } else {
    // Player 1 (red): flat cap with band
    g.fillStyle(0x222233, 1);
    g.fillEllipse(bx, topY + 4*s, 50*s*sx, 11*s);   // brim
    g.fillStyle(0x1a1028, 1);
    g.fillRect(bx - 14*s, topY - 10*s, 28*s, 16*s); // crown
    g.fillStyle(0xff3344, 1);
    g.fillRect(bx - 14*s, topY - 12*s, 28*s, 5*s);  // band
    g.fillStyle(0xffffff, 0.2);
    g.fillRect(bx - 10*s, topY - 10*s, 9*s, 3*s);   // sheen
  }

  // Crown (drawn above accessories, on winner of last round)
  if (crowned) {
    var crY = topY - 20*s;
    g.fillStyle(0xffd700, 1);
    g.fillRect(bx - 13*s, crY, 26*s, 7*s);           // base band
    g.fillTriangle(bx - 13*s, crY, bx - 13*s, crY - 11*s, bx - 6*s, crY);  // left point
    g.fillTriangle(bx - 1*s,  crY, bx,         crY - 15*s, bx + 1*s,  crY);  // center point
    g.fillTriangle(bx + 13*s, crY, bx + 13*s, crY - 11*s, bx + 6*s, crY);  // right point
    g.fillStyle(0xff3333, 1);   // gem dots
    g.fillCircle(bx - 10*s, crY + 3*s, 2.5*s);
    g.fillCircle(bx,         crY + 3*s, 2.5*s);
    g.fillCircle(bx + 10*s, crY + 3*s, 2.5*s);
    g.fillStyle(0xffffff, 0.38);   // highlight sheen
    g.fillRect(bx - 13*s, crY, 26*s, 2*s);
  }

  // Hit-flash: white overlay for 1–2 frames on damage
  if (flash && flash > 0) {
    g.fillStyle(0xffffff, flash * 0.88);
    g.fillCircle(bx, bodyY - 2*s, 36*s);
    g.fillEllipse(bx, bodyY + 18*s*sy, 66*s*sx, 34*s*sy);
  }
}

function _rp(cx, cy, x, y, cosA, sinA) {
  var dx = x - cx, dy = y - cy;
  return [cx + dx * cosA - dy * sinA, cy + dx * sinA + dy * cosA];
}

function drawBoom(g, bx, by, col, returning, angleDeg, height) {
  var h  = height || 0;
  var vy = by - h * 42;   // visual Y: rises off ground at height

  // Floor shadow: grows and fades as height increases
  g.fillStyle(0x000000, Math.max(0.07, 0.22 - h * 0.11));
  g.fillEllipse(bx + 2, by + 18 + h * 20, 20 + h * 14, 6 + h * 3);

  var a = ((angleDeg || 0) % 360) * Math.PI / 180;
  var cosA = Math.cos(a), sinA = Math.sin(a);
  function rp(x, y) { return _rp(bx, vy, x, y, cosA, sinA); }

  // Glow halos (at visual height)
  g.fillStyle(col, 0.18 + h * 0.06); g.fillCircle(bx, vy, 20);
  g.fillStyle(col, 0.07);             g.fillCircle(bx, vy, 30);

  // Body: two rotated wings
  var p1 = [rp(bx, vy-15), rp(bx-11, vy+7), rp(bx+1, vy+3)];
  var p2 = [rp(bx, vy-15), rp(bx+11, vy+7), rp(bx-1, vy+3)];
  g.fillStyle(col, 1);
  g.fillTriangle(p1[0][0],p1[0][1], p1[1][0],p1[1][1], p1[2][0],p1[2][1]);
  g.fillTriangle(p2[0][0],p2[0][1], p2[1][0],p2[1][1], p2[2][0],p2[2][1]);

  // Center hub
  var hub = rp(bx, vy);
  g.fillStyle(0xffffff, returning ? 0.9 : 0.5);
  g.fillCircle(hub[0], hub[1], 4);
}

function applyState(sc, state) {
  sc._pState = state;

  // HP change detection → hit-stop + flash + shake + crown fly-off
  state.players.forEach(function(p, i) {
    if (!p) return;
    if (p.hp < sc._prevHp[i]) {
      var now = performance.now();
      sc._hitFlashEnd[i] = now + 60;
      sc._hitStopEnd     = now + 72;
      sc.cameras.main.shake(110, 0.006);
      // Crown fly-off when a crowned player is hit
      if (sc._crowned && sc._crowned[i] && sc._particles) {
        for (var cp = 0; cp < 10; cp++) {
          var ang = -Math.PI * 0.6 + (Math.random() - 0.5) * Math.PI * 1.4;
          var spd = 4 + Math.random() * 8;
          sc._particles.push({
            x: sc._pos[i].x, y: sc._pos[i].y - 68,
            vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd - 2,
            alpha: 1, size: 3 + Math.random() * 5, col: 0xffd700, gravity: 0.28
          });
        }
      }
    }
    sc._prevHp[i] = p.hp;
    sc.hpPips[i][0].setAlpha(p.hp > 0 ? 1 : 0.15);
  });

  // Sync crown state from server
  if (state.crowned && sc._crowned) sc._crowned = state.crowned.slice();

  // Slash flash
  sc.slashGfx.clear();
  (state.slashing || []).forEach(function(active, i) {
    if (!active || !state.players[i]) return;
    var p = state.players[i];
    var cy = p.y - 20;
    sc.slashGfx.fillStyle(SLIME_BASE[i], 0.2);
    sc.slashGfx.fillCircle(p.x, cy, 62);
    sc.slashGfx.lineStyle(2, SLIME_BASE[i], 0.55);
    sc.slashGfx.strokeCircle(p.x, cy, 62);
  });

  // Charge bar
  if (state.charge && playerSlot !== null) {
    var myCharge = state.charge[playerSlot] || 0;
    sc.cooldownBar.displayWidth = Math.round(140 * myCharge);
  }

  // Round score
  if (state.rounds_won && sc._roundScoreText) {
    state.rounds_won.forEach(function(w, i) {
      sc._roundScoreText[i].setText(w);
    });
  }

  // Round over: slow-mo + shake + overlay (no end buttons yet)
  if (state.phase === 'round_over' && state.winner !== null && !sc._roundOverShown) {
    sc._roundOverShown = true;
    var won = (state.winner === playerSlot);
    sc.overlayBg.setFillStyle(0x000000, 0.55).setAlpha(1).setVisible(true);
    sc.overlayText.setText(won ? '★  ROUND WON  ★' : '✗  ROUND LOST  ✗')
                  .setAlpha(1).setVisible(true);
    sc.cameras.main.shake(320, 0.013);
    sc._slowMoEnd = performance.now() + 500;
    // Splat + particle burst on the loser
    var loserId = state.winner === 0 ? 1 : 0;
    var lx = sc._pos[loserId].x, ly = sc._pos[loserId].y;
    if (!sc._splats.length) {
      sc._splats.push({ slot: loserId, x: lx, y: ly, alpha: 1 });
    }
    var burstCol = [0x4fc3f7, 0xff6b6b][loserId];
    for (var bp = 0; bp < 24; bp++) {
      var ang = Math.random() * Math.PI * 2;
      var spd = 2 + Math.random() * 10;
      sc._particles.push({
        x: lx, y: ly,
        vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd - 3,
        alpha: 0.9 + Math.random() * 0.1,
        size: 3 + Math.random() * 9, col: burstCol, gravity: 0.18
      });
    }
  }

  // New round started (server resets to 'playing')
  if (state.phase === 'playing' && sc._roundOverShown) {
    sc._roundOverShown = false;
    sc._prevHp         = [1, 1];
    sc._hitFlashEnd    = [0, 0];
    sc._splats         = [];
    sc._particles      = [];
    sc._walkTrail      = [[], []];
    sc._splatGfx.clear();
    sc.overlayText.setVisible(false);
    sc.overlayBg.setVisible(false);
    _showCountdown(sc);
  }

  // Match over
  if (state.phase === 'game_over' && !sc._gameOver) {
    sc._gameOver = true;
    sc.cameras.main.shake(450, 0.015);
    sc._slowMoEnd = performance.now() + 600;
    var rw  = state.rounds_won || [0, 0];
    var mw  = state.match_winner;
    var txt = (mw === playerSlot ? 'YOU WIN!' : 'YOU LOSE') + '\n' + rw[0] + ' — ' + rw[1];
    showOverlay(sc, txt);
  }
}

function showOverlay(sc, text) {
  sc.overlayBg.setFillStyle(0x000000, 0.65).setVisible(true);
  sc.overlayText.setText(text).setVisible(true);
  var es = document.getElementById('endscreen');
  if (es) es.style.display = 'flex';
}

// ── Countdown ─────────────────────────────────────────────────────────────────
function _showCountdown(sc) {
  if (!sc._countdownText) return;
  var nums = ['3', '2', '1', 'GO!'];
  var i = 0;
  (function tick() {
    if (i >= nums.length) { sc._countdownText.setVisible(false); return; }
    sc._countdownText.setText(nums[i]).setScale(1.3).setAlpha(1).setVisible(true);
    sc.tweens.add({
      targets: sc._countdownText,
      alpha: 0, scaleX: 0.7, scaleY: 0.7,
      duration: 650, ease: 'Power2',
      onComplete: function() { i++; tick(); }
    });
  })();
}

// ── Phaser ────────────────────────────────────────────────────────────────────
function launchPhaser() {

  // Arena geometry (matches server physics boundary)
  const FL = 26, FR = 1414, FT = 46, FB = 764;   // floor left/right/top/bottom

  // Wall palette
  const W_TOP   = 0xb09ae8;   // top face of wall block (light purple)
  const W_FRONT = 0x7a55cc;   // front face
  const W_DEEP  = 0x4a3090;   // inner shadow / corner
  const W_EDGE  = 0x9070d8;   // bright edge line

  // Floor palette
  const F_BASE = 0x150b28;   // deep dark base
  const F_MID  = 0x221540;   // mid-depth
  const F_LINE = 0x5535a0;   // tile line glow
  const F_GLOW = 0x7755d8;   // accent glow

  return new Phaser.Game({
    type: Phaser.AUTO,
    backgroundColor: '#1a1025',
    parent: 'game-wrap',
    input: { mouse: { preventDefaultDown: true } },
    scale: {
      mode: Phaser.Scale.FIT,
      autoCenter: Phaser.Scale.CENTER_BOTH,
      width: 1440,
      height: 810,
    },
    scene: {
      key: 'GameScene',
      preload() {},

      create() {
        scene = this;
        const g = this.add.graphics();

        // ── Arena floor: dark stone tiles ─────────────
        const VP  = (FL + FR) / 2;          // kept for wall fan lines
        const VCX = VP, VCY = FT + (FB - FT) * 0.5;
        // Base gradient: deep purple far → slightly lighter near
        g.fillGradientStyle(F_BASE, F_BASE, F_MID, F_MID);
        g.fillRect(FL, FT, FR - FL, FB - FT);
        // Orthographic tile grid (no convergence — cleaner than perspective grid)
        const TW = 90, TH = 70;
        g.lineStyle(1, F_LINE, 0.15);
        for (let tx = FL; tx <= FR; tx += TW) g.lineBetween(tx, FT, tx, FB);
        for (let ty = FT; ty <= FB; ty += TH) g.lineBetween(FL, ty, FR, ty);
        // Subtle checkerboard shading — breaks up the flat tile fill
        for (let row = 0; row < Math.ceil((FB - FT) / TH) + 1; row++) {
          for (let col = 0; col < Math.ceil((FR - FL) / TW) + 1; col++) {
            if ((row + col) % 2 === 0) {
              g.fillStyle(0xffffff, 0.016);
              g.fillRect(FL + col * TW, FT + row * TH, TW, TH);
            }
          }
        }
        // Arena center circle + outer ring
        g.lineStyle(3, F_GLOW, 0.55);
        g.strokeCircle(VCX, VCY, 175);
        g.lineStyle(1, F_GLOW, 0.22);
        g.strokeCircle(VCX, VCY, 360);
        // Cross hairs inside center circle
        g.lineStyle(1, F_GLOW, 0.14);
        g.lineBetween(VCX, VCY - 175, VCX, VCY + 175);
        g.lineBetween(VCX - 175, VCY, VCX + 175, VCY);
        // Depth haze: darker at top (far end)
        g.fillGradientStyle(0x000000, 0x000000, 0x000000, 0x000000, 0.38, 0.38, 0, 0);
        g.fillRect(FL, FT, FR - FL, (FB - FT) * 0.44);
        // Near-side accent glow (bottom edge)
        g.fillGradientStyle(F_GLOW, F_GLOW, F_GLOW, F_GLOW, 0, 0, 0.05, 0.05);
        g.fillRect(FL, FB - (FB - FT) * 0.10, FR - FL, (FB - FT) * 0.10);

        // ── Top wall — top face + front face ─────────
        g.fillStyle(W_TOP, 1);
        g.fillRect(0, 0, 1440, FT - 18);
        g.lineStyle(1, W_DEEP, 0.22);
        for (let wx = 0; wx <= 1440; wx += 90) g.lineBetween(wx, 0, VP, FT - 18);
        g.fillStyle(W_FRONT, 1);
        g.fillRect(0, FT - 18, 1440, 18);
        g.lineStyle(2, W_EDGE, 0.85);
        g.lineBetween(0, FT - 18, 1440, FT - 18);

        // ── Bottom wall (nearest surface — thickest, most detail) ─
        g.fillStyle(W_EDGE, 1);
        g.fillRect(0, FB, 1440, 4);
        g.fillStyle(W_FRONT, 1);
        g.fillRect(0, FB + 4, 1440, 24);
        g.fillStyle(W_DEEP, 1);
        g.fillRect(0, FB + 28, 1440, 810 - FB - 28);
        g.lineStyle(1, W_DEEP, 0.4);
        for (let wx = 0; wx < 1440; wx += 90) g.lineBetween(wx, FB + 4, wx, FB + 28);

        // ── Side walls ────────────────────────────────
        g.fillStyle(W_FRONT, 1);
        g.fillRect(0, FT, FL, FB - FT);
        g.fillRect(FR, FT, 1440 - FR, FB - FT);
        // Inner shadow strip
        g.fillStyle(W_DEEP, 0.45);
        g.fillRect(FL, FT, 6, FB - FT);
        g.fillRect(FR - 6, FT, 6, FB - FT);

        // ── Corner blocks ─────────────────────────────
        g.fillStyle(W_DEEP, 1);
        g.fillRect(0, 0, FL, FT);
        g.fillRect(FR, 0, 1440 - FR, FT);
        g.fillRect(0, FB, FL, 810 - FB);
        g.fillRect(FR, FB, 1440 - FR, 810 - FB);

        // ── Wall block texture lines ──────────────────
        g.lineStyle(1, W_DEEP, 0.45);
        for (let x = 0; x < 1440; x += 90) g.lineBetween(x, 0, x, FT);
        for (let x = 0; x < 1440; x += 90) g.lineBetween(x, FB, x, 810);
        for (let y = FT; y < FB; y += 70) {
          g.lineBetween(0, y, FL, y);
          g.lineBetween(FR, y, 1440, y);
        }

        // ── Floor edge highlight ──────────────────────
        g.lineStyle(2, W_EDGE, 0.7);
        g.lineBetween(FL, FT, FR, FT);
        g.lineBetween(FL, FB, FR, FB);
        g.lineBetween(FL, FT, FL, FB);
        g.lineBetween(FR, FT, FR, FB);

        // ── Dynamic layers (order = depth order) ──────
        this._splatGfx = this.add.graphics();   // goo puddles — below everything
        this.slashGfx  = this.add.graphics();
        this.boomGfx   = this.add.graphics();
        this.slimeGfx  = this.add.graphics();

        // ── Name labels ───────────────────────────────
        this.nameLabels = [
          this.add.text(0, 0, '', {
            fontSize: '11px', color: '#0d2b3e',
            stroke: '#ffffff', strokeThickness: 3,
          }).setOrigin(0.5),
          this.add.text(0, 0, '', {
            fontSize: '11px', color: '#3e0d0d',
            stroke: '#ffffff', strokeThickness: 3,
          }).setOrigin(0.5),
        ];

        // ── HP pips (corner) ──────────────────────────
        this.hpPips = [[], []];
        for (let s = 0; s < 2; s++) {
          const x = s === 0 ? 40 : 1400;
          this.hpPips[s].push(this.add.circle(x, 22, 10, HP_COLORS[s]));
        }

        // ── Round score ───────────────────────────────
        this._roundScoreText = [
          this.add.text(60, 22, '0', {
            fontSize: '18px', color: '#4fc3f7', fontStyle: 'bold',
            stroke: '#000000', strokeThickness: 3,
          }).setOrigin(0, 0.5),
          this.add.text(1380, 22, '0', {
            fontSize: '18px', color: '#ff6b6b', fontStyle: 'bold',
            stroke: '#000000', strokeThickness: 3,
          }).setOrigin(1, 0.5),
        ];

        // ── Floating HP dots above each slime ─────────
        this._floatHp = [
          this.add.circle(0, 0, 7, HP_COLORS[0]),
          this.add.circle(0, 0, 7, HP_COLORS[1]),
        ];

        // ── Throw charge bar ──────────────────────────
        this.add.text(720, 790, 'CHARGE', {
          fontSize: '9px', color: '#a0a0c0', letterSpacing: 3,
        }).setOrigin(0.5);
        this.cooldownBg  = this.add.rectangle(720, 800, 140, 6, 0x3a2860);
        this.cooldownBar = this.add.rectangle(650, 800, 0, 6, SLIME_BASE[playerSlot ?? 0]).setOrigin(0, 0.5);

        // ── Overlay ───────────────────────────────────
        this.overlayBg   = this.add.rectangle(720, 405, 1440, 810, 0x000000, 0).setVisible(false);
        this.overlayText = this.add.text(720, 405, '', {
          fontSize: '52px', fontStyle: 'bold', color: '#ffffff',
          stroke: '#000000', strokeThickness: 6,
          align: 'center',
        }).setOrigin(0.5).setVisible(false);

        // ── Countdown ─────────────────────────────────
        this._countdownText = this.add.text(720, 360, '', {
          fontSize: '128px', fontStyle: 'bold', color: '#ffffff',
          stroke: '#1a0030', strokeThickness: 14,
        }).setOrigin(0.5).setVisible(false);

        // ── Interpolation state ───────────────────────
        this._pos      = [{ x: 360, y: 405 }, { x: 1080, y: 405 }];
        this._pState   = null;
        this._boomPos  = {};
        this._gameOver = false;
        this._vel  = [{ x: 0, y: 0 }, { x: 0, y: 0 }];
        this._hist = [[], []];

        // ── Juice state ───────────────────────────────
        this._hitFlashEnd    = [0, 0];
        this._hitStopEnd     = 0;
        this._slowMoEnd      = 0;
        this._prevHp         = [1, 1];
        this._boomTrail      = {};
        this._boomAngle      = {};
        this._boomHeight     = {};
        this._splats         = [];
        this._roundOverShown = false;
        this._particles      = [];
        this._walkTrail      = [[], []];
        this._walkTimer      = [0, 0];
        this._crowned        = [false, false];
        this._dashWindup     = [0, 0];
        this._wasDashing     = [false, false];
        var _chargingThrow = false;
        this.input.on('pointerdown', (ptr) => {
          if (!ws || ws.readyState !== WebSocket.OPEN || playerSlot === null) return;
          if (ptr.rightButtonDown()) {
            _chargingThrow = true;
            ws.send(JSON.stringify({ type: 'charge_start' }));
          } else if (ptr.leftButtonDown()) {
            ws.send(JSON.stringify({ type: 'slash' }));
          }
        });
        this.input.on('pointerup', (ptr) => {
          if (!_chargingThrow || !ws || ws.readyState !== WebSocket.OPEN || playerSlot === null) return;
          if (!ptr.rightButtonDown()) {
            _chargingThrow = false;
            const me = this._pos[playerSlot];
            const dx = ptr.x - me.x, dy = ptr.y - me.y;
            const len = Math.hypot(dx, dy) || 1;
            ws.send(JSON.stringify({ type: 'throw', dx: dx / len, dy: dy / len }));
          }
        });

        // Flush any state messages that arrived before Phaser finished init
        while (_pendingStates.length) applyState(this, _pendingStates.shift());

        // Show initial countdown
        _showCountdown(this);
      },

      update() {
        var state = this._pState;
        if (!state) return;

        var now = performance.now();
        var dt  = this.game.loop.delta || 16.67;

        // ── Time effects (hit-stop / slow-mo) ────────
        if (now < this._hitStopEnd) {
          this.game.loop.timeScale = 0.04;
        } else if (now < this._slowMoEnd) {
          this.game.loop.timeScale = 0.28;
        } else if (this.game.loop.timeScale !== 1.0) {
          this.game.loop.timeScale = 1.0;
        }
        // dt-independent LERP: same visual feel regardless of framerate
        var LERP = (now < this._hitStopEnd) ? 0 : 1 - Math.pow(0.75, dt / (1000 / 60));

        // ── _splatGfx: walk trail + splats + particles ─
        this._splatGfx.clear();
        var sg = this._splatGfx;

        // Walk trail droplets (faint streaks left while sliding)
        for (var ti = 0; ti < 2; ti++) {
          var wtr = this._walkTrail[ti];
          for (var td = 0; td < wtr.length; td++) {
            var tr = wtr[td];
            if (tr.alpha <= 0) continue;
            sg.fillStyle(SLIME_BASE[ti], tr.alpha * 0.28);
            sg.fillEllipse(tr.x, tr.y + 4, 16, 7);
          }
        }

        // Splats (large goo puddles on death)
        this._splats.forEach(function(sp) {
          if (sp.alpha <= 0) return;
          var c  = [0x4fc3f7, 0xff6b6b][sp.slot];
          var dk = [0x1a7aaa, 0xc0392b][sp.slot];
          sg.fillStyle(c, sp.alpha * 0.80);
          sg.fillEllipse(sp.x, sp.y + 6, 90, 28);
          sg.fillStyle(dk, sp.alpha * 0.42);
          sg.fillEllipse(sp.x + 10, sp.y + 10, 44, 16);
          sg.fillStyle(c, sp.alpha * 0.52);
          sg.fillEllipse(sp.x - 38, sp.y + 8, 22, 14);
          sg.fillEllipse(sp.x + 44, sp.y + 6, 18, 12);
          sg.fillEllipse(sp.x + 4, sp.y + 22, 24, 12);
          sp.alpha = Math.max(0, sp.alpha - 0.0018);
        });

        // Particles (burst + crown fly-off — simulate and render each frame)
        var aliveParticles = [];
        for (var pi = 0; pi < this._particles.length; pi++) {
          var pk = this._particles[pi];
          pk.vx    *= 0.93;
          pk.vy    += pk.gravity;
          pk.x     += pk.vx;
          pk.y     += pk.vy;
          pk.alpha  = Math.max(0, pk.alpha - 0.026);
          if (pk.alpha > 0) {
            sg.fillStyle(pk.col, pk.alpha);
            sg.fillCircle(pk.x, pk.y, pk.size);
            aliveParticles.push(pk);
          }
        }
        this._particles = aliveParticles;

        // ── Y-depth sort ──────────────────────────────
        var self  = this;
        var order = [0, 1].filter(function(i) { return state.players[i]; })
                          .sort(function(a, b) { return self._pos[a].y - self._pos[b].y; });

        this.slimeGfx.clear();
        order.forEach(function(i) {
          var p = state.players[i];
          if (!p) return;

          // dt-independent LERP position
          var prevX = self._pos[i].x, prevY = self._pos[i].y;
          self._pos[i].x += (p.x - self._pos[i].x) * LERP;
          self._pos[i].y += (p.y - self._pos[i].y) * LERP;

          // Smoothed velocity (EMA)
          var rawVx = self._pos[i].x - prevX;
          var rawVy = self._pos[i].y - prevY;
          self._vel[i].x = self._vel[i].x * 0.65 + rawVx * 0.35;
          self._vel[i].y = self._vel[i].y * 0.65 + rawVy * 0.35;
          var vx = self._vel[i].x, vy = self._vel[i].y;
          var speed = Math.hypot(vx, vy);

          // Position history (for dash ghost trail)
          self._hist[i].unshift({ x: self._pos[i].x, y: self._pos[i].y });
          if (self._hist[i].length > 6) self._hist[i].length = 6;

          // Y-depth scale
          var normY  = Math.max(0, Math.min(1, (self._pos[i].y - FT) / (FB - FT)));
          var scale  = 0.82 + 0.18 * normY;
          var floorY = self._pos[i].y;
          var bodyY  = floorY - 38 * scale;

          var dashing = state.dashing && state.dashing[i];

          // Walking wetness trail: push a droplet every 4 frames while sliding
          self._walkTimer[i] = (self._walkTimer[i] || 0) + 1;
          if (!dashing && speed > 0.4 && self._walkTimer[i] % 4 === 0) {
            self._walkTrail[i].push({
              x: self._pos[i].x + (Math.random() - 0.5) * 8,
              y: floorY,
              alpha: 0.50,
            });
          }
          // Fade existing trail entries
          for (var wj = self._walkTrail[i].length - 1; wj >= 0; wj--) {
            self._walkTrail[i][wj].alpha -= 0.0006;
            if (self._walkTrail[i][wj].alpha <= 0) self._walkTrail[i].splice(wj, 1);
          }

          // Slingshot windup: detect dash start, countdown squash frames
          var wasDash = self._wasDashing[i];
          if (dashing && !wasDash) self._dashWindup[i] = 5;
          if (self._dashWindup[i] > 0) self._dashWindup[i]--;
          self._wasDashing[i] = !!dashing;
          var windupT = self._dashWindup[i] / 5;  // 1→0 during anticipation frames

          // Squish: slingshot anticipation > dash stretch > walk lean > idle jiggle
          var squishX = 1, squishY = 1, leanX = 0;
          if (windupT > 0) {
            // Wide squash frames just before the dash fires — slingshot anticipation
            squishX = 1 + windupT * 0.45;
            squishY = 1 - windupT * 0.38;
          } else if (dashing && speed > 0.3) {
            var nx = vx / speed, ny = vy / speed;
            squishX = 1 + nx * nx * 0.65 - ny * ny * 0.35;
            squishY = 1 + ny * ny * 0.65 - nx * nx * 0.35;
            leanX   = nx * 14;
          } else if (speed > 0.15) {
            var nx = vx / speed, ny = vy / speed;
            var str = Math.min(speed * 0.1, 0.18);
            squishX = 1 + nx * nx * str - ny * ny * str * 0.5;
            squishY = 1 + ny * ny * str - nx * nx * str * 0.5;
            leanX   = nx * Math.min(speed, 1.5) * 5;
          }

          // Idle jiggle when still (and not in windup)
          if (speed < 0.18 && !dashing && windupT === 0) {
            var jt  = self.time.now * 0.0025 + i * Math.PI;
            var jig = Math.sin(jt) * 0.048;
            squishX = 1 + jig * 0.6;
            squishY = 1 - jig;
          }

          // Charge wind-up: squeeze wide, stretch tall
          var cr = (state.charge && state.charge[i]) || 0;
          if (cr > 0.08) {
            squishX *= (1 - cr * 0.16);
            squishY *= (1 + cr * 0.20);
          }

          // Charge ring
          if (cr > 0.02) {
            var ringR = (42 + cr * 28) * scale;
            self.slimeGfx.lineStyle(2 + cr * 2.5, SLIME_BASE[i], 0.25 + cr * 0.6);
            self.slimeGfx.strokeCircle(self._pos[i].x, bodyY - 4 * scale, ringR);
            if (cr > 0.85) {
              self.slimeGfx.lineStyle(3, 0xffffff, (cr - 0.85) * 3.5);
              self.slimeGfx.strokeCircle(self._pos[i].x, bodyY - 4 * scale, ringR + 6 * scale);
            }
          }

          // Floor glow
          self.slimeGfx.fillStyle(SLIME_BASE[i], 0.09);
          self.slimeGfx.fillEllipse(self._pos[i].x + leanX * 0.1, floorY + 5 * scale, 96 * scale * squishX, 30 * scale);

          // Dash trail
          if (dashing) {
            self.slimeGfx.fillStyle(SLIME_BASE[i], 0.12);
            self.slimeGfx.fillCircle(self._pos[i].x - leanX * 0.5, floorY - 16 * scale, 80 * scale);
            [0.38, 0.2, 0.1].forEach(function(alpha, gi) {
              var h = self._hist[i][gi + 2];
              if (!h) return;
              var ts = scale * (1 - gi * 0.05);
              var tby = h.y - 38 * ts;
              self.slimeGfx.fillStyle(SLIME_BASE[i], alpha);
              self.slimeGfx.fillEllipse(h.x, tby + 18*ts*squishY, 62*ts*squishX, 28*ts*squishY);
              self.slimeGfx.fillCircle(h.x, tby - 2*ts, 32*ts*squishX);
            });
          }

          // Hit flash (white overlay, decays over ~60 ms)
          var flashEnd = self._hitFlashEnd[i] || 0;
          var flash    = flashEnd > now ? Math.min(1, (flashEnd - now) / 60) : 0;

          var crowned = self._crowned && self._crowned[i];
          drawSlime(self.slimeGfx, self._pos[i].x, floorY, bodyY, i, scale, squishX, squishY, leanX, flash, crowned);

          // "You" indicator ring
          if (i === playerSlot) {
            self.slimeGfx.lineStyle(2, 0xffffff, 0.42);
            self.slimeGfx.strokeEllipse(self._pos[i].x, floorY + 6 * scale, 64*scale*squishX, 18*scale);
          }
          self.nameLabels[i].setPosition(self._pos[i].x + leanX * 0.4, bodyY - 50 * scale).setText(p.username);

          // Floating HP dot
          if (self._floatHp[i]) {
            self._floatHp[i]
              .setPosition(self._pos[i].x, bodyY - 60 * scale)
              .setRadius(6 * scale)
              .setAlpha(p.hp > 0 ? 0.82 : 0);
          }
        });

        // ── Boomerangs: lerp + trail + rotation + height arc ─
        this.boomGfx.clear();
        (state.boomerangs || []).forEach((b) => {
          if (!this._boomPos[b.id]) this._boomPos[b.id] = { x: b.x, y: b.y };
          this._boomPos[b.id].x += (b.x - this._boomPos[b.id].x) * LERP;
          this._boomPos[b.id].y += (b.y - this._boomPos[b.id].y) * LERP;
          var bx = this._boomPos[b.id].x, by = this._boomPos[b.id].y;

          // Smooth height toward target: arcs up on outward, lerps to 0 on return
          var targetH = b.returning ? 0 : Math.sin(Math.min(1, b.age / 22) * Math.PI) * 0.85;
          if (this._boomHeight[b.id] === undefined) this._boomHeight[b.id] = 0;
          this._boomHeight[b.id] += (targetH - this._boomHeight[b.id]) * 0.12;
          var height = this._boomHeight[b.id];

          // Trail: 8 fading ghost circles
          if (!this._boomTrail[b.id]) this._boomTrail[b.id] = [];
          this._boomTrail[b.id].unshift({ x: bx, y: by });
          if (this._boomTrail[b.id].length > 9) this._boomTrail[b.id].length = 9;
          var trail = this._boomTrail[b.id];
          for (var t = trail.length - 1; t >= 1; t--) {
            this.boomGfx.fillStyle(BOOM_COLORS[b.owner], (1 - t / trail.length) * 0.28);
            this.boomGfx.fillCircle(trail[t].x, trail[t].y, Math.max(3, 10 - t));
          }

          // Rotation angle
          if (!this._boomAngle[b.id]) this._boomAngle[b.id] = 0;
          this._boomAngle[b.id] = (this._boomAngle[b.id] + 11) % 360;

          drawBoom(this.boomGfx, bx, by, BOOM_COLORS[b.owner], b.returning, this._boomAngle[b.id], height);
        });

        var _live = new Set((state.boomerangs || []).map((b) => b.id));
        Object.keys(this._boomPos).forEach((id)    => { if (!_live.has(id)) delete this._boomPos[id]; });
        Object.keys(this._boomTrail).forEach((id)  => { if (!_live.has(id)) delete this._boomTrail[id]; });
        Object.keys(this._boomAngle).forEach((id)  => { if (!_live.has(id)) delete this._boomAngle[id]; });
        Object.keys(this._boomHeight).forEach((id) => { if (!_live.has(id)) delete this._boomHeight[id]; });
      },
    },
  });
}
</script>
</body>
</html>
