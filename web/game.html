<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boomerang Arena — Smahbros</title>
  <script src="js/auth.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1025;
      color: #e8e8f4;
      font-family: 'Space Mono', 'Courier New', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* ── Lobby ───────────────────────────────────────────── */
    #lobby {
      width: 400px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .lobby-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 2px;
    }
    .lobby-logo {
      font-family: 'Bebas Neue', 'Arial Black', sans-serif;
      font-size: 2.5rem;
      line-height: 0.88;
      letter-spacing: 0.03em;
    }
    .lobby-logo span { color: #4fc3f7; }
    .lobby-back {
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      color: rgba(232,232,244,0.28);
      text-decoration: none;
      padding-top: 6px;
      transition: color 0.15s;
    }
    .lobby-back:hover { color: rgba(232,232,244,0.65); }

    .lobby-input {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(167,139,250,0.22);
      border-radius: 8px;
      padding: 11px 14px;
      color: #e8e8f4;
      font-family: inherit;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    .lobby-input:focus { border-color: rgba(167,139,250,0.6); }
    .lobby-input::placeholder { color: rgba(232,232,244,0.2); }

    /* ── Mode tabs ───────────────────────────────────────── */
    .mode-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border: 1px solid rgba(167,139,250,0.18);
      border-radius: 8px;
      overflow: hidden;
    }
    .mode-tab {
      background: transparent;
      border: none;
      padding: 9px 0;
      color: rgba(232,232,244,0.3);
      font-family: inherit;
      font-size: 0.66rem;
      letter-spacing: 0.14em;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .mode-tab.active {
      background: rgba(122,85,204,0.28);
      color: #e8e8f4;
    }
    .mode-tab:hover:not(.active) {
      background: rgba(167,139,250,0.08);
      color: rgba(232,232,244,0.6);
    }

    /* ── Slides ──────────────────────────────────────────── */
    .slides-outer { overflow: hidden; }
    .slides-track {
      display: flex;
      transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    .slide {
      flex: 0 0 100%;
      display: flex;
      flex-direction: column;
      gap: 11px;
    }
    .slide-hint {
      font-size: 0.66rem;
      letter-spacing: 0.04em;
      color: rgba(232,232,244,0.32);
      line-height: 1.55;
    }

    /* ── Difficulty ──────────────────────────────────────── */
    .diff-group {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .diff-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(167,139,250,0.18);
      border-radius: 7px;
      padding: 9px 0;
      color: rgba(232,232,244,0.35);
      font-family: inherit;
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: all 0.15s;
    }
    .diff-btn.active {
      background: rgba(122,85,204,0.32);
      border-color: rgba(167,139,250,0.55);
      color: #e8e8f4;
    }
    .diff-btn:hover:not(.active) {
      background: rgba(167,139,250,0.08);
      color: rgba(232,232,244,0.65);
    }

    /* ── Buttons ─────────────────────────────────────────── */
    .lobby-btn {
      width: 100%;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-family: inherit;
      font-size: 0.75rem;
      letter-spacing: 0.14em;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }
    .lobby-btn.mp  { background: #4fc3f7; color: #0d0813; }
    .lobby-btn.mp:hover  { background: #81d4fa; }
    .lobby-btn.cpu { background: #7a55cc; color: #fff; }
    .lobby-btn.cpu:hover { background: #9370e8; }

    /* ── Status ──────────────────────────────────────────── */
    #status {
      text-align: center;
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      color: rgba(232,232,244,0.4);
      min-height: 1.2em;
    }
    #status.err { color: #ef5350; }

    /* ── Controls legend ─────────────────────────────────── */
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      border-top: 1px solid rgba(167,139,250,0.1);
      padding-top: 12px;
    }
    .ctrl {
      font-size: 0.62rem;
      letter-spacing: 0.04em;
      color: rgba(232,232,244,0.28);
    }
    .ctrl strong { color: rgba(232,232,244,0.55); }

    /* ── Game canvas wrapper ─────────────────────────────── */
    #game-wrap { display: none; position: relative; }
    #game-wrap canvas { display: block; border-radius: 10px; }

    /* ── End-screen overlay ──────────────────────────────── */
    #endscreen {
      display: none;
      position: absolute;
      bottom: 56px;
      left: 50%;
      transform: translateX(-50%);
      gap: 10px;
      z-index: 10;
      white-space: nowrap;
    }
    .end-btn {
      background: rgba(26,16,37,0.92);
      border: 1px solid rgba(167,139,250,0.38);
      border-radius: 8px;
      padding: 10px 22px;
      color: #e8e8f4;
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: all 0.15s;
    }
    .end-btn:hover { background: rgba(122,85,204,0.28); border-color: rgba(167,139,250,0.7); }
    .end-btn.primary { border-color: rgba(79,195,247,0.45); }
    .end-btn.primary:hover { background: rgba(79,195,247,0.18); border-color: rgba(79,195,247,0.75); }
  </style>
</head>
<body>
<script>requireAuth();</script>

<!-- ── Lobby ──────────────────────────────────────────────── -->
<div id="lobby">
  <div class="lobby-top">
    <div class="lobby-logo">BOOMERANG<br><span>ARENA</span></div>
    <a href="hub.html" class="lobby-back">← HUB</a>
  </div>

  <input id="inp-user" class="lobby-input" placeholder="USERNAME" autocomplete="off" />

  <div class="mode-tabs">
    <button class="mode-tab active" data-slide="0">MULTIPLAYER</button>
    <button class="mode-tab"        data-slide="1">VS CPU</button>
  </div>

  <div class="slides-outer">
    <div class="slides-track" id="slides-track">

      <!-- Slide 0: Multiplayer -->
      <div class="slide">
        <p class="slide-hint">Share a room ID with a friend — first two in win.</p>
        <input id="inp-room" class="lobby-input" placeholder="ROOM ID (e.g. lobby1)" autocomplete="off" />
        <button id="btn-join" class="lobby-btn mp">JOIN ROOM</button>
      </div>

      <!-- Slide 1: VS CPU -->
      <div class="slide">
        <p class="slide-hint">Fight against an AI opponent — no friend required.</p>
        <div class="diff-group">
          <button class="diff-btn"        data-d="easy">EASY</button>
          <button class="diff-btn active" data-d="normal">NORMAL</button>
          <button class="diff-btn"        data-d="hard">HARD</button>
        </div>
        <button id="btn-cpu" class="lobby-btn cpu">PLAY VS CPU</button>
      </div>

    </div>
  </div>

  <div id="status"></div>

  <div class="controls">
    <div class="ctrl"><strong>WASD</strong> — move</div>
    <div class="ctrl"><strong>Right-click</strong> — throw</div>
    <div class="ctrl"><strong>Left-click</strong> — slash</div>
    <div class="ctrl"><strong>SPACE</strong> — dash</div>
    <div class="ctrl"><strong>3 HP</strong> — last standing</div>
  </div>
</div>

<!-- ── Phaser canvas ──────────────────────────────────────── -->
<div id="game-wrap">
  <div id="endscreen">
    <button class="end-btn primary" onclick="location.reload()">PLAY AGAIN</button>
    <a href="hub.html" class="end-btn">← HUB</a>
  </div>
</div>

<script>
const WS_BASE = 'wss://smash-bracket-api.onrender.com';
const token   = localStorage.getItem('authToken') || '';

let ws         = null;
let playerSlot = null;
let phaserGame = null;
let scene      = null;

const lobbyEl  = document.getElementById('lobby');
const gameWrap = document.getElementById('game-wrap');
const statusEl = document.getElementById('status');

// Pre-fill username
const savedUser = localStorage.getItem('username');
if (savedUser) document.getElementById('inp-user').value = savedUser;

// ── Slide navigation ──────────────────────────────────────────────────────────
let currentSlide = 0;
const slidesTrack = document.getElementById('slides-track');
const modeTabs    = document.querySelectorAll('.mode-tab');

function goToSlide(idx) {
  currentSlide = idx;
  slidesTrack.style.transform = 'translateX(' + (-idx * 100) + '%)';
  modeTabs.forEach(function(t, i) { t.classList.toggle('active', i === idx); });
}
modeTabs.forEach(function(tab, i) {
  tab.addEventListener('click', function() { goToSlide(i); });
});

// Swipe support
var _touchX = 0;
slidesTrack.addEventListener('touchstart', function(e) { _touchX = e.touches[0].clientX; }, { passive: true });
slidesTrack.addEventListener('touchend',   function(e) {
  var dx = e.changedTouches[0].clientX - _touchX;
  if (dx < -40) goToSlide(Math.min(1, currentSlide + 1));
  if (dx >  40) goToSlide(Math.max(0, currentSlide - 1));
});

// ── Difficulty selection ──────────────────────────────────────────────────────
var selectedDiff = 'normal';
document.querySelectorAll('.diff-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.diff-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    selectedDiff = btn.dataset.d;
  });
});

// ── Status helpers ────────────────────────────────────────────────────────────
function setStatus(msg, isErr) {
  statusEl.textContent = msg;
  statusEl.className   = isErr ? 'err' : '';
}

// ── Multiplayer join ──────────────────────────────────────────────────────────
document.getElementById('btn-join').addEventListener('click', tryJoin);
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && lobbyEl.style.display !== 'none') {
    if (currentSlide === 0) tryJoin(); else playCpu();
  }
});

function tryJoin() {
  var roomId   = document.getElementById('inp-room').value.trim();
  var username = document.getElementById('inp-user').value.trim() || 'Player';
  if (!roomId) { setStatus('Enter a Room ID.', true); return; }
  localStorage.setItem('username', username);
  connectMulti(roomId, username);
}

function connectMulti(roomId, username) {
  setStatus('Connecting…');
  var slowTimer = setTimeout(function() {
    setStatus('Server is waking up — this takes ~30s on first load…');
  }, 4000);

  ws = new WebSocket(WS_BASE + '/ws/game/' + roomId);
  ws.onopen = function() {
    clearTimeout(slowTimer);
    ws.send(JSON.stringify({ token: token, username: username }));
  };
  ws.onmessage = handleWsMsg;
  ws.onclose   = function() {
    if (scene) showOverlay(scene, 'Disconnected from server');
    else setStatus('Connection closed — server may have rejected the session.', true);
  };
  ws.onerror = function() { setStatus('Connection failed — server may be starting up, try again in 30s.', true); };
}

// ── CPU join ──────────────────────────────────────────────────────────────────
document.getElementById('btn-cpu').addEventListener('click', playCpu);

function playCpu() {
  var username = document.getElementById('inp-user').value.trim() || 'Player';
  var roomId   = 'cpu_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
  localStorage.setItem('username', username);
  connectCpu(roomId, username, selectedDiff);
}

function connectCpu(roomId, username, difficulty) {
  setStatus('Starting CPU game…');
  var slowTimer = setTimeout(function() {
    setStatus('Server is waking up — this takes ~30s on first load…');
  }, 4000);

  ws = new WebSocket(WS_BASE + '/ws/game-cpu/' + roomId);
  ws.onopen = function() {
    clearTimeout(slowTimer);
    ws.send(JSON.stringify({ token: token, username: username, difficulty: difficulty }));
  };
  ws.onmessage = handleWsMsg;
  ws.onclose   = function() {
    if (scene) showOverlay(scene, 'Disconnected from server');
    else setStatus('Connection failed.', true);
  };
  ws.onerror = function() { setStatus('Connection failed — server may be starting up, try again in 30s.', true); };
}

// ── Shared WS message handler ─────────────────────────────────────────────────
function handleWsMsg(e) {
  var msg = JSON.parse(e.data);
  if (msg.type === 'error') { setStatus(msg.message, true); ws.close(); return; }
  if (msg.type === 'joined') {
    playerSlot = msg.slot;
    setStatus('You are Player ' + (msg.slot + 1) + '. Waiting for opponent…');
  }
  if (msg.type === 'player_joined') {
    setStatus(msg.username + ' joined — starting soon…');
  }
  if (msg.type === 'start' && !phaserGame) {
    lobbyEl.style.display  = 'none';
    gameWrap.style.display = 'block';
    phaserGame = launchPhaser();
  }
  if (msg.type === 'state') {
    if (scene) {
      while (_pendingStates.length) applyState(scene, _pendingStates.shift());
      applyState(scene, msg);
    } else {
      _pendingStates.push(msg);
      if (_pendingStates.length > 8) _pendingStates.shift();
    }
  }
  if (msg.type === 'player_left' && scene) { showOverlay(scene, 'Opponent disconnected'); }
}

// ── Keyboard input ────────────────────────────────────────────────────────────
const held = { up: false, down: false, left: false, right: false };
const KEY_MAP = {
  w: 'up', arrowup: 'up',
  s: 'down', arrowdown: 'down',
  a: 'left', arrowleft: 'left',
  d: 'right', arrowright: 'right',
};

function sendKeys() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'input', keys: { up: held.up, down: held.down, left: held.left, right: held.right } }));
  }
}
document.addEventListener('keydown', function(e) {
  var k = KEY_MAP[e.key.toLowerCase()];
  if (k && !held[k]) { held[k] = true; sendKeys(); }
  if (e.key === ' ' && !e.repeat && ws && ws.readyState === WebSocket.OPEN && playerSlot !== null) {
    var ddx = (held.right ? 1 : 0) - (held.left ? 1 : 0);
    var ddy = (held.down  ? 1 : 0) - (held.up   ? 1 : 0);
    ws.send(JSON.stringify({ type: 'dash', dx: ddx, dy: ddy }));
  }
});
document.addEventListener('keyup', function(e) {
  var k = KEY_MAP[e.key.toLowerCase()];
  if (k) { held[k] = false; sendKeys(); }
});
document.addEventListener('contextmenu', function(e) { e.preventDefault(); });

// ── Shared drawing constants & helpers ───────────────────────────────────────
var SLIME_BASE  = [0x4fc3f7, 0xff6b6b];
var SLIME_DARK  = [0x1a7aaa, 0xc0392b];
var HP_COLORS   = [0x4fc3f7, 0xff6b6b];
var BOOM_COLORS = [0xffd54f, 0xff8a65];

var _pendingStates = [];

// drawSlime(g, x, floorY, bodyY, idx, s, sx, sy, leanX)
// leanX: body tips in motion direction; shadow stays at x
function drawSlime(g, x, floorY, bodyY, idx, s, sx, sy, leanX) {
  s     = s     || 1;
  sx    = sx    || 1;
  sy    = sy    || 1;
  leanX = leanX || 0;
  var bx   = x + leanX;   // body center x
  var base = SLIME_BASE[idx];
  var dark = SLIME_DARK[idx];
  // Shadow: flat on the floor plane, clearly separate from the hovering body
  g.fillStyle(0x000000, 0.3);
  g.fillEllipse(x + leanX * 0.15 + 2*s, floorY + 6*s, 60*s*sx, 16*s);
  // Body (squished in motion direction)
  g.fillStyle(base, 1);
  g.fillEllipse(bx, bodyY + 6*s, 50*s*sx, 30*s*sy);
  g.fillEllipse(bx, bodyY - 4*s, 42*s*sx, 32*s*sy);
  g.fillStyle(dark, 0.28);
  g.fillCircle(bx + 11*s, bodyY + 4*s, 22*s);
  g.fillStyle(0xffffff, 0.52);
  g.fillEllipse(bx - 10*s, bodyY - 10*s, 20*s, 13*s);
  // Eyes (spread with squishX)
  g.fillStyle(0xffffff, 1);
  g.fillCircle(bx - 9*s*sx, bodyY - 2*s, 7.5*s);
  g.fillCircle(bx + 9*s*sx, bodyY - 2*s, 7.5*s);
  g.fillStyle(0x111122, 1);
  g.fillCircle(bx - 8*s*sx, bodyY - 1*s, 4.5*s);
  g.fillCircle(bx + 10*s*sx, bodyY - 1*s, 4.5*s);
  g.fillStyle(0xffffff, 1);
  g.fillCircle(bx - 6*s*sx, bodyY - 3*s, 2*s);
  g.fillCircle(bx + 12*s*sx, bodyY - 3*s, 2*s);
  g.fillStyle(0x111122, 0.8);
  g.fillCircle(bx - 5*s, bodyY + 14*s*sy, 2*s);
  g.fillCircle(bx,        bodyY + 16*s*sy, 2*s);
  g.fillCircle(bx + 5*s,  bodyY + 14*s*sy, 2*s);
}

function drawBoom(g, bx, by, col, returning) {
  g.fillStyle(0x000000, 0.2);
  g.fillEllipse(bx + 3, by + 20, 22, 6);
  g.fillStyle(col, 1);
  g.fillTriangle(bx, by - 10, bx - 7, by + 4, bx + 1, by + 1);
  g.fillTriangle(bx, by - 10, bx + 7, by + 4, bx - 1, by + 1);
  g.fillStyle(0xffffff, returning ? 0.75 : 0.4);
  g.fillCircle(bx - 2, by - 4, 2.5);
}

function applyState(sc, state) {
  // Store as interpolation target — rendering happens in update() at 60fps
  sc._pState = state;

  // HUD: HP pips update immediately (not position-dependent)
  state.players.forEach(function(p, i) {
    if (!p) return;
    for (var h = 0; h < 3; h++) {
      sc.hpPips[i][h].setAlpha(h < p.hp ? 1 : 0.15);
    }
  });

  // Slash flash: centered on body (which hovers ~20px above physics y)
  sc.slashGfx.clear();
  (state.slashing || []).forEach(function(active, i) {
    if (!active || !state.players[i]) return;
    var p = state.players[i];
    var cy = p.y - 20;
    sc.slashGfx.fillStyle(SLIME_BASE[i], 0.2);
    sc.slashGfx.fillCircle(p.x, cy, 62);
    sc.slashGfx.lineStyle(2, SLIME_BASE[i], 0.55);
    sc.slashGfx.strokeCircle(p.x, cy, 62);
  });

  // Charge bar (your own charge level)
  if (state.charge && playerSlot !== null) {
    var myCharge = state.charge[playerSlot] || 0;
    sc.cooldownBar.displayWidth = Math.round(140 * myCharge);
  }

  // Win/lose (only trigger once)
  if (state.phase === 'done' && state.winner !== null && !sc._gameOver) {
    sc._gameOver = true;
    showOverlay(sc, state.winner === playerSlot ? 'You Win!' : 'You Lose');
  }
}

function showOverlay(sc, text) {
  sc.overlayBg.setFillStyle(0x000000, 0.65).setVisible(true);
  sc.overlayText.setText(text).setVisible(true);
  var es = document.getElementById('endscreen');
  if (es) es.style.display = 'flex';
}

// ── Phaser ────────────────────────────────────────────────────────────────────
function launchPhaser() {

  // Arena geometry (matches server physics boundary)
  const FL = 20, FR = 780, FT = 38, FB = 562;   // floor left/right/top/bottom

  // Wall palette
  const W_TOP   = 0xb09ae8;   // top face of wall block (light purple)
  const W_FRONT = 0x7a55cc;   // front face
  const W_DEEP  = 0x4a3090;   // inner shadow / corner
  const W_EDGE  = 0x9070d8;   // bright edge line

  // Floor palette
  const GRASS_A = 0x5cb85c;   // main green
  const GRASS_B = 0x4da84d;   // slightly darker for tile grid

  return new Phaser.Game({
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    backgroundColor: '#1a1025',
    parent: 'game-wrap',
    input: { mouse: { preventDefaultDown: true } },
    scene: {
      key: 'GameScene',
      preload() {},

      create() {
        scene = this;
        const g = this.add.graphics();

        // ── Grass floor ───────────────────────────────
        // Far end (top) darker, near end (bottom) brighter — depth gradient
        g.fillGradientStyle(0x3a6b3a, 0x3a6b3a, 0x74c874, 0x74c874);
        g.fillRect(FL, FT, FR - FL, FB - FT);
        // Perspective grid converging to vanishing point at top-center
        const VP = (FL + FR) / 2;
        g.lineStyle(1, 0x000000, 0.17);
        for (let i = 0; i <= 14; i++) {
          const bx = FL + (FR - FL) * i / 14;
          g.lineBetween(VP, FT, bx, FB);
        }
        for (let j = 1; j <= 9; j++) {
          const t = Math.pow(j / 10, 1.35);
          const ty = FT + (FB - FT) * t;
          g.lineBetween(VP + (FL - VP) * t, ty, VP + (FR - VP) * t, ty);
        }
        // Center court oval (depth reference landmark)
        g.lineStyle(1.5, 0x000000, 0.13);
        g.strokeEllipse((FL + FR) / 2, FT + (FB - FT) * 0.63, 200, 88);
        // Atmospheric depth haze — fade black overlay from top down (far = hazier)
        g.fillGradientStyle(0x000000, 0x000000, 0x000000, 0x000000, 0.28, 0.28, 0, 0);
        g.fillRect(FL, FT, FR - FL, (FB - FT) * 0.46);
        // Near-side brightness boost — brighter strip at bottom edge of floor
        g.fillGradientStyle(0xffffff, 0xffffff, 0xffffff, 0xffffff, 0, 0, 0.07, 0.07);
        g.fillRect(FL, FB - (FB - FT) * 0.18, FR - FL, (FB - FT) * 0.18);

        // ── Top wall — top face + front face ─────────
        g.fillStyle(W_TOP, 1);
        g.fillRect(0, 0, 800, FT - 18);
        // Perspective seams on top-face converging toward VP
        g.lineStyle(1, W_DEEP, 0.22);
        for (let wx = 0; wx <= 800; wx += 80) g.lineBetween(wx, 0, VP, FT - 18);
        g.fillStyle(W_FRONT, 1);
        g.fillRect(0, FT - 18, 800, 18);
        // Bright lit top edge of the front face
        g.lineStyle(2, W_EDGE, 0.85);
        g.lineBetween(0, FT - 18, 800, FT - 18);

        // ── Bottom wall (nearest surface — thickest, most detail) ─
        // Bright top-lit edge (catches most light)
        g.fillStyle(W_EDGE, 1);
        g.fillRect(0, FB, 800, 4);
        // Main front face
        g.fillStyle(W_FRONT, 1);
        g.fillRect(0, FB + 4, 800, 24);
        // Underside bevel (in shadow)
        g.fillStyle(W_DEEP, 1);
        g.fillRect(0, FB + 28, 800, 600 - FB - 28);
        // Block seam lines on bottom wall front face
        g.lineStyle(1, W_DEEP, 0.4);
        for (let wx = 0; wx < 800; wx += 80) g.lineBetween(wx, FB + 4, wx, FB + 28);

        // ── Side walls ────────────────────────────────
        g.fillStyle(W_FRONT, 1);
        g.fillRect(0, FT, FL, FB - FT);
        g.fillRect(FR, FT, 800 - FR, FB - FT);
        // Inner shadow strip
        g.fillStyle(W_DEEP, 0.45);
        g.fillRect(FL, FT, 6, FB - FT);
        g.fillRect(FR - 6, FT, 6, FB - FT);

        // ── Corner blocks ─────────────────────────────
        g.fillStyle(W_DEEP, 1);
        g.fillRect(0, 0, FL, FT);
        g.fillRect(FR, 0, 800 - FR, FT);
        g.fillRect(0, FB, FL, 600 - FB);
        g.fillRect(FR, FB, 800 - FR, 600 - FB);

        // ── Wall block texture lines ──────────────────
        g.lineStyle(1, W_DEEP, 0.45);
        // Top wall vertical block seams
        for (let x = 0; x < 800; x += 80) g.lineBetween(x, 0, x, FT);
        // Bottom wall seams
        for (let x = 0; x < 800; x += 80) g.lineBetween(x, FB, x, 600);
        // Side wall horizontal seams
        for (let y = FT; y < FB; y += 70) {
          g.lineBetween(0, y, FL, y);
          g.lineBetween(FR, y, 800, y);
        }

        // ── Floor edge highlight ──────────────────────
        g.lineStyle(2, W_EDGE, 0.7);
        g.lineBetween(FL, FT, FR, FT);
        g.lineBetween(FL, FB, FR, FB);
        g.lineBetween(FL, FT, FL, FB);
        g.lineBetween(FR, FT, FR, FB);

        // ── Dynamic layers ────────────────────────────
        this.slashGfx = this.add.graphics();
        this.boomGfx  = this.add.graphics();
        this.slimeGfx = this.add.graphics();

        // ── Name labels ───────────────────────────────
        this.nameLabels = [
          this.add.text(0, 0, '', {
            fontSize: '11px', color: '#0d2b3e',
            stroke: '#ffffff', strokeThickness: 3,
          }).setOrigin(0.5),
          this.add.text(0, 0, '', {
            fontSize: '11px', color: '#3e0d0d',
            stroke: '#ffffff', strokeThickness: 3,
          }).setOrigin(0.5),
        ];

        // ── HP pips ───────────────────────────────────
        this.hpPips = [[], []];
        for (let s = 0; s < 2; s++) {
          for (let i = 0; i < 3; i++) {
            const x = s === 0 ? 30 + i * 17 : 770 - i * 17;
            this.hpPips[s].push(this.add.circle(x, 18, 6, HP_COLORS[s]));
          }
        }

        // ── Throw charge bar ──────────────────────────
        this.add.text(400, 572, 'CHARGE', {
          fontSize: '9px', color: '#a0a0c0', letterSpacing: 3,
        }).setOrigin(0.5);
        this.cooldownBg  = this.add.rectangle(400, 582, 140, 6, 0x3a2860);
        this.cooldownBar = this.add.rectangle(330, 582, 0, 6, SLIME_BASE[playerSlot ?? 0]).setOrigin(0, 0.5);

        // ── Overlay ───────────────────────────────────
        this.overlayBg   = this.add.rectangle(400, 300, 800, 600, 0x000000, 0).setVisible(false);
        this.overlayText = this.add.text(400, 300, '', {
          fontSize: '44px', fontStyle: 'bold', color: '#ffffff',
          stroke: '#000000', strokeThickness: 6,
        }).setOrigin(0.5).setVisible(false);

        // ── Interpolation state ───────────────────────
        this._pos      = [{ x: 200, y: 300 }, { x: 600, y: 300 }];
        this._pState   = null;
        this._boomPos  = {};
        this._gameOver = false;
        this._vel  = [{ x: 0, y: 0 }, { x: 0, y: 0 }];
        this._hist = [[], []];
        var _chargingThrow = false;
        this.input.on('pointerdown', (ptr) => {
          if (!ws || ws.readyState !== WebSocket.OPEN || playerSlot === null) return;
          if (ptr.rightButtonDown()) {
            _chargingThrow = true;
            ws.send(JSON.stringify({ type: 'charge_start' }));
          } else if (ptr.leftButtonDown()) {
            ws.send(JSON.stringify({ type: 'slash' }));
          }
        });
        this.input.on('pointerup', (ptr) => {
          if (!_chargingThrow || !ws || ws.readyState !== WebSocket.OPEN || playerSlot === null) return;
          if (!ptr.rightButtonDown()) {
            _chargingThrow = false;
            const me = this._pos[playerSlot];
            const dx = ptr.x - me.x, dy = ptr.y - me.y;
            const len = Math.hypot(dx, dy) || 1;
            ws.send(JSON.stringify({ type: 'throw', dx: dx / len, dy: dy / len }));
          }
        });

        // Flush any state messages that arrived before Phaser finished init
        while (_pendingStates.length) applyState(this, _pendingStates.shift());
      },

      update() {
        var state = this._pState;
        if (!state) return;
        var LERP = 0.25;

        // Y-depth sort: draw further (lower Y) first
        var order = [0, 1].filter(i => state.players[i])
                          .sort((a, b) => this._pos[a].y - this._pos[b].y);

        this.slimeGfx.clear();
        order.forEach((i) => {
          var p = state.players[i];
          if (!p) return;

          // ── Lerp position ─────────────────────────────
          var prevX = this._pos[i].x, prevY = this._pos[i].y;
          this._pos[i].x += (p.x - this._pos[i].x) * LERP;
          this._pos[i].y += (p.y - this._pos[i].y) * LERP;

          // ── Smoothed velocity (EMA) ────────────────────
          var rawVx = this._pos[i].x - prevX;
          var rawVy = this._pos[i].y - prevY;
          this._vel[i].x = this._vel[i].x * 0.65 + rawVx * 0.35;
          this._vel[i].y = this._vel[i].y * 0.65 + rawVy * 0.35;
          var vx = this._vel[i].x, vy = this._vel[i].y;
          var speed = Math.hypot(vx, vy);

          // ── Position history (for dash trail) ─────────
          this._hist[i].unshift({ x: this._pos[i].x, y: this._pos[i].y });
          if (this._hist[i].length > 6) this._hist[i].length = 6;

          // ── Y-depth scale ─────────────────────────────
          var normY  = Math.max(0, Math.min(1, (this._pos[i].y - FT) / (FB - FT)));
          var scale  = 0.82 + 0.18 * normY;
          var floorY = this._pos[i].y;
          // Body hovers above the floor — this gap is the primary 2.5D depth cue
          var bodyY  = floorY - 30 * scale;

          var dashing = state.dashing && state.dashing[i];

          // ── Squish: direction-based slide (no bounce) ─
          var squishX = 1, squishY = 1, leanX = 0;
          if (dashing && speed > 0.3) {
            var nx = vx / speed, ny = vy / speed;
            squishX = 1 + nx * nx * 0.65 - ny * ny * 0.35;
            squishY = 1 + ny * ny * 0.65 - nx * nx * 0.35;
            leanX   = nx * 14;
          } else if (speed > 0.15) {
            var nx = vx / speed, ny = vy / speed;
            var str = Math.min(speed * 0.1, 0.18);
            squishX = 1 + nx * nx * str - ny * ny * str * 0.5;
            squishY = 1 + ny * ny * str - nx * nx * str * 0.5;
            leanX   = nx * Math.min(speed, 1.5) * 5;
          }

          // ── Charge ring: grows and brightens as throw charges ─
          if (state.charge && state.charge[i] > 0.02) {
            var cr = state.charge[i];
            var ringR = (32 + cr * 22) * scale;
            this.slimeGfx.lineStyle(2 + cr * 2, SLIME_BASE[i], 0.25 + cr * 0.6);
            this.slimeGfx.strokeCircle(this._pos[i].x, bodyY - 4 * scale, ringR);
            if (cr > 0.85) {
              // Full charge: extra bright flash ring
              this.slimeGfx.lineStyle(3, 0xffffff, (cr - 0.85) * 3.5);
              this.slimeGfx.strokeCircle(this._pos[i].x, bodyY - 4 * scale, ringR + 5 * scale);
            }
          }

          // ── Soft colored floor glow (contact pool of light)
          this.slimeGfx.fillStyle(SLIME_BASE[i], 0.09);
          this.slimeGfx.fillEllipse(this._pos[i].x + leanX * 0.1, floorY + 5 * scale, 78 * scale * squishX, 26 * scale);

          // ── Dash trail: ghost blobs at history positions ─
          if (dashing) {
            this.slimeGfx.fillStyle(SLIME_BASE[i], 0.12);
            this.slimeGfx.fillCircle(this._pos[i].x - leanX * 0.5, floorY - 10 * scale, 68 * scale);
            var trailA = [0.38, 0.2, 0.1];
            trailA.forEach((alpha, gi) => {
              var h = this._hist[i][gi + 2];
              if (!h) return;
              var ts = scale * (1 - gi * 0.05);
              var trailBodyY = h.y - 30 * ts;
              this.slimeGfx.fillStyle(SLIME_BASE[i], alpha);
              this.slimeGfx.fillEllipse(h.x, trailBodyY + 6*ts, 50*ts*squishX, 28*ts*squishY);
              this.slimeGfx.fillEllipse(h.x, trailBodyY - 4*ts, 42*ts*squishX, 30*ts*squishY);
            });
          }

          drawSlime(this.slimeGfx, this._pos[i].x, floorY, bodyY, i, scale, squishX, squishY, leanX);

          // "You" indicator ring on the floor plane (not on body)
          if (i === playerSlot) {
            this.slimeGfx.lineStyle(2, 0xffffff, 0.42);
            this.slimeGfx.strokeEllipse(this._pos[i].x, floorY + 5 * scale, 52*scale*squishX, 14*scale);
          }
          this.nameLabels[i].setPosition(this._pos[i].x + leanX * 0.4, bodyY - 28 * scale).setText(p.username);
        });

        // ── Boomerangs: lerp each by id ───────────────
        this.boomGfx.clear();
        (state.boomerangs || []).forEach((b) => {
          if (!this._boomPos[b.id]) this._boomPos[b.id] = { x: b.x, y: b.y };
          this._boomPos[b.id].x += (b.x - this._boomPos[b.id].x) * LERP;
          this._boomPos[b.id].y += (b.y - this._boomPos[b.id].y) * LERP;
          drawBoom(this.boomGfx, this._boomPos[b.id].x, this._boomPos[b.id].y, BOOM_COLORS[b.owner], b.returning);
        });
        var _live = new Set((state.boomerangs || []).map((b) => b.id));
        Object.keys(this._boomPos).forEach((id) => { if (!_live.has(id)) delete this._boomPos[id]; });
      },
    },
  });
}
</script>
