<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smash Bracket — Practice Tracker</title>
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/auth.js"></script>
  <style>
    /* ── Character grid ── */
    .practice-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
      gap: 6px;
      margin-top: 16px;
    }
    .ptile {
      position: relative;
      aspect-ratio: 1;
      border-radius: 7px;
      overflow: hidden;
      border: 2px solid transparent;
      background: var(--card-bg2);
      cursor: pointer;
      transition: transform 0.12s, border-color 0.12s, box-shadow 0.12s;
    }
    .ptile:hover { transform: scale(1.1); z-index: 10; border-color: var(--accent-blue); }
    .ptile.has-sessions { border-color: rgba(39,174,96,0.5); }
    .ptile.has-sessions:hover { border-color: #27ae60; }
    .ptile img { width:100%; height:100%; object-fit:contain; display:block; pointer-events:none; }
    .ptile-count {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(39,174,96,0.85); color: #fff;
      font-size: 0.52rem; font-weight: 800; text-align: center;
      padding: 2px 0 3px; line-height: 1;
    }
    .ptile-name {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.7); color: #fff;
      font-size: 0.48rem; font-weight: 700; text-align: center;
      padding: 2px 2px 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .ptile.has-sessions .ptile-name { bottom: 14px; background: rgba(0,0,0,0.5); }

    /* ── Practice modal ── */
    #practiceModal { display:none; position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.65); align-items:center; justify-content:center; padding:16px; }
    #practiceModal.open { display:flex; }
    .pm-box {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: 100%;
      max-width: 860px;
      max-height: 92vh;
      display: flex;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0,0,0,0.7);
    }

    /* Left panel */
    .pm-left {
      width: 220px;
      flex-shrink: 0;
      background: var(--card-bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 14px 16px;
      gap: 10px;
    }
    .pm-char-img {
      width: 140px; height: 140px;
      object-fit: contain;
      border-radius: 10px;
      background: var(--card-bg);
    }
    .pm-char-name { font-size: 1rem; font-weight: 800; text-align: center; }
    .pm-summary { font-size: 0.78rem; color: var(--text-muted); text-align: center; line-height: 1.5; }
    .alt-strip { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; }
    .alt-btn {
      width: 32px; height: 32px; border-radius: 5px; overflow: hidden;
      border: 2px solid transparent; cursor: pointer; background: var(--card-bg);
      transition: border-color 0.12s, transform 0.1s;
      padding: 0;
    }
    .alt-btn img { width:100%; height:100%; object-fit:contain; display:block; }
    .alt-btn.active { border-color: var(--accent-blue); transform: scale(1.1); }
    .alt-btn:hover { border-color: rgba(0,119,200,0.5); }
    .alt-label { font-size: 0.62rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Right panel */
    .pm-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .pm-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .pm-header h2 { font-size: 0.95rem; font-weight: 800; }
    .pm-close { background:none; border:none; color:var(--text-muted); font-size:1.2rem; cursor:pointer; padding:4px 6px; line-height:1; }
    .pm-close:hover { color: var(--text); }
    .pm-body { flex:1; overflow-y:auto; padding:16px 18px; display:flex; flex-direction:column; gap:18px; }

    /* Stats block */
    .pm-stats-row { display:flex; gap:14px; flex-wrap:wrap; }
    .pm-stat-box {
      background: var(--card-bg2); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 14px; flex: 1; min-width: 70px; text-align: center;
    }
    .pm-stat-val { font-size: 1.3rem; font-weight: 900; }
    .pm-stat-lbl { font-size: 0.62rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; margin-top: 2px; }

    /* Session log list */
    .session-row {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 0; border-bottom: 1px solid var(--border);
      font-size: 0.82rem;
    }
    .session-row:last-child { border-bottom: none; }
    .session-result { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; min-width: 28px; }
    .session-result.won  { color: #4caf50; }
    .session-result.lost { color: #e74c3c; }
    .session-info { flex: 1; }
    .session-del { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:0.8rem; padding:2px 4px; }
    .session-del:hover { color:#e74c3c; }

    /* Log form */
    .pm-form-section { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
    .pm-form-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
    .pm-form-row label { font-size: 0.72rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; }
    .level-btns { display: flex; gap: 4px; flex-wrap: wrap; }
    .level-btn {
      width: 32px; height: 32px; border-radius: 6px;
      border: 1.5px solid var(--border); background: var(--card-bg2);
      color: var(--text-muted); font-size: 0.82rem; font-weight: 700;
      cursor: pointer; transition: all 0.12s;
    }
    .level-btn:hover { border-color: var(--accent-blue); color: var(--text); }
    .level-btn.active { background: var(--accent-blue); border-color: var(--accent-blue); color: #fff; }
    .result-btns { display: flex; gap: 8px; }
    .result-btn {
      flex: 1; padding: 8px; border-radius: 7px;
      border: 1.5px solid var(--border); background: var(--card-bg2);
      font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: all 0.12s;
    }
    .result-btn.won-btn  { color: #4caf50; }
    .result-btn.lost-btn { color: #e74c3c; }
    .result-btn.won-btn.active  { background: rgba(76,175,80,0.18); border-color: #4caf50; }
    .result-btn.lost-btn.active { background: rgba(231,76,60,0.18);  border-color: #e74c3c; }
    .stocks-btns { display: flex; gap: 6px; }
    .stock-btn {
      width: 36px; height: 36px; border-radius: 7px;
      border: 1.5px solid var(--border); background: var(--card-bg2);
      font-size: 0.9rem; font-weight: 800; cursor: pointer; transition: all 0.12s;
    }
    .stock-btn:hover { border-color: var(--accent-blue); }
    .stock-btn.active { background: var(--accent-blue); border-color: var(--accent-blue); color: #fff; }

    /* CPU char picker */
    .cpu-picker { position: relative; }
    .cpu-picker input {
      width: 100%; padding: 8px 10px;
      background: var(--card-bg2); border: 1px solid var(--border);
      border-radius: 7px; color: var(--text); font-size: 0.88rem;
      box-sizing: border-box;
    }
    .cpu-picker input:focus { outline: none; border-color: var(--accent-blue); }
    .cpu-drop {
      display: none; position: absolute; top: 100%; left: 0; right: 0;
      background: #1a1a2e; border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px; z-index: 50; max-height: 160px; overflow-y: auto;
      margin-top: 2px; box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }
    .cpu-drop-item { padding: 7px 10px; cursor: pointer; font-size: 0.85rem; }
    .cpu-drop-item:hover { background: rgba(0,119,200,0.2); color: var(--accent-blue); }

    /* Matchup breakdown */
    .matchup-bar { display:flex; align-items:center; gap:8px; font-size:0.78rem; padding:4px 0; }
    .matchup-name { width: 110px; flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .matchup-track { flex:1; height:5px; background:var(--border); border-radius:3px; overflow:hidden; }
    .matchup-fill  { height:100%; border-radius:3px; }
    .matchup-pct   { width: 32px; text-align:right; color:var(--text-muted); flex-shrink:0; }

    @media (max-width: 620px) {
      .pm-box { flex-direction: column; max-height: 95vh; }
      .pm-left { width: 100%; flex-direction: row; flex-wrap: wrap; padding: 12px; border-right: none; border-bottom: 1px solid var(--border); gap: 12px; justify-content: flex-start; }
      .pm-char-img { width: 72px; height: 72px; }
      .pm-char-name { font-size: 0.88rem; text-align: left; }
      .pm-summary { text-align: left; }
    }
  </style>
</head>
<body>
<script>requireAuth();</script>
<div id="toast-container"></div>
<nav class="navbar" id="main-nav"></nav>

<main class="page-container">
  <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
    <div>
      <h1>🎮 Practice Tracker</h1>
      <p style="color:var(--text-muted);font-size:0.88rem;">Track your CPU practice sessions by character.</p>
    </div>
    <input id="charSearch" type="text" placeholder="Search character…" oninput="filterGrid()"
      style="padding:8px 12px;background:var(--card-bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.88rem;width:200px;" />
  </div>

  <div id="practiceGrid" class="practice-grid"></div>
</main>

<!-- Practice modal -->
<div id="practiceModal">
  <div class="pm-box">
    <!-- Left: character + skins -->
    <div class="pm-left">
      <img class="pm-char-img" id="pmCharImg" src="" alt="" onerror="this.style.opacity='0.3'" />
      <div class="pm-char-name" id="pmCharName"></div>
      <div class="pm-summary" id="pmSummary">Loading…</div>
      <div class="alt-label">Alts</div>
      <div class="alt-strip" id="altStrip"></div>
    </div>

    <!-- Right: stats + form -->
    <div class="pm-right">
      <div class="pm-header">
        <h2 id="pmTitle">Practice</h2>
        <button class="pm-close" onclick="closeModal()">✕</button>
      </div>

      <div class="pm-body">
        <!-- Stats summary -->
        <div>
          <div class="pm-form-section">Training Stats</div>
          <div class="pm-stats-row" id="pmStatsRow">
            <div class="pm-stat-box"><div class="pm-stat-val" id="pmStatTotal">—</div><div class="pm-stat-lbl">Sessions</div></div>
            <div class="pm-stat-box"><div class="pm-stat-val" style="color:#4caf50;" id="pmStatWins">—</div><div class="pm-stat-lbl">Wins</div></div>
            <div class="pm-stat-box"><div class="pm-stat-val" style="color:#e74c3c;" id="pmStatLosses">—</div><div class="pm-stat-lbl">Losses</div></div>
            <div class="pm-stat-box"><div class="pm-stat-val" style="color:var(--accent-gold);" id="pmStatWinPct">—</div><div class="pm-stat-lbl">Win %</div></div>
          </div>
        </div>

        <!-- Matchup breakdown -->
        <div id="pmMatchups" style="display:none;">
          <div class="pm-form-section">Matchup Breakdown</div>
          <div id="pmMatchupList"></div>
        </div>

        <!-- Recent sessions -->
        <div id="pmSessionsWrap" style="display:none;">
          <div class="pm-form-section">Recent Sessions</div>
          <div id="pmSessionList"></div>
        </div>

        <!-- Divider -->
        <div style="border-top:1px solid var(--border);"></div>

        <!-- Log session form -->
        <div>
          <div class="pm-form-section">Log Session</div>

          <div class="pm-form-row">
            <label>CPU Character</label>
            <div class="cpu-picker">
              <input type="text" id="cpuCharInput" placeholder="Search character…" autocomplete="off"
                oninput="filterCpuDrop()" onfocus="openCpuDrop()" onblur="closeCpuDropDelay()" />
              <div class="cpu-drop" id="cpuDrop"></div>
            </div>
          </div>

          <div class="pm-form-row">
            <label>CPU Level</label>
            <div class="level-btns" id="levelBtns"></div>
          </div>

          <div class="pm-form-row">
            <label>Result</label>
            <div class="result-btns">
              <button class="result-btn won-btn active" id="btnWon"  onclick="setResult(true)">✅ Won</button>
              <button class="result-btn lost-btn"       id="btnLost" onclick="setResult(false)">❌ Lost</button>
            </div>
          </div>

          <div class="pm-form-row" id="myStocksRow">
            <label>My Stocks Left</label>
            <div class="stocks-btns" id="myStocksBtns"></div>
          </div>

          <div class="pm-form-row" id="cpuStocksRow" style="display:none;">
            <label>CPU Stocks Left</label>
            <div class="stocks-btns" id="cpuStocksBtns"></div>
          </div>

          <div class="pm-form-row">
            <label>Notes (optional)</label>
            <textarea id="sessionNotes" maxlength="500" rows="2"
              placeholder="e.g. Work on up-air combos, shield punish…"
              style="width:100%;padding:8px 10px;background:var(--card-bg2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:0.85rem;resize:vertical;box-sizing:border-box;font-family:inherit;"></textarea>
          </div>

          <button class="btn btn-primary" onclick="logSession()" id="btnLogSession" style="width:100%;">Log Session</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/chars.js"></script>
<script src="js/nav-inject.js"></script>
<script src="js/nav.js"></script>
<script>
  const ROSTER = SMASH_ROSTER;

  let mySkins = {};
  let practiceCounts = {};   // { character: { total, wins } }
  let activeChar = null;
  let selectedAlt = 1;
  let selectedLevel = 9;
  let selectedWon = true;
  let selectedMyStocks = 3;
  let selectedCpuStocks = 0;
  let cpuCharValue = '';

  // ── Grid ─────────────────────────────────────────
  function buildGrid(filter = '') {
    const container = document.getElementById('practiceGrid');
    const q = filter.toLowerCase();
    container.innerHTML = ROSTER
      .filter(c => !q || c.toLowerCase().includes(q))
      .map(char => {
        const info = practiceCounts[char];
        const count = info ? info.total : 0;
        const alt = (mySkins[char] || 0) + 1;
        const imgUrl = typeof charAltImgUrl === 'function' ? charAltImgUrl(char, alt) : charImgUrl(char);
        return `<div class="ptile${count > 0 ? ' has-sessions' : ''}" onclick="openModal('${char.replace(/'/g, "\\'")}')">
          <img src="${imgUrl}" alt="${char}" onerror="this.src='${charImgUrl(char)}'" />
          <div class="ptile-name">${char}</div>
          ${count > 0 ? `<div class="ptile-count">${count} session${count !== 1 ? 's' : ''}</div>` : ''}
        </div>`;
      }).join('');
  }

  function filterGrid() {
    buildGrid(document.getElementById('charSearch').value);
  }

  // ── Modal ─────────────────────────────────────────
  async function openModal(char) {
    activeChar = char;
    selectedAlt = (mySkins[char] || 0) + 1;

    document.getElementById('pmCharName').textContent = char;
    document.getElementById('pmTitle').textContent = `${char} — Practice`;
    updateCharImg();
    buildAltStrip(char);
    document.getElementById('practiceModal').classList.add('open');
    document.body.style.overflow = 'hidden';

    // Reset form
    setResult(true);
    setLevel(9);
    setMyStocks(3);
    setCpuStocks(0);
    document.getElementById('cpuCharInput').value = '';
    cpuCharValue = '';
    document.getElementById('sessionNotes').value = '';

    await loadStats(char);
    await loadSessions(char);
  }

  function closeModal() {
    document.getElementById('practiceModal').classList.remove('open');
    document.body.style.overflow = '';
    activeChar = null;
  }

  document.getElementById('practiceModal').addEventListener('click', e => {
    if (e.target === document.getElementById('practiceModal')) closeModal();
  });

  function updateCharImg() {
    const img = document.getElementById('pmCharImg');
    const url = typeof charAltImgUrl === 'function' ? charAltImgUrl(activeChar, selectedAlt) : charImgUrl(activeChar);
    img.src = url;
    img.onerror = () => { img.src = charImgUrl(activeChar); };
  }

  function buildAltStrip(char) {
    const strip = document.getElementById('altStrip');
    strip.innerHTML = Array.from({length: 8}, (_, i) => {
      const alt = i + 1;
      const url = typeof charAltImgUrl === 'function' ? charAltImgUrl(char, alt) : charImgUrl(char);
      return `<button class="alt-btn${alt === selectedAlt ? ' active' : ''}" data-alt="${alt}" onclick="selectAlt(${alt})">
        <img src="${url}" alt="${alt}" onerror="this.parentElement.style.display='none'" />
      </button>`;
    }).join('');
  }

  function selectAlt(alt) {
    selectedAlt = alt;
    document.querySelectorAll('.alt-btn').forEach(b => b.classList.toggle('active', +b.dataset.alt === alt));
    updateCharImg();
  }

  async function loadStats(char) {
    document.getElementById('pmSummary').textContent = 'Loading…';
    try {
      const s = await apiGet(`/practice/stats?character=${encodeURIComponent(char)}`);
      document.getElementById('pmStatTotal').textContent   = s.total;
      document.getElementById('pmStatWins').textContent    = s.wins;
      document.getElementById('pmStatLosses').textContent  = s.losses;
      document.getElementById('pmStatWinPct').textContent  = s.win_pct != null ? s.win_pct + '%' : '—';
      document.getElementById('pmSummary').textContent     = s.total
        ? `${s.wins}W ${s.losses}L (${s.win_pct}%)`
        : 'No sessions yet';

      // Matchup breakdown
      const matchups = s.matchups || {};
      const muEntries = Object.entries(matchups).sort((a, b) => b[1].total - a[1].total).slice(0, 8);
      if (muEntries.length) {
        document.getElementById('pmMatchups').style.display = 'block';
        document.getElementById('pmMatchupList').innerHTML = muEntries.map(([cpu, m]) => {
          const pct = m.total ? Math.round(m.wins / m.total * 100) : 0;
          const col = pct >= 60 ? '#4caf50' : pct >= 40 ? 'var(--accent-gold)' : '#e74c3c';
          return `<div class="matchup-bar">
            <div class="matchup-name">${escHtml(cpu)}</div>
            <div class="matchup-track"><div class="matchup-fill" style="width:${pct}%;background:${col};"></div></div>
            <div class="matchup-pct" style="color:${col};">${pct}%</div>
            <div style="font-size:0.72rem;color:var(--text-muted);min-width:36px;text-align:right;">${m.total}g</div>
          </div>`;
        }).join('');
      } else {
        document.getElementById('pmMatchups').style.display = 'none';
      }
    } catch (_) {
      document.getElementById('pmSummary').textContent = 'No sessions yet';
    }
  }

  async function loadSessions(char) {
    try {
      const sessions = await apiGet(`/practice/sessions?character=${encodeURIComponent(char)}&limit=10`);
      if (sessions.length) {
        document.getElementById('pmSessionsWrap').style.display = 'block';
        document.getElementById('pmSessionList').innerHTML = sessions.map(s => {
          const date = s.created_at ? new Date(s.created_at).toLocaleDateString() : '';
          const stocks = s.won
            ? `<span style="color:#4caf50;">${s.my_stocks} stocks left</span>`
            : `<span style="color:#e74c3c;">CPU had ${s.cpu_stocks} left</span>`;
          const noteSpan = s.notes ? `<div style="font-size:0.72rem;color:var(--text-muted);margin-top:2px;">${escHtml(s.notes)}</div>` : '';
          return `<div class="session-row" id="sr-${s.id}">
            <span class="session-result ${s.won ? 'won' : 'lost'}">${s.won ? 'WIN' : 'LOSS'}</span>
            <div class="session-info">
              <span style="font-weight:600;">vs ${escHtml(s.cpu_char)}</span>
              <span style="color:var(--text-muted);font-size:0.75rem;"> · Lv${s.cpu_level} · </span>${stocks}
              ${noteSpan}
            </div>
            <span style="font-size:0.72rem;color:var(--text-muted);flex-shrink:0;">${date}</span>
            <button class="session-del" onclick="deleteSession(${s.id})" title="Delete">✕</button>
          </div>`;
        }).join('');
      } else {
        document.getElementById('pmSessionsWrap').style.display = 'none';
      }
    } catch (_) {}
  }

  async function deleteSession(id) {
    try {
      await apiDelete(`/practice/sessions/${id}`);
      document.getElementById(`sr-${id}`)?.remove();
      if (!document.querySelector('.session-row')) {
        document.getElementById('pmSessionsWrap').style.display = 'none';
      }
      // Refresh stats and grid count
      if (activeChar) {
        await loadStats(activeChar);
        await refreshCounts();
        buildGrid(document.getElementById('charSearch').value);
      }
    } catch (err) {
      showToast('Error: ' + err.message, 'error');
    }
  }

  // ── Form controls ─────────────────────────────────
  function buildLevelBtns() {
    document.getElementById('levelBtns').innerHTML = Array.from({length: 9}, (_, i) => {
      const lv = i + 1;
      return `<button class="level-btn${lv === selectedLevel ? ' active' : ''}" onclick="setLevel(${lv})">${lv}</button>`;
    }).join('');
  }

  function setLevel(lv) {
    selectedLevel = lv;
    document.querySelectorAll('.level-btn').forEach(b => b.classList.toggle('active', +b.textContent === lv));
  }

  function setResult(won) {
    selectedWon = won;
    document.getElementById('btnWon').classList.toggle('active', won);
    document.getElementById('btnLost').classList.toggle('active', !won);
    document.getElementById('myStocksRow').style.display  = won  ? '' : 'none';
    document.getElementById('cpuStocksRow').style.display = !won ? '' : 'none';
  }

  function buildStockBtns(containerId, selected, setter) {
    document.getElementById(containerId).innerHTML = [1, 2, 3].map(n =>
      `<button class="stock-btn${n === selected ? ' active' : ''}" onclick="${setter}(${n})">${n}</button>`
    ).join('');
  }

  function setMyStocks(n) {
    selectedMyStocks = n;
    document.querySelectorAll('#myStocksBtns .stock-btn').forEach(b => b.classList.toggle('active', +b.textContent === n));
  }

  function setCpuStocks(n) {
    selectedCpuStocks = n;
    document.querySelectorAll('#cpuStocksBtns .stock-btn').forEach(b => b.classList.toggle('active', +b.textContent === n));
  }

  // ── CPU char picker ───────────────────────────────
  function filterCpuDrop() {
    const q = document.getElementById('cpuCharInput').value.toLowerCase();
    cpuCharValue = '';
    const drop = document.getElementById('cpuDrop');
    const matches = ROSTER.filter(c => !q || c.toLowerCase().includes(q));
    drop.innerHTML = matches.map(c =>
      `<div class="cpu-drop-item" onmousedown="pickCpuChar('${c.replace(/'/g, "\\'")}')">${escHtml(c)}</div>`
    ).join('');
    drop.style.display = matches.length ? 'block' : 'none';
  }

  function openCpuDrop() {
    filterCpuDrop();
  }

  function closeCpuDropDelay() {
    setTimeout(() => { document.getElementById('cpuDrop').style.display = 'none'; }, 200);
  }

  function pickCpuChar(char) {
    cpuCharValue = char;
    document.getElementById('cpuCharInput').value = char;
    document.getElementById('cpuDrop').style.display = 'none';
  }

  // ── Log session ───────────────────────────────────
  async function logSession() {
    if (!activeChar) return;
    const cpu = cpuCharValue || document.getElementById('cpuCharInput').value.trim();
    if (!cpu || !ROSTER.includes(cpu)) { showToast('Pick a valid CPU character.', 'warn'); return; }

    const btn = document.getElementById('btnLogSession');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      await apiPost('/practice/sessions', {
        my_char: activeChar,
        cpu_char: cpu,
        cpu_level: selectedLevel,
        my_stocks: selectedWon ? selectedMyStocks : 0,
        cpu_stocks: selectedWon ? 0 : selectedCpuStocks,
        won: selectedWon,
        notes: document.getElementById('sessionNotes').value.trim() || null,
      });
      document.getElementById('sessionNotes').value = '';
      showToast('Session logged!', 'success');
      await loadStats(activeChar);
      await loadSessions(activeChar);
      await refreshCounts();
      buildGrid(document.getElementById('charSearch').value);
    } catch (err) {
      showToast('Error: ' + err.message, 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Log Session';
    }
  }

  // ── Data loading ──────────────────────────────────
  async function refreshCounts() {
    try {
      const s = await apiGet('/practice/stats');
      practiceCounts = s.chars || {};
    } catch (_) {}
  }

  // ── Init ──────────────────────────────────────────
  (async function init() {
    try {
      const me = await apiGet('/users/me');
      if (me) {
        document.getElementById('navUsername').textContent = me.username;
        const av = document.getElementById('navAvatar');
        av.src = me.avatar_url || `https://api.dicebear.com/9.x/pixel-art/svg?seed=${encodeURIComponent(me.username)}`;
        av.style.display = 'block';
      }
    } catch (_) {}

    // Load skins + practice counts in parallel
    await Promise.allSettled([
      apiGet('/characters/skins').then(d => { mySkins = d.skins || {}; }).catch(() => {}),
      refreshCounts(),
    ]);

    buildGrid();
    buildLevelBtns();
    buildStockBtns('myStocksBtns',  selectedMyStocks,  'setMyStocks');
    buildStockBtns('cpuStocksBtns', selectedCpuStocks, 'setCpuStocks');
  })();
</script>
</body>
</html>
