services:
  - type: web
    name: smash-bracket-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
  - type: web
    name: smash-bracket-ui
    env: static
    staticPublishPath: web
