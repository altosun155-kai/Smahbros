<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smash Bracket — Tier List</title>
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/auth.js"></script>
  <style>
    .tier-board { max-width: 960px; }
    .tier-row { display: flex; align-items: stretch; margin-bottom: 4px; border-radius: 6px; overflow: hidden; border: 1px solid var(--border); min-height: 72px; }
    .tier-label { width: 58px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; font-weight: 900; color: #111; user-select: none; }
    .tier-zone { flex: 1; display: flex; flex-wrap: wrap; gap: 3px; padding: 8px; background: var(--card-bg2); min-height: 72px; transition: background 0.12s; }
    .tier-zone.drag-over { background: rgba(0,119,200,0.15); outline: 2px dashed rgba(0,119,200,0.6); outline-offset: -2px; }

    .char-tile { width: 54px; height: 54px; border-radius: 4px; cursor: grab; overflow: hidden; border: 2px solid transparent; transition: border-color 0.1s, transform 0.1s, opacity 0.1s; flex-shrink: 0; background: var(--card-bg); }
    .char-tile:hover { border-color: rgba(255,255,255,0.4); transform: scale(1.1); z-index: 2; }
    .char-tile.dragging { opacity: 0.35; cursor: grabbing; }
    .drop-indicator { width: 3px; height: 54px; background: var(--accent-blue); border-radius: 2px; flex-shrink: 0; pointer-events: none; }
    .char-tile img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; display: block; }
    .char-tile .char-fallback { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 0.55rem; font-weight: 700; color: var(--text); text-align: center; padding: 2px; line-height: 1.2; }

    .unranked-section { margin-top: 20px; }
    .unranked-label { font-size: 0.73rem; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
    .unranked-search { width: 100%; max-width: 280px; padding: 7px 12px; background: var(--card-bg2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.85rem; margin-bottom: 8px; box-sizing: border-box; }
    .unranked-search:focus { outline: none; border-color: var(--accent-blue); }
    .unranked-search::placeholder { color: rgba(255,255,255,0.25); }
    .unranked-zone { display: flex; flex-wrap: wrap; gap: 3px; padding: 10px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; min-height: 72px; transition: background 0.12s; }
    .unranked-zone.drag-over { background: rgba(255,255,255,0.04); outline: 2px dashed rgba(255,255,255,0.15); outline-offset: -2px; }

    .top-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
    .last-saved { font-size: 0.82rem; color: var(--text-muted); }

    /* Viewed tier list */
    .vt-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
    .vt-label { width: 40px; height: 40px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1rem; color: #111; flex-shrink: 0; }
    .vt-tile { width: 44px; height: 44px; border-radius: 4px; overflow: hidden; background: var(--card-bg2); border: 1px solid var(--border); flex-shrink: 0; }
    .vt-tile img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .vt-tile .char-fallback { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 0.5rem; font-weight: 700; color: var(--text); text-align: center; padding: 2px; line-height: 1.2; }

    .view-user-row { display: flex; gap: 10px; max-width: 400px; margin-bottom: 20px; }
    .view-user-row input { flex: 1; }

    /* Tap-to-assign (mobile) */
    .char-tile.tap-selected {
      border-color: var(--accent-blue) !important;
      box-shadow: 0 0 10px rgba(0,119,200,0.6);
      transform: scale(1.15);
      z-index: 5;
    }
    .tier-zone.tap-target, .unranked-zone.tap-target {
      outline: 2px dashed var(--accent-blue);
      outline-offset: -2px;
      background: rgba(0,119,200,0.08);
      cursor: pointer;
    }
    #tapModeBar {
      display: none;
      position: fixed;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent-blue);
      color: #fff;
      border-radius: 20px;
      padding: 8px 20px;
      font-size: 0.82rem;
      font-weight: 700;
      z-index: 500;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }
    @media (max-width: 700px) {
      .unranked-zone { gap: 4px; }
      .char-tile { width: 60px !important; height: 60px !important; }
      .tier-label { width: 44px; font-size: 1.3rem; }
    }
  </style>
</head>
<body>
<script>requireAuth();</script>
<div id="toast-container"></div>

<nav class="navbar" id="main-nav"></nav>

<main class="page-container">
  <div class="page-header">
    <h1>🎖️ My Tier List</h1>
    <p>Drag character icons into tiers. Hover a character to see their name.</p>
  </div>

  <div id="loadingState" class="loading-center">
    <div class="spinner"></div><span>Loading tier list…</span>
  </div>

  <div id="tierContent" style="display:none;">
    <div class="top-bar">
      <button class="btn btn-primary" onclick="saveTierList()">Save Tier List</button>
      <button class="btn btn-outline" onclick="resetTierList()">Reset All</button>
      <span class="last-saved" id="lastSaved"></span>
    </div>
    <div id="tapModeBar">Tap a tier to place — tap again to cancel</div>

    <div class="tier-board" id="tierBoard"></div>

    <hr class="section-divider" style="margin-top:32px;" />
    <h2 style="font-size:1.05rem;font-weight:700;color:var(--text);margin-bottom:14px;">View someone else's tier list</h2>
    <div class="view-user-row">
      <input type="text" id="viewUserInput" placeholder="Enter username…" />
      <button class="btn btn-outline" onclick="viewUserTierList()">View</button>
    </div>
    <div id="viewedTierContainer" style="display:none;">
      <h3 id="viewedTierTitle" style="font-size:0.95rem;font-weight:700;color:var(--text);margin-bottom:12px;"></h3>
      <div id="viewedTierList"></div>
    </div>
  </div>
</main>

<script src="js/api.js"></script>
<script src="js/friends-sidebar.js"></script>
<script src="js/nav-inject.js"></script>
<script src="js/nav.js"></script>
<script src="js/chars.js"></script>
<script>
  const ROSTER = ["Mario","Donkey Kong","Link","Samus","Dark Samus","Yoshi","Kirby","Fox","Pikachu","Luigi","Ness","Captain Falcon","Jigglypuff","Peach","Daisy","Bowser","Ice Climbers","Sheik","Zelda","Dr. Mario","Pichu","Falco","Marth","Lucina","Young Link","Ganondorf","Mewtwo","Roy","Chrom","Mr. Game & Watch","Meta Knight","Pit","Dark Pit","Zero Suit Samus","Wario","Snake","Ike","Pokémon Trainer","Diddy Kong","Lucas","Sonic","King Dedede","Olimar","Lucario","R.O.B.","Toon Link","Wolf","Villager","Mega Man","Wii Fit Trainer","Rosalina & Luma","Little Mac","Greninja","Mii Brawler","Mii Swordfighter","Mii Gunner","Palutena","Pac-Man","Robin","Shulk","Bowser Jr.","Duck Hunt","Ryu","Ken","Cloud","Corrin","Bayonetta","Inkling","Ridley","Simon","Richter","King K. Rool","Isabelle","Incineroar","Piranha Plant","Joker","Hero","Banjo & Kazooie","Terry","Byleth","Min Min","Steve","Sephiroth","Pyra/Mythra","Kazuya","Sora"];

  const TIERS = ['S','A','B','C','D','F'];
  const TIER_COLORS = {S:'#ff7f7f',A:'#ffbf7f',B:'#ffff7f',C:'#7fff7f',D:'#7fbfff',F:'#bf7fff'};

  let tierMap = {}; // char -> 'S'|'A'|'B'|'C'|'D'|'F'|'unranked'
  let draggedChar = null;

  // ── Tile factory ─────────────────────────────────
  function makeTile(char, size = 54) {
    const tile = document.createElement('div');
    tile.className = 'char-tile';
    tile.draggable = true;
    tile.dataset.char = char;
    tile.title = char;
    tile.style.width = tile.style.height = size + 'px';

    const url = typeof charImgUrl === 'function' ? charImgUrl(char) : null;
    if (url) {
      const img = document.createElement('img');
      img.src = url;
      img.alt = char;
      img.onerror = () => {
        img.remove();
        addFallback(tile, char);
      };
      tile.appendChild(img);
    } else {
      addFallback(tile, char);
    }

    tile.addEventListener('dragstart', e => {
      draggedChar = char;
      tile.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    tile.addEventListener('dragend', () => {
      tile.classList.remove('dragging');
      draggedChar = null;
    });

    // Tap-to-assign for touch devices
    tile.addEventListener('click', () => {
      if (!isTouchDevice()) return;
      if (tapSelectedChar === char) { clearTapMode(); return; }
      clearTapMode();
      tapSelectedChar = char;
      tile.classList.add('tap-selected');
      document.querySelectorAll('.tier-zone, .unranked-zone').forEach(z => z.classList.add('tap-target'));
      document.getElementById('tapModeBar').style.display = 'block';
    });

    return tile;
  }

  // ── Tap-to-assign state ───────────────────────────
  let tapSelectedChar = null;

  function isTouchDevice() {
    return window.matchMedia('(max-width: 700px)').matches;
  }

  function clearTapMode() {
    tapSelectedChar = null;
    document.querySelectorAll('.char-tile.tap-selected').forEach(t => t.classList.remove('tap-selected'));
    document.querySelectorAll('.tier-zone, .unranked-zone').forEach(z => z.classList.remove('tap-target'));
    document.getElementById('tapModeBar').style.display = 'none';
  }

  function addFallback(tile, char) {
    const fb = document.createElement('div');
    fb.className = 'char-fallback';
    fb.textContent = char.length > 6 ? char.slice(0, 5) + '…' : char;
    tile.appendChild(fb);
  }

  // ── Drop zone setup (with positional insert) ─────
  let indicator = null;

  function getInsertTarget(zone, clientX, clientY) {
    // Returns the tile we should insert BEFORE, or null to append.
    // Must handle multi-row wrap: first identify which visual row the cursor
    // is closest to, then do the X-midpoint check only within that row.
    const tiles = [...zone.querySelectorAll('.char-tile:not(.dragging)')];
    if (!tiles.length) return null;

    // Group tiles into visual rows by their top-edge (allow 10px tolerance)
    const rows = [];
    for (const tile of tiles) {
      const rect = tile.getBoundingClientRect();
      const top = rect.top;
      let placed = false;
      for (const row of rows) {
        if (Math.abs(row.top - top) <= 10) {
          row.tiles.push({ tile, rect });
          placed = true;
          break;
        }
      }
      if (!placed) rows.push({ top, tiles: [{ tile, rect }] });
    }

    // Find the row whose vertical midpoint is closest to the cursor
    let bestRow = rows[0];
    let bestDist = Infinity;
    for (const row of rows) {
      const mid = row.tiles[0].rect.top + row.tiles[0].rect.height / 2;
      const dist = Math.abs(clientY - mid);
      if (dist < bestDist) { bestDist = dist; bestRow = row; }
    }

    // Within that row, find the first tile whose left-midpoint is right of the cursor
    for (const { tile, rect } of bestRow.tiles) {
      if (clientX < rect.left + rect.width / 2) return tile;
    }

    // Cursor is after all tiles in this row — insert before the first tile of the next row
    const rowIdx = rows.indexOf(bestRow);
    if (rowIdx < rows.length - 1) return rows[rowIdx + 1].tiles[0].tile;

    return null; // append to very end
  }

  function showIndicator(zone, beforeEl) {
    if (!indicator) {
      indicator = document.createElement('div');
      indicator.className = 'drop-indicator';
    }
    if (beforeEl) {
      zone.insertBefore(indicator, beforeEl);
    } else {
      zone.appendChild(indicator);
    }
  }

  function removeIndicator() {
    indicator?.remove();
  }

  function setupDropZone(zone) {
    zone.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      zone.classList.add('drag-over');
      showIndicator(zone, getInsertTarget(zone, e.clientX, e.clientY));
    });
    zone.addEventListener('dragleave', e => {
      if (!zone.contains(e.relatedTarget)) {
        zone.classList.remove('drag-over');
        removeIndicator();
      }
    });
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('drag-over');
      removeIndicator();
      if (!draggedChar) return;
      const newTier = zone.dataset.tier;
      tierMap[draggedChar] = newTier;
      const tile = document.querySelector(`.char-tile[data-char="${CSS.escape(draggedChar)}"]`);
      if (!tile) return;
      const before = getInsertTarget(zone, e.clientX, e.clientY);
      if (before) zone.insertBefore(tile, before);
      else zone.appendChild(tile);
    });

    // Tap-to-assign: tapping a zone places the selected character there
    zone.addEventListener('click', () => {
      if (!tapSelectedChar) return;
      const char = tapSelectedChar;
      const newTier = zone.dataset.tier;
      tierMap[char] = newTier;
      const tile = document.querySelector(`.char-tile[data-char="${CSS.escape(char)}"]`);
      if (tile) zone.appendChild(tile);
      clearTapMode();
    });
  }

  // ── Build the board ───────────────────────────────
  function buildBoard() {
    const board = document.getElementById('tierBoard');
    board.innerHTML = '';

    TIERS.forEach(tier => {
      const row = document.createElement('div');
      row.className = 'tier-row';

      const label = document.createElement('div');
      label.className = 'tier-label';
      label.style.background = TIER_COLORS[tier];
      label.textContent = tier;

      const zone = document.createElement('div');
      zone.className = 'tier-zone';
      zone.id = `zone-${tier}`;
      zone.dataset.tier = tier;
      setupDropZone(zone);

      row.appendChild(label);
      row.appendChild(zone);
      board.appendChild(row);
    });

    // Unranked pool
    const unrankedSection = document.createElement('div');
    unrankedSection.className = 'unranked-section';
    const unrankedLabel = document.createElement('div');
    unrankedLabel.className = 'unranked-label';
    unrankedLabel.textContent = 'Unranked — drag into a tier above';

    const unrankedSearch = document.createElement('input');
    unrankedSearch.type = 'text';
    unrankedSearch.className = 'unranked-search';
    unrankedSearch.placeholder = 'Search characters…';
    unrankedSearch.id = 'unrankedSearch';
    unrankedSearch.addEventListener('input', () => {
      const q = unrankedSearch.value.trim().toLowerCase();
      document.querySelectorAll('#zone-unranked .char-tile').forEach(tile => {
        tile.style.display = !q || tile.dataset.char.toLowerCase().includes(q) ? '' : 'none';
      });
    });

    const unrankedZone = document.createElement('div');
    unrankedZone.className = 'unranked-zone';
    unrankedZone.id = 'zone-unranked';
    unrankedZone.dataset.tier = 'unranked';
    setupDropZone(unrankedZone);
    unrankedSection.appendChild(unrankedLabel);
    unrankedSection.appendChild(unrankedSearch);
    unrankedSection.appendChild(unrankedZone);
    board.appendChild(unrankedSection);

    // Place all characters into their zones
    ROSTER.forEach(char => {
      const tier = tierMap[char] || 'unranked';
      const zone = document.getElementById(`zone-${tier}`) || document.getElementById('zone-unranked');
      zone.appendChild(makeTile(char));
    });
  }

  // ── Serialisation ─────────────────────────────────
  function rankingToTierMap(ranking) {
    const map = {};
    const tierIdx = {S:'S',A:'A',B:'B',C:'C',D:'D',F:'F'};
    Object.entries(ranking).forEach(([tier, chars]) => {
      const t = tierIdx[tier];
      if (t) chars.forEach(c => { map[c] = t; });
    });
    return map;
  }

  function tierMapToRanking() {
    // Read DOM order so left-to-right position within a tier is preserved
    const ranking = {S:[],A:[],B:[],C:[],D:[],F:[],unranked:[]};
    TIERS.concat(['unranked']).forEach(tier => {
      const zone = document.getElementById(`zone-${tier}`);
      if (!zone) return;
      zone.querySelectorAll('.char-tile').forEach(tile => {
        const t = tier in ranking ? tier : 'unranked';
        ranking[t].push(tile.dataset.char);
      });
    });
    return ranking;
  }

  // ── Save / Reset ──────────────────────────────────
  async function saveTierList() {
    try {
      await apiPut('/characters/ranking', { ranking: tierMapToRanking() });
      showToast('Tier list saved!', 'success');
      document.getElementById('lastSaved').textContent = 'Last saved: just now';
    } catch (err) {
      showToast('Error saving: ' + err.message, 'error');
    }
  }

  function resetTierList() {
    if (!confirm('Move all characters back to Unranked?')) return;
    ROSTER.forEach(c => { tierMap[c] = 'unranked'; });
    buildBoard();
  }

  // ── View another user ─────────────────────────────
  async function viewUserTierList() {
    const username = document.getElementById('viewUserInput').value.trim();
    if (!username) { showToast('Enter a username.', 'warn'); return; }
    try {
      const data = await apiGet(`/characters/ranking/${username}`);
      document.getElementById('viewedTierContainer').style.display = 'block';
      document.getElementById('viewedTierTitle').textContent = `${data.username}'s Tier List`;
      const container = document.getElementById('viewedTierList');
      container.innerHTML = '';
      TIERS.forEach(tier => {
        const chars = (data.ranking || {})[tier] || [];
        if (!chars.length) return;
        const row = document.createElement('div');
        row.className = 'vt-row';
        const lbl = document.createElement('div');
        lbl.className = 'vt-label';
        lbl.style.background = TIER_COLORS[tier];
        lbl.textContent = tier;
        row.appendChild(lbl);
        chars.forEach(char => {
          const tile = document.createElement('div');
          tile.className = 'vt-tile';
          tile.title = char;
          const url = typeof charImgUrl === 'function' ? charImgUrl(char) : null;
          if (url) {
            const img = document.createElement('img');
            img.src = url; img.alt = char;
            img.onerror = () => { img.remove(); addFallback(tile, char); };
            tile.appendChild(img);
          } else {
            addFallback(tile, char);
          }
          row.appendChild(tile);
        });
        container.appendChild(row);
      });
    } catch (err) {
      showToast('Error loading tier list: ' + err.message, 'error');
    }
  }

  // ── Init ──────────────────────────────────────────
  (async function init() {
    try {
      const me = await apiGet('/users/me');
      if (me) {
        document.getElementById('navUsername').textContent = me.username;
        const url = me.avatar_url || `https://api.dicebear.com/9.x/pixel-art/svg?seed=${encodeURIComponent(me.username)}`;
        const av = document.getElementById('navAvatar');
        av.src = url; av.style.display = 'block';
      }
    } catch (_) {}

    try {
      const data = await apiGet('/characters/ranking');
      if (data && data.ranking) {
        tierMap = rankingToTierMap(data.ranking);
        if (data.updated_at) {
          document.getElementById('lastSaved').textContent =
            'Last saved: ' + new Date(data.updated_at).toLocaleString();
        }
      }
    } catch (_) {}

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('tierContent').style.display = 'block';
    buildBoard();
  })();
</script>
</body>
</html>
