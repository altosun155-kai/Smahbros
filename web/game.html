<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boomerang Arena — Smahbros</title>
  <script src="js/auth.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background:
        radial-gradient(ellipse 120% 45% at 50% -8%, rgba(0,55,140,0.38) 0%, transparent 60%),
        #0d0d1a;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* ── Lobby ────────────────────────────────────────── */
    #lobby {
      width: 340px;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 20px;
      padding: 36px 32px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    #lobby h1 {
      font-size: 1.35rem;
      font-weight: 700;
      text-align: center;
      letter-spacing: .02em;
      margin-bottom: 4px;
    }
    #lobby h1 span { color: #4fc3f7; }

    .hint {
      font-size: 0.78rem;
      color: #64748b;
      text-align: center;
      line-height: 1.5;
    }

    #lobby input {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 11px 14px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border-color .15s;
    }
    #lobby input:focus { border-color: rgba(79,195,247,0.55); }
    #lobby input::placeholder { color: #475569; }

    #btn-join {
      background: #4fc3f7;
      color: #0d0d1a;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s;
      margin-top: 2px;
    }
    #btn-join:hover { background: #81d4fa; }

    #status {
      text-align: center;
      font-size: 0.85rem;
      color: #94a3b8;
      min-height: 1.2em;
    }
    #status.err { color: #ef5350; }

    /* ── Controls key legend ─────────────────────────── */
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-top: 4px;
    }
    .ctrl {
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.78rem;
      color: #94a3b8;
    }
    .ctrl strong { color: #e2e8f0; }

    /* ── Game canvas wrapper ─────────────────────────── */
    #game-wrap { display: none; position: relative; }
    #game-wrap canvas { display: block; border-radius: 10px; }
  </style>
</head>
<body>
<script>requireAuth();</script>

<!-- ── Lobby ──────────────────────────────────────────── -->
<div id="lobby">
  <h1>Boomerang <span>Arena</span></h1>
  <p class="hint">Share a Room ID with a friend — first two in win.</p>

  <input id="inp-room" placeholder="Room ID (e.g. lobby1)" autocomplete="off" />
  <input id="inp-user" placeholder="Username" autocomplete="off" />
  <button id="btn-join">Join Room</button>
  <div id="status"></div>

  <div class="controls">
    <div class="ctrl"><strong>WASD</strong> — move</div>
    <div class="ctrl"><strong>Right-click</strong> — throw</div>
    <div class="ctrl"><strong>Left-click</strong> — slash</div>
    <div class="ctrl"><strong>3 HP</strong> — last one standing</div>
  </div>
</div>

<!-- ── Phaser canvas ─────────────────────────────────── -->
<div id="game-wrap"></div>

<script>
const WS_BASE = 'wss://smash-bracket-api.onrender.com';
const token   = localStorage.getItem('authToken') || '';

let ws         = null;
let playerSlot = null;
let phaserGame = null;
let scene      = null;

const lobbyEl  = document.getElementById('lobby');
const gameWrap = document.getElementById('game-wrap');
const statusEl = document.getElementById('status');

// Pre-fill username from stored value
const savedUser = localStorage.getItem('username');
if (savedUser) document.getElementById('inp-user').value = savedUser;

// ── Lobby join ────────────────────────────────────────────────────────────────
document.getElementById('btn-join').addEventListener('click', tryJoin);
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && lobbyEl.style.display !== 'none') tryJoin();
});

function tryJoin() {
  const roomId   = document.getElementById('inp-room').value.trim();
  const username = document.getElementById('inp-user').value.trim() || 'Player';
  if (!roomId) { setStatus('Enter a Room ID.', true); return; }
  connect(roomId, username);
}

function setStatus(msg, isErr = false) {
  statusEl.textContent = msg;
  statusEl.className   = isErr ? 'err' : '';
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connect(roomId, username) {
  setStatus('Connecting…');
  const slowTimer = setTimeout(() =>
    setStatus('Server is waking up — this takes ~30s on first load…'), 4000);

  ws = new WebSocket(`${WS_BASE}/ws/game/${roomId}`);

  ws.onopen = () => {
    clearTimeout(slowTimer);
    ws.send(JSON.stringify({ token, username }));
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);

    if (msg.type === 'error') {
      setStatus(msg.message, true);
      ws.close();
      return;
    }
    if (msg.type === 'joined') {
      playerSlot = msg.slot;
      setStatus(`You are Player ${msg.slot + 1}. Waiting for opponent…`);
    }
    if (msg.type === 'player_joined') {
      setStatus(`${msg.username} joined — starting soon…`);
    }
    if (msg.type === 'start' && !phaserGame) {
      lobbyEl.style.display  = 'none';
      gameWrap.style.display = 'block';
      phaserGame = launchPhaser();
    }
    if (msg.type === 'state' && scene) {
      scene.applyState(msg);
    }
    if (msg.type === 'player_left' && scene) {
      scene.showOverlay('Opponent disconnected');
    }
  };

  ws.onclose = () => {
    if (scene) scene.showOverlay('Disconnected from server');
    else setStatus('Connection closed — server may have rejected the session.', true);
  };
  ws.onerror = () => setStatus('Connection failed — server may be starting up, try again in 30s.', true);
}

// ── Keyboard input ────────────────────────────────────────────────────────────
const held = { up: false, down: false, left: false, right: false };
const KEY_MAP = {
  w: 'up', arrowup: 'up',
  s: 'down', arrowdown: 'down',
  a: 'left', arrowleft: 'left',
  d: 'right', arrowright: 'right',
};

function sendKeys() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'input', keys: { ...held } }));
  }
}

document.addEventListener('keydown', (e) => {
  const k = KEY_MAP[e.key.toLowerCase()];
  if (k && !held[k]) { held[k] = true; sendKeys(); }
});
document.addEventListener('keyup', (e) => {
  const k = KEY_MAP[e.key.toLowerCase()];
  if (k) { held[k] = false; sendKeys(); }
});

document.addEventListener('contextmenu', (e) => e.preventDefault());

// ── Phaser ────────────────────────────────────────────────────────────────────
function launchPhaser() {
  const P_COLORS    = [0x4fc3f7, 0xef5350];
  const HP_COLORS   = [0x4fc3f7, 0xef5350];
  const BOOM_COLORS = [0x81d4fa, 0xff8a80];
  const SLASH_COLORS= [0xb3e5fc, 0xffccbc];

  // Hardcoded dark/bright variants for each player colour (avoids colour-API issues)
  const SPHERE_RIM   = [0x1a5c7c, 0x6b2222];  // darkened cyan / red
  const SPHERE_GLOW  = [0x9edcf8, 0xf7a0a0];  // brightened cyan / red

  // Renders a boomerang: shadow + two-arm body + shine
  function drawBoom(g, bx, by, col) {
    g.fillStyle(0x000000, 0.32);
    g.fillEllipse(bx + 3, by + 11, 17, 5);
    g.fillStyle(col, 1);
    g.fillTriangle(bx, by - 9, bx - 6, by + 4, bx + 1, by + 1);
    g.fillTriangle(bx, by - 9, bx + 6, by + 4, bx - 1, by + 1);
    g.fillStyle(0xffffff, 0.52);
    g.fillCircle(bx - 2, by - 4, 2);
  }

  return new Phaser.Game({
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    backgroundColor: '#06060f',
    parent: 'game-wrap',
    input: { mouse: { preventDefaultDown: true } },
    scene: {
      key: 'GameScene',
      preload() {},

      create() {
        scene = this;

        // ── Floor base ────────────────────────────────
        this.add.rectangle(400, 300, 760, 524, 0x0b1120);

        // ── Perspective grid ──────────────────────────
        const grid = this.add.graphics();
        const VP   = { x: 400, y: 38 };  // vanishing point at top of floor
        const BY   = 562;                  // bottom y of floor

        // Depth lines converging to VP
        grid.lineStyle(1, 0x17243d, 1);
        for (let i = 0; i <= 10; i++) {
          const bx = 20 + i * 76;
          grid.lineBetween(VP.x, VP.y, bx, BY);
        }

        // Horizontal rows — non-linear spacing (compressed toward top = perspective)
        const rowT = [0, 0.04, 0.10, 0.19, 0.31, 0.46, 0.62, 0.78, 0.91, 1.0];
        for (const t of rowT) {
          const y  = VP.y + t * (BY - VP.y);
          const hw = t * (780 - VP.x);
          grid.lineBetween(VP.x - hw, y, VP.x + hw, y);
        }

        // ── Wall faces (2.5D depth effect) ───────────
        const walls = this.add.graphics();
        // Top face — lighter (ceiling edge visible from slight above angle)
        walls.fillStyle(0x0e1d36, 1);
        walls.fillRect(0, 0, 800, 38);
        // Bottom face — front of wall (slightly lighter = facing viewer)
        walls.fillStyle(0x121f3a, 1);
        walls.fillRect(0, 562, 800, 38);
        // Side faces
        walls.fillStyle(0x0c1830, 1);
        walls.fillRect(0, 38, 20, 524);
        walls.fillRect(780, 38, 20, 524);
        // Edge lines
        walls.lineStyle(2, 0x2e4e82, 1);
        walls.lineBetween(20, 38,  780, 38);
        walls.lineBetween(20, 562, 780, 562);
        walls.lineBetween(20, 38,  20,  562);
        walls.lineBetween(780, 38, 780, 562);
        walls.lineStyle(1, 0x1a3060, 1);
        walls.strokeRect(0, 0, 800, 600);

        // ── Dynamic graphics layers ───────────────────
        this.slashGfx   = this.add.graphics();
        this.boomGfx    = this.add.graphics();
        this.shadowGfx  = this.add.graphics();  // drop shadows — below player circles

        // Player circles (Phaser arc objects — always render correctly)
        this.playerCircles = [
          this.add.arc(200, 300, 22, 0, 360, false, P_COLORS[0]).setClosePath(true),
          this.add.arc(600, 300, 22, 0, 360, false, P_COLORS[1]).setClosePath(true),
        ];

        this.glowGfx = this.add.graphics();  // specular highlight — above player circles

        // ── Name labels ───────────────────────────────
        this.nameLabels = [
          this.add.text(200, 260, '', { fontSize: '11px', color: '#7fa8c8' }).setOrigin(0.5),
          this.add.text(600, 260, '', { fontSize: '11px', color: '#c07878' }).setOrigin(0.5),
        ];

        // ── HP pips ───────────────────────────────────
        this.hpPips = [[], []];
        for (let s = 0; s < 2; s++) {
          for (let i = 0; i < 3; i++) {
            const x = s === 0 ? 30 + i * 15 : 770 - i * 15;
            this.hpPips[s].push(this.add.circle(x, 17, 5, HP_COLORS[s]));
          }
        }

        // ── Cooldown bar ──────────────────────────────
        this.cooldownBg  = this.add.rectangle(400, 578, 120, 4, 0x1a2540);
        this.cooldownBar = this.add.rectangle(340, 578, 0, 4, 0x4fc3f7).setOrigin(0, 0.5);

        // ── Overlay ───────────────────────────────────
        this.overlayBg   = this.add.rectangle(400, 300, 800, 600, 0x000000, 0).setVisible(false);
        this.overlayText = this.add.text(400, 300, '', {
          fontSize: '40px', fontStyle: 'bold', color: '#ffffff',
          stroke: '#000000', strokeThickness: 5,
        }).setOrigin(0.5).setVisible(false);

        // ── Mouse input ───────────────────────────────
        this._pos = [{ x: 200, y: 300 }, { x: 600, y: 300 }];
        this.input.on('pointerdown', (ptr) => {
          if (!ws || ws.readyState !== WebSocket.OPEN || playerSlot === null) return;
          const me = this._pos[playerSlot];
          if (ptr.rightButtonDown()) {
            const dx = ptr.x - me.x, dy = ptr.y - me.y;
            const len = Math.hypot(dx, dy) || 1;
            ws.send(JSON.stringify({ type: 'throw', dx: dx / len, dy: dy / len }));
          } else if (ptr.leftButtonDown()) {
            ws.send(JSON.stringify({ type: 'slash' }));
          }
        });
      },

      update() {},

      applyState(state) {
        // ── HUD ────────────────────────────────────
        state.players.forEach((p, i) => {
          if (!p) return;
          this._pos[i] = { x: p.x, y: p.y };
          this.nameLabels[i].setPosition(p.x, p.y - 34).setText(p.username);
          for (let h = 0; h < 3; h++) {
            this.hpPips[i][h].setAlpha(h < p.hp ? 1 : 0.12);
          }
        });

        // ── Slash flash ────────────────────────────
        this.slashGfx.clear();
        (state.slashing || []).forEach((active, i) => {
          if (!active || !state.players[i]) return;
          const p = state.players[i];
          this.slashGfx.fillStyle(SLASH_COLORS[i], 0.22);
          this.slashGfx.fillCircle(p.x, p.y, 60);
          this.slashGfx.lineStyle(1.5, SLASH_COLORS[i], 0.5);
          this.slashGfx.strokeCircle(p.x, p.y, 60);
        });

        // ── Boomerangs ─────────────────────────────
        this.boomGfx.clear();
        (state.boomerangs || []).forEach((b) => {
          const col = b.returning ? SPHERE_GLOW[b.owner] : BOOM_COLORS[b.owner];
          drawBoom(this.boomGfx, b.x, b.y, col);
        });

        // ── Players — shadow + arc + glow ─────────
        this.shadowGfx.clear();
        this.glowGfx.clear();
        state.players.forEach((p, i) => {
          if (!p) return;
          const r = 22;
          // Move the arc
          this.playerCircles[i].setPosition(p.x, p.y).setVisible(true);
          // Drop shadow (drawn below arc via layer order)
          this.shadowGfx.fillStyle(0x000000, 0.5);
          this.shadowGfx.fillEllipse(p.x + 7, p.y + 20, r * 3, r * 0.85);
          // Dark rim overlay (gives sphere depth)
          this.glowGfx.fillStyle(SPHERE_RIM[i], 0.55);
          this.glowGfx.fillCircle(p.x + 5, p.y + 5, r);
          // Diffuse bright area
          this.glowGfx.fillStyle(SPHERE_GLOW[i], 0.6);
          this.glowGfx.fillCircle(p.x - 6, p.y - 6, r * 0.52);
          // Specular dot
          this.glowGfx.fillStyle(0xffffff, 0.75);
          this.glowGfx.fillCircle(p.x - 8, p.y - 8, r * 0.17);
          // "You" ring
          if (i === playerSlot) {
            this.glowGfx.lineStyle(2, 0xffffff, 0.3);
            this.glowGfx.strokeEllipse(p.x, p.y + 19, 38, 10);
          }
        });

        // ── Win/lose ───────────────────────────────
        if (state.phase === 'done' && state.winner !== null) {
          this.showOverlay(state.winner === playerSlot ? 'You Win!' : 'You Lose');
        }
      },

      showOverlay(text) {
        this.overlayBg.setFillStyle(0x000000, 0.65).setVisible(true);
        this.overlayText.setText(text).setVisible(true);
      },
    },
  });
}
</script>
</body>
</html>
