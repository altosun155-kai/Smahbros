<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smash Bracket — Sign In</title>
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <script src="js/auth.js"></script>
</head>
<body>
<script>redirectIfLoggedIn();</script>

<div id="toast-container"></div>

<div class="auth-page">

  <div class="auth-logo">Smash<span>Bros</span></div>

  <div class="auth-card">

    <div class="auth-tabs">
      <button class="auth-tab-btn active" id="tabSignIn" onclick="switchTab('signin')">Sign In</button>
      <button class="auth-tab-btn" id="tabSignUp" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- Sign In Panel -->
    <div class="auth-panel active" id="panelSignin">
      <div class="auth-error-banner" id="signinError" role="alert"></div>

      <form id="signinForm" novalidate>
        <div class="form-group">
          <label for="signinUsername">Username</label>
          <input
            type="text"
            id="signinUsername"
            name="username"
            placeholder="Your username"
            autocomplete="username"
            required
          />
          <p class="field-error" id="signinUsernameError">Username is required.</p>
        </div>

        <div class="form-group">
          <label for="signinPassword">Password</label>
          <input
            type="password"
            id="signinPassword"
            name="password"
            placeholder="Your password"
            autocomplete="current-password"
            required
          />
          <p class="field-error" id="signinPasswordError">Password is required.</p>
        </div>

        <button type="submit" class="auth-submit" id="signinBtn">Sign In</button>
      </form>
    </div>

    <!-- Sign Up Panel -->
    <div class="auth-panel" id="panelSignup">
      <div class="auth-error-banner" id="signupError" role="alert"></div>
      <div class="auth-success-banner" id="signupSuccess" role="alert"></div>

      <form id="signupForm" novalidate>
        <div class="form-group">
          <label for="signupUsername">Username</label>
          <input
            type="text"
            id="signupUsername"
            name="username"
            placeholder="Choose a username"
            autocomplete="username"
            required
          />
          <p class="field-error" id="signupUsernameError">Username is required.</p>
        </div>

        <div class="form-group">
          <label for="signupPassword">Password</label>
          <input
            type="password"
            id="signupPassword"
            name="password"
            placeholder="Choose a password"
            autocomplete="new-password"
            required
          />
          <p class="field-error" id="signupPasswordError">Password is required.</p>
        </div>

        <button type="submit" class="auth-submit" id="signupBtn">Create Account</button>
      </form>
    </div>

  </div>
</div>

<script src="js/api.js"></script>
<script>
  // ── Server ready gate ────────────────────────────────────────────────────────
  // Disable both submit buttons and show a status banner until /health responds.
  const signinBtn  = document.getElementById('signinBtn');
  const signupBtn  = document.getElementById('signupBtn');
  const errorBannerSignin = document.getElementById('signinError');

  function setServerReady(ready) {
    signinBtn.disabled = !ready;
    signupBtn.disabled = !ready;
    if (ready) {
      signinBtn.textContent = 'Sign In';
      signupBtn.textContent = 'Create Account';
      errorBannerSignin.classList.remove('visible');
    } else {
      signinBtn.textContent = 'Connecting to server…';
      signupBtn.textContent = 'Connecting to server…';
    }
  }

  async function waitForServer() {
    setServerReady(false);
    for (let i = 0; i < 10; i++) {          // up to ~90 s
      try {
        const r = await fetch(API_BASE + '/health', { cache: 'no-store' });
        if (r.ok) { setServerReady(true); return; }
      } catch (_) {}
      await new Promise(r => setTimeout(r, i === 0 ? 2000 : 10000));
    }
    // Give up waiting — let them try anyway
    setServerReady(true);
    errorBannerSignin.textContent = 'Server may still be starting. If login fails, wait 30 s and try again.';
    errorBannerSignin.classList.add('visible');
  }

  waitForServer();

  function switchTab(tab) {
    document.getElementById('panelSignin').classList.toggle('active', tab === 'signin');
    document.getElementById('panelSignup').classList.toggle('active', tab === 'signup');
    document.getElementById('tabSignIn').classList.toggle('active', tab === 'signin');
    document.getElementById('tabSignUp').classList.toggle('active', tab === 'signup');
  }

  // ── Sign In ──────────────────────────────────────
  document.getElementById('signinForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const username = document.getElementById('signinUsername').value.trim();
    const password = document.getElementById('signinPassword').value;
    const errorBanner = document.getElementById('signinError');
    const btn = document.getElementById('signinBtn');

    // Clear errors
    errorBanner.classList.remove('visible');
    document.getElementById('signinUsernameError').classList.remove('visible');
    document.getElementById('signinPasswordError').classList.remove('visible');
    document.getElementById('signinUsername').classList.remove('input-error');
    document.getElementById('signinPassword').classList.remove('input-error');

    let valid = true;
    if (!username) {
      document.getElementById('signinUsername').classList.add('input-error');
      document.getElementById('signinUsernameError').classList.add('visible');
      valid = false;
    }
    if (!password) {
      document.getElementById('signinPassword').classList.add('input-error');
      document.getElementById('signinPasswordError').classList.add('visible');
      valid = false;
    }
    if (!valid) return;

    btn.disabled = true;
    btn.textContent = 'Signing in…';

    try {
      const data = await apiFetch('POST', '/auth/login', { username, password }, false);

      setToken(data.token);
      setUsername(data.username);
      const returnUrl = localStorage.getItem('loginReturnUrl');
      localStorage.removeItem('loginReturnUrl');
      window.location.href = returnUrl || 'hub.html';
    } catch (err) {
      errorBanner.textContent = err.message || 'Invalid username or password.';
      errorBanner.classList.add('visible');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  });

  // ── Sign Up ──────────────────────────────────────
  document.getElementById('signupForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const username = document.getElementById('signupUsername').value.trim();
    const password = document.getElementById('signupPassword').value;
    const errorBanner = document.getElementById('signupError');
    const successBanner = document.getElementById('signupSuccess');
    const btn = document.getElementById('signupBtn');

    errorBanner.classList.remove('visible');
    successBanner.classList.remove('visible');
    document.getElementById('signupUsernameError').classList.remove('visible');
    document.getElementById('signupPasswordError').classList.remove('visible');
    document.getElementById('signupUsername').classList.remove('input-error');
    document.getElementById('signupPassword').classList.remove('input-error');

    let valid = true;
    if (!username) {
      document.getElementById('signupUsername').classList.add('input-error');
      document.getElementById('signupUsernameError').classList.add('visible');
      valid = false;
    }
    if (!password) {
      document.getElementById('signupPassword').classList.add('input-error');
      document.getElementById('signupPasswordError').classList.add('visible');
      valid = false;
    }
    if (!valid) return;

    btn.disabled = true;
    btn.textContent = 'Creating account…';

    try {
      await apiFetch('POST', '/auth/register', { username, password }, false);
      successBanner.textContent = 'Account created! You can now sign in.';
      successBanner.classList.add('visible');
      document.getElementById('signupForm').reset();
      setTimeout(() => switchTab('signin'), 1500);
    } catch (err) {
      errorBanner.textContent = err.message || 'Could not create account.';
      errorBanner.classList.add('visible');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  });

  // Clear errors on input
  ['signinUsername','signinPassword','signupUsername','signupPassword'].forEach(id => {
    document.getElementById(id).addEventListener('input', function() {
      this.classList.remove('input-error');
    });
  });
</script>

</body>
</html>
